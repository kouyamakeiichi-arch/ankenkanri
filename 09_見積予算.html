<title>見積・予算</title>
<style>
  :root{
    --purple:#5b2fe0;
    --purple-light:#efe9fd;
    --gray-bg:#f7f7f9;
    --border:#e2e2e8;
    --text:#2b2b33;
    --sub:#8a8a95;
    --green:#1b8a5a;
    --red:#d0392c;
  }
  *{box-sizing:border-box;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:var(--gray-bg);
    margin:0;
    color:var(--text);
    font-size:13px;
  }
  .app{max-width:1500px;margin:0 auto;padding:16px 20px 60px;}

  /* Header */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:10px;margin-bottom:14px;
  }
  .topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .project-name{
    font-size:20px;font-weight:700;border:none;background:transparent;
    padding:4px 6px;border-radius:6px;min-width:220px;
  }
  .project-name:focus{outline:2px solid var(--purple-light);background:#fff;}
  .status-pill{
    background:var(--purple-light);color:var(--purple);
    padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;
  }
  .btn{
    border:1px solid var(--border);background:#fff;color:var(--text);
    padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  }
  .btn:hover{background:#f1f1f5;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn:disabled:hover{background:#fff;}
  .btn-primary{background:var(--purple);border-color:var(--purple);color:#fff;}
  .btn-primary:hover{background:#4c25c4;}
  .btn-ghost{border-color:transparent;background:transparent;}
  .btn-ghost:hover{background:#eee;}
  .btn-sm{padding:4px 8px;font-size:12px;border-radius:6px;}
  .btn-danger{color:var(--red);}
  .dropmenu{position:absolute;top:100%;left:0;margin-top:4px;z-index:500;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);padding:5px;min-width:230px;font-size:12.5px;display:none}
  .dropmenu.on{display:block}
  .dropmenu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;color:#1f2937;white-space:nowrap}
  .dropmenu button:hover{background:#f1f1f5}
  .dropmenu hr{border:none;border-top:1px solid var(--border);margin:5px 2px}
  .pick-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #f1f1f1;font-size:13px;cursor:pointer}
  .pick-row:last-child{border-bottom:none}
  .btn-alert{border-color:#f0c419;background:#fff8e1;color:#8a6d00;}
  .btn-alert:hover{background:#fef2c7;}

  select.version-select{
    border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;background:#fff;
  }
  .meta{font-size:11px;color:var(--sub);}

  /* Summary bar */
  .summary{
    display:flex;gap:0;background:#fff;border:1px solid var(--border);
    border-radius:10px;padding:14px 10px;margin-bottom:14px;overflow-x:auto;
  }
  .summary .cell{
    flex:1;min-width:120px;padding:0 16px;border-right:1px solid var(--border);
    text-align:left;
  }
  .summary .cell:last-child{border-right:none;}
  .summary .label{font-size:11px;color:var(--sub);margin-bottom:4px;}
  .summary .value{font-size:17px;font-weight:700;}
  .summary .subvalue{font-size:11px;color:var(--sub);margin-top:2px;}
  .summary .value.green{color:var(--green);}
  .summary .value.purple{color:var(--purple);}

  /* Table */
  .table-wrap{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    overflow:auto;
    max-height:70vh;
  }
  table{border-collapse:collapse;table-layout:fixed;}
  thead th{
    position:sticky;top:0;background:#faf9fc;z-index:2;
    font-size:11.5px;color:var(--sub);font-weight:600;
    padding:10px 8px;border-bottom:1px solid var(--border);
    border-right:1px solid var(--border);white-space:nowrap;text-align:right;
    overflow:hidden;text-overflow:ellipsis;
    box-shadow:0 1px 0 var(--border);
  }
  thead th.left{text-align:left;}
  thead th .th-label{overflow:hidden;text-overflow:ellipsis;display:block;pointer-events:none;}
  .col-resizer{
    position:absolute;top:0;right:-4px;width:8px;height:100%;
    cursor:col-resize;z-index:3;
  }
  .col-resizer:hover, .col-resizer.col-resizing{background:rgba(91,47,224,.35);}
  tbody td{
    padding:6px 8px;border-bottom:1px solid var(--border);
    border-right:1px solid var(--border);white-space:nowrap;text-align:right;
    vertical-align:middle;overflow:hidden;text-overflow:ellipsis;
  }
  tbody td.left{text-align:left;}
  tbody tr.cat-header-row{background:#fff;border-top:2px solid var(--purple-light);}
  tbody tr.cat-header-row td{font-weight:700;padding:9px 8px;}
  tbody tr.cat-subtotal-row{background:var(--purple-light);}
  tbody tr.cat-subtotal-row td{font-weight:700;padding:9px 8px;}
  tbody tr.item-row:hover{background:#fbfaff;}
  td.cell-selected{background:rgba(91,47,224,.14) !important; box-shadow:inset 0 0 0 1.5px var(--purple);}
  .no-select, .no-select *{user-select:none !important;}

  .cell-input{
    border:1px solid transparent;background:transparent;width:100%;
    text-align:inherit;font-size:13px;padding:4px 4px;border-radius:5px;color:var(--text);
    font-family:inherit;
  }
  .cell-input:hover{border-color:var(--border);}
  .cell-input:focus{outline:none;border-color:var(--purple);background:#fff;}
  input.cell-input[type=number]{text-align:right;}
  .name-input{font-weight:600;}
  .cat-name-row{display:flex;align-items:center;gap:0;width:100%;}
  .cat-name-input{font-weight:700;font-size:14px;background:transparent;flex:1;min-width:0;width:auto;}
  .cat-number-input{font-weight:700;font-size:14px;color:var(--purple);background:transparent;width:28px;flex:none;text-align:right;}
  .cat-number-dot{font-weight:700;font-size:14px;color:var(--purple);margin-right:4px;user-select:none;flex:none;}

  .tax-sub{font-size:10.5px;color:var(--sub);display:block;}
  .rate-badge{
    display:inline-block;padding:1px 8px;border-radius:10px;font-size:11.5px;font-weight:600;
  }
  .rate-good{background:#e7f6ee;color:var(--green);}
  .rate-bad{background:#fdeceb;color:var(--red);}

  .row-actions{display:flex;gap:2px;justify-content:flex-end;}
  .icon-btn{
    border:none;background:transparent;color:var(--sub);cursor:pointer;
    font-size:14px;padding:3px 5px;border-radius:5px;
  }
  .icon-btn:hover{background:#eee;color:var(--text);}
  .icon-btn.danger:hover{color:var(--red);}

  .collapse-toggle{cursor:pointer;margin-right:6px;color:var(--purple);user-select:none;}

  .add-item-row td{
    text-align:left;padding:6px 8px;
  }
  .add-cat-bar{padding:10px;text-align:left;display:flex;gap:8px;align-items:center;}

  .checkbox{width:16px;height:16px;cursor:pointer;}

  /* Context menu */
  .ctx-menu{
    position:fixed;z-index:200;background:#fff;border:1px solid var(--border);
    border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.18);min-width:190px;
    padding:6px 0;display:none;font-size:13px;
  }
  .ctx-menu.show{display:block;}
  .ctx-item{padding:8px 14px;cursor:pointer;white-space:nowrap;}
  .ctx-item:hover{background:#f1f1f5;}
  .ctx-item.disabled{color:#c7c7cf;cursor:not-allowed;}
  .ctx-item.disabled:hover{background:transparent;}
  .ctx-sep{height:1px;background:var(--border);margin:5px 0;}

  /* Modal */
  .overlay{
    position:fixed;inset:0;background:rgba(20,15,40,.35);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff;border-radius:12px;width:520px;max-width:92vw;
    max-height:80vh;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
  }
  .modal-head{
    padding:16px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-head h3{margin:0;font-size:15px;}
  .modal-body{padding:8px 10px;overflow-y:auto;}
  .modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
  .proj-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 10px;border-radius:8px;
  }
  .proj-item:hover{background:#f7f6fb;}
  .proj-item .name{font-weight:600;}
  .proj-item .meta{margin-top:2px;}
  .proj-actions{display:flex;gap:4px;}
  .empty-state{padding:30px;text-align:center;color:var(--sub);font-size:12.5px;}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:6px;}
  .info-grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);}
  .info-input{border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;font-family:inherit;color:var(--text);}
  .info-block{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--sub);margin:10px 0;}
  .info-textarea{border:1px solid var(--border);border-radius:6px;padding:8px 9px;font-size:13px;font-family:inherit;color:var(--text);resize:vertical;}
  .info-sep{font-size:12.5px;font-weight:700;color:var(--purple);margin:14px 0 8px;padding-top:10px;border-top:1px solid var(--border);}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#2b2b33;color:#fff;padding:10px 18px;border-radius:8px;
    font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;
  }
  .toast.show{opacity:1;}
</style>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "concrewEstimateProjects_v1";
  var COLW_KEY = "concrewEstimateColWidths_v1";
  var DRAFT_KEY = "concrewEstimateDraft_v1";
  var TAX_RATE = 0.10;

  // ===== Firebase 保存(クラウド同期) =====
  // taiho_app_data コレクションに他ページと同じ形式(doc id=キー名, value フィールド)で保存する
  function fsSet(key, value){
    if(!window.db) return;
    window.db.collection("taiho_app_data").doc(key).set({value:value, updatedAt:Date.now()}).catch(function(e){ console.warn('クラウド保存失敗', key, e); });
  }
  function fsGet(key){
    return new Promise(function(resolve){
      if(!window.db){ resolve(null); return; }
      window.db.collection("taiho_app_data").doc(key).get().then(function(doc){
        resolve(doc.exists ? doc.data().value : null);
      }).catch(function(){ resolve(null); });
    });
  }
  // 起動時にクラウドの値をこのブラウザのlocalStorageへ反映する(クラウドに無ければローカルの値をクラウドへ移行)
  function fsPullToLocal(key){
    return fsGet(key).then(function(remote){
      if(remote !== null && remote !== undefined){
        try{ localStorage.setItem(key, remote); }catch(e){}
      }else{
        var local = null;
        try{ local = localStorage.getItem(key); }catch(e){}
        if(local) fsSet(key, local);
      }
    });
  }

  // ---------- column definitions ----------
  var CORE_DEFS = {
    name:        {label:"名称",          width:180, left:true, core:true, type:"text",     editable:true,  clearable:true,  deletable:false, hideable:false, movable:false},
    spec:        {label:"仕様・摘要",     width:140, left:true, core:true, type:"text",     editable:true,  clearable:true,  deletable:false, hideable:true,  movable:true},
    qty:         {label:"数量",          width:70,             core:true, type:"number",   editable:true,  clearable:true,  deletable:false, hideable:true,  movable:true},

  function normalizeState(s){

    if(!s.estimateInfo) s.estimateInfo = defaultEstimateInfo();
    if(!s.estimateInfo.company) s.estimateInfo.company = defaultEstimateInfo().company;
    if(!s.estimateInfo.honorific) s.estimateInfo.honorific = "御中";

    (s.categories||[]).forEach(function(cat){
      if(cat.hidden === undefined) cat.hidden = false;
      (cat.items||[]).forEach(function(it){
        if(it.hidden === undefined) it.hidden = false;
        if(!it.custom) it.custom = {};
        if(it.kakeRate === undefined) it.kakeRate = it.unitCost ? Math.round((it.unitSell/it.unitCost)*10000)/10000 : 1;

  var history = [];

  var restoringHistory = false;
  function resetHistory(){
    history = [JSON.stringify(state)];
    historyIndex = 0;
    updateUndoRedoButtons();
  }
  function pushHistory(){
    if(restoringHistory) return;
    var snap = JSON.stringify(state);
    if(historyIndex >= 0 && history[historyIndex] === snap) return;
    history = history.slice(0, historyIndex+1);
    history.push(snap);
    if(history.length > HISTORY_MAX) history.shift();
    historyIndex = history.length - 1;
    updateUndoRedoButtons();
  }
  function undo(){
    if(historyIndex <= 0) return;
    historyIndex--;
    restoringHistory = true;
    state = normalizeState(JSON.parse(history[historyIndex]));
    renderHead(); applyAllWidths(); render();
    restoringHistory = false;
    updateUndoRedoButtons();
    scheduleAutosave();
  }
  function redo(){
    if(historyIndex >= history.length-1) return;
    historyIndex++;
    restoringHistory = true;
    state = normalizeState(JSON.parse(history[historyIndex]));
    renderHead(); applyAllWidths(); render();
    restoringHistory = false;
    updateUndoRedoButtons();
    scheduleAutosave();
  }
  function updateUndoRedoButtons(){
    var u = document.getElementById("btnUndo");
    var r = document.getElementById("btnRedo");
    if(u) u.disabled = historyIndex <= 0;

  }

    var loc = rowIndexMap[row]; if(!loc) return;
    var cat = findCat(loc.catId); if(!cat) return;
    var item = findItem(cat, loc.itemId); if(!item) return;
    var key = colIndexMap[col];
    if(key === "qty" || key === "unitSell" || key === "unitCost" || key === "unitActual" || key === "kakeRate"){
      item[key] = num(val);
      if(key === "kakeRate" || key === "unitCost"){ syncSellFromRate(item); }
      else if(key === "unitSell"){ syncRateFromSell(item); }
    } else if(key === "name" || key === "spec" || key === "unit"){
      item[key] = (val===undefined||val===null) ? "" : String(val);
    } else {
      if(!item.custom) item.custom = {};
      item.custom[key] = (val===undefined||val===null) ? "" : String(val);
    }
  }
  function updateSelectionVisual(){
    document.querySelectorAll("td.cell-selected").forEach(function(el){ el.classList.remove("cell-selected"); });
    if(!selStart || !selEnd) return;
    var r0 = Math.min(selStart.row, selEnd.row), r1 = Math.max(selStart.row, selEnd.row);
    var c0 = Math.min(selStart.col, selEnd.col), c1 = Math.max(selStart.col, selEnd.col);
    var tbody = document.getElementById("tbody");
    for(var r=r0; r<=r1; r++){
      var tr = tbody.querySelector('tr[data-rowidx="'+r+'"]');
      if(!tr) continue;
      for(var c=c0; c<=c1; c++){
        if(!isFillableColumn(colIndexMap[c])) continue;
        var td = tr.querySelector('td[data-colidx="'+c+'"]');
        if(td) td.classList.add("cell-selected");
      }
    }
  }
  function pasteToSelection(){
    if(!selStart || !selEnd || clipboardValue === null) return;
    var r0 = Math.min(selStart.row, selEnd.row), r1 = Math.max(selStart.row, selEnd.row);
    var c0 = Math.min(selStart.col, selEnd.col), c1 = Math.max(selStart.col, selEnd.col);
    var count = 0;
    for(var r=r0; r<=r1; r++){
      if(!rowIndexMap[r]) continue;
      for(var c=c0; c<=c1; c++){
        if(!isFillableColumn(colIndexMap[c])) continue;
        setCellValue(r, c, clipboardValue);
        count++;
      }
    }
    render();
    updateSelectionVisual();
    pushHistory();
    scheduleAutosave();
    showToast("貼り付けました（"+count+"件）");
  }
  function clearSelectionContents(){
    if(!selStart || !selEnd) return;
    if(!confirm("選択したセルの内容を削除しますか？")) return;
    var r0 = Math.min(selStart.row, selEnd.row), r1 = Math.max(selStart.row, selEnd.row);
    var c0 = Math.min(selStart.col, selEnd.col), c1 = Math.max(selStart.col, selEnd.col);
    for(var r=r0; r<=r1; r++){
      if(!rowIndexMap[r]) continue;
      for(var c=c0; c<=c1; c++){
        var key = colIndexMap[c];
        if(!isFillableColumn(key)) continue;
        var def = getColumnDef(key);
        setCellValue(r, c, def.type === "number" ? 0 : "");
      }
    }
    render();
    updateSelectionVisual();
    pushHistory();
    scheduleAutosave();
  }
  function setupCellSelection(){
    var tbody = document.getElementById("tbody");
    tbody.addEventListener("mousedown", function(e){
      var td = e.target.closest("td[data-colidx]");
      if(!td){ selStart = selEnd = null; updateSelectionVisual(); return; }
      var tr = td.closest("tr[data-rowidx]");
      if(!tr){ selStart = selEnd = null; updateSelectionVisual(); return; }
      var row = parseInt(tr.getAttribute("data-rowidx"), 10);
      var col = parseInt(td.getAttribute("data-colidx"), 10);
      if(!isFillableColumn(colIndexMap[col])){ selStart = selEnd = null; updateSelectionVisual(); return; }
      selStart = {row:row, col:col};
      selEnd = {row:row, col:col};
      isSelecting = true;
      updateSelectionVisual();
    });
    tbody.addEventListener("mousemove", function(e){
      if(!isSelecting || !selStart) return;
      var td = e.target.closest("td[data-colidx]");
      if(!td) return;
      var tr = td.closest("tr[data-rowidx]");
      if(!tr) return;
      var row = parseInt(tr.getAttribute("data-rowidx"), 10);
      var col = parseInt(td.getAttribute("data-colidx"), 10);
      if(selEnd && row === selEnd.row && col === selEnd.col) return;
      selEnd = {row:row, col:col};
      if(selStart.row !== selEnd.row || selStart.col !== selEnd.col){
        document.body.classList.add("no-select");
        if(document.activeElement && tbody.contains(document.activeElement)) document.activeElement.blur();
        window.getSelection && window.getSelection().removeAllRanges();
      }
      updateSelectionVisual();
    });
    document.addEventListener("mouseup", function(){
      isSelecting = false;
      document.body.classList.remove("no-select");
    });
    document.addEventListener("mousedown", function(e){
      if(tbody.contains(e.target)) return;
      if(!selStart) return;
      selStart = selEnd = null;
      updateSelectionVisual();
    });
    document.addEventListener("keydown", function(e){
      var modKey = e.ctrlKey || e.metaKey;
      if(modKey && e.key.toLowerCase() === "z" && !e.shiftKey){
        var tag = document.activeElement && document.activeElement.tagName;
        if(tag !== "INPUT" && tag !== "TEXTAREA"){ e.preventDefault(); undo(); return; }
      }
      if(modKey && (e.key.toLowerCase() === "y" || (e.key.toLowerCase()==="z" && e.shiftKey))){
        var tag2 = document.activeElement && document.activeElement.tagName;
        if(tag2 !== "INPUT" && tag2 !== "TEXTAREA"){ e.preventDefault(); redo(); return; }
      }
      if(!selStart || !selEnd) return;
      var isMulti = (selStart.row !== selEnd.row || selStart.col !== selEnd.col);
      var activeInTable = document.activeElement && tbody.contains(document.activeElement);
      var activeIsBody = document.activeElement === document.body;
      if(!activeInTable && !activeIsBody) return;
      var mod = e.ctrlKey || e.metaKey;
      if(mod && e.key.toLowerCase() === "c"){
        var val = getCellValue(selStart.row, selStart.col);
        if(val !== undefined){
          clipboardValue = val;
          showToast("コピーしました");
          if(isMulti) e.preventDefault();
        }
      } else if(mod && e.key.toLowerCase() === "v"){
        if(clipboardValue !== null){
          pasteToSelection();
          e.preventDefault();
        }
      } else if((e.key === "Delete" || e.key === "Backspace") && isMulti){
        clearSelectionContents();
        e.preventDefault();
      }
    });
  }

  // ---------- calculations ----------
  function calcItem(it){
    var sell = it.qty * it.unitSell;
    var cost = it.qty * it.unitCost;
    var actual = it.qty * it.unitActual;
    var profit = sell - cost;
    var profitRate = sell !== 0 ? profit/sell : 0;
    var aProfit = sell - actual;
    var aProfitRate = sell !== 0 ? aProfit/sell : 0;
    return {sell:sell, cost:cost, actual:actual, profit:profit, profitRate:profitRate, aProfit:aProfit, aProfitRate:aProfitRate};
  }
  function calcCategory(cat){
    var t = {sell:0,cost:0,actual:0,profit:0,aProfit:0};
    cat.items.forEach(function(it){
      var c = calcItem(it);
      t.sell += c.sell; t.cost += c.cost; t.actual += c.actual; t.profit += c.profit; t.aProfit += c.aProfit;
    });
    t.profitRate = t.sell !== 0 ? t.profit/t.sell : 0;
    t.aProfitRate = t.sell !== 0 ? t.aProfit/t.sell : 0;
    return t;
  }
  function calcGrand(){
    var t = {sell:0,cost:0,actual:0,profit:0,aProfit:0};
    state.categories.forEach(function(cat){
      var c = calcCategory(cat);
      t.sell += c.sell; t.cost += c.cost; t.actual += c.actual; t.profit += c.profit; t.aProfit += c.aProfit;
    });
    t.profitRate = t.sell !== 0 ? t.profit/t.sell : 0;
    t.aProfitRate = t.sell !== 0 ? t.aProfit/t.sell : 0;
    return t;
  }

  // ---------- render ----------
  function render(){
    document.getElementById("projectName").value = state.projectName;
    document.getElementById("statusPill").textContent = state.status || "見積作成中";
    renderSummary();

    var cols = visibleColumns();
    colIndexMap = cols.slice();
    rowIndexMap = [];
    var tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    var catNumber = 0;
    state.categories.forEach(function(cat){
      if(cat.hidden) return;
      catNumber++;
      var catCalc = calcCategory(cat);

      var trHead = document.createElement("tr");
      trHead.className = "cat-header-row";
      trHead.setAttribute("data-cat", cat.id);
      trHead.setAttribute("data-rowtype", "cat");
      trHead.innerHTML = cols.map(function(k){ return catHeaderCell(k, cat, catNumber); }).join("");
      tbody.appendChild(trHead);

      if(!cat.collapsed){
        cat.items.forEach(function(it){
          if(it.hidden) return;
          var c = calcItem(it);
          var rowIdx = rowIndexMap.length;
          rowIndexMap.push({catId:cat.id, itemId:it.id});
          var tr = document.createElement("tr");
          tr.className = "item-row";
          tr.setAttribute("data-cat", cat.id);
          tr.setAttribute("data-item", it.id);
          tr.setAttribute("data-rowtype", "item");
          tr.setAttribute("data-rowidx", rowIdx);

          tbody.appendChild(tr);
        });

        var trAdd = document.createElement("tr");

        trAdd.innerHTML = '<td colspan="'+cols.length+'"><button class="btn btn-sm" data-act="addItem" data-cat="'+cat.id+'">＋ 項目を追加</button></td>';
        tbody.appendChild(trAdd);
      }

      var trSub = document.createElement("tr");
      trSub.className = "cat-subtotal-row";
      trSub.setAttribute("data-cat", cat.id);
      trSub.setAttribute("data-rowtype", "cat");
      trSub.innerHTML = cols.map(function(k){ return catSubtotalCell(k, cat, catCalc); }).join("");
      tbody.appendChild(trSub);
    });

    updateHiddenBadge();
    updateSelectionVisual();
  }

  function findCat(id){ return state.categories.find(function(c){return c.id === id;}); }
  function findItem(cat, id){ return cat.items.find(function(i){return i.id === id;}); }

  // ---------- item operations ----------
  function addItemToCat(catId){
    findCat(catId).items.push(emptyItem());
    render(); pushHistory(); scheduleAutosave();
  }
  function insertItem(catId, itemId, side){
    var cat = findCat(catId);
    var idx = cat.items.findIndex(function(i){return i.id === itemId;});
    cat.items.splice(side === "above" ? idx : idx+1, 0, emptyItem());
    render(); pushHistory(); scheduleAutosave();
  }
  function duplicateItem(catId, itemId){
    var cat = findCat(catId);
    var item = findItem(cat, itemId);
    var copy = JSON.parse(JSON.stringify(item));
    copy.id = uid();
    var idx = cat.items.findIndex(function(i){return i.id === item.id;});
    cat.items.splice(idx+1, 0, copy);
    render(); pushHistory(); scheduleAutosave();
  }
  function deleteItem(catId, itemId){
    var cat = findCat(catId);
    cat.items = cat.items.filter(function(i){return i.id !== itemId;});
    render(); pushHistory(); scheduleAutosave();
  }
  function moveItem(catId, itemId, dir){
    var cat = findCat(catId);
    var idx = cat.items.findIndex(function(i){return i.id === itemId;});
    var newIdx = idx + dir;
    if(newIdx < 0 || newIdx >= cat.items.length) return;
    var tmp = cat.items[newIdx]; cat.items[newIdx] = cat.items[idx]; cat.items[idx] = tmp;
    render(); pushHistory(); scheduleAutosave();
  }
  function hideItem(catId, itemId){
    findItem(findCat(catId), itemId).hidden = true;
    render(); pushHistory(); scheduleAutosave();
  }
  function clearItemContent(catId, itemId){
    if(!confirm("この項目の内容をすべて削除しますか？")) return;
    var it = findItem(findCat(catId), itemId);
    it.name = ""; it.spec = ""; it.qty = 0; it.unit = ""; it.unitSell = 0; it.kakeRate = 1; it.unitCost = 0; it.unitActual = 0; it.custom = {};
    render(); pushHistory(); scheduleAutosave();
  }

  // ---------- category operations ----------
  function insertCategory(catId, side){
    var idx = state.categories.findIndex(function(c){return c.id === catId;});
    state.categories.splice(side === "above" ? idx : idx+1, 0, emptyCategory());
    render(); pushHistory(); scheduleAutosave();
  }
  function duplicateCategory(catId){
    var cat = findCat(catId);
    var copy = JSON.parse(JSON.stringify(cat));
    copy.id = uid();
    copy.items.forEach(function(i){ i.id = uid(); });
    var idx = state.categories.findIndex(function(c){return c.id === cat.id;});
    state.categories.splice(idx+1, 0, copy);
    render(); pushHistory(); scheduleAutosave();
  }
  function deleteCategory(catId){
    if(!confirm("この大項目を削除しますか？（中の項目もすべて削除されます）")) return;
    state.categories = state.categories.filter(function(c){return c.id !== catId;});

  }
  function moveCategory(catId, dir){
    var idx = state.categories.findIndex(function(c){return c.id === catId;});
    var newIdx = idx + dir;
    if(newIdx < 0 || newIdx >= state.categories.length) return;
    var tmp = state.categories[newIdx]; state.categories[newIdx] = state.categories[idx]; state.categories[idx] = tmp;
    render(); pushHistory(); scheduleAutosave();

    render(); pushHistory(); scheduleAutosave();

  // ---------- column operations ----------
  function insertColumn(refKey, side){
    var label = prompt("新しい列の名前を入力してください", "新しい列");
    if(label === null) return;
    if(!label.trim()) label = "新しい列";
    var key = "custom_" + uid();
    state.customColumns.push({key:key, label:label.trim(), width:120});
    var idx = state.columnOrder.indexOf(refKey);
    state.columnOrder.splice(side === "left" ? idx : idx+1, 0, key);
    colWidths[key] = 120;
    renderHead(); render(); saveColWidths(); pushHistory(); scheduleAutosave();
  }
  function duplicateColumn(key){
    var def = getColumnDef(key);
    if(def.core) return;
    var newKey = "custom_" + uid();
    state.customColumns.push({key:newKey, label:def.label+"のコピー", width:def.width});
    var idx = state.columnOrder.indexOf(key);
    state.columnOrder.splice(idx+1, 0, newKey);
    state.categories.forEach(function(cat){
      cat.items.forEach(function(it){
        if(!it.custom) it.custom = {};
        it.custom[newKey] = it.custom[key] || "";
      });
    });
    colWidths[newKey] = widthOf(key);
    renderHead(); render(); saveColWidths(); pushHistory(); scheduleAutosave();
  }
  function deleteColumn(key){
    var def = getColumnDef(key);
    if(def.core) return;
    if(!confirm("この列を削除しますか？（データも削除されます）")) return;
    state.customColumns = state.customColumns.filter(function(c){return c.key !== key;});
    state.columnOrder = state.columnOrder.filter(function(k){return k !== key;});
    state.hiddenColumns = state.hiddenColumns.filter(function(k){return k !== key;});
    state.categories.forEach(function(cat){
      cat.items.forEach(function(it){ if(it.custom) delete it.custom[key]; });
    });
    renderHead(); render(); pushHistory(); scheduleAutosave();
  }
  function canMoveColumn(key, dir){
    var def = getColumnDef(key);
    if(!def.movable) return false;
    var idx = state.columnOrder.indexOf(key);
    var newIdx = idx + dir;
    if(newIdx < 1 || newIdx > state.columnOrder.length - 2) return false;
    return true;
  }
  function moveColumn(key, dir){
    if(!canMoveColumn(key, dir)) return;
    var idx = state.columnOrder.indexOf(key);
    var newIdx = idx + dir;
    var tmp = state.columnOrder[newIdx];
    state.columnOrder[newIdx] = key;
    state.columnOrder[idx] = tmp;

  // ---------- column resize ----------
  function setupColumnResize(){
    var thead = document.querySelector("thead");
    var dragKey = null, startX = 0, startWidth = 0, dragHandle = null;

    thead.addEventListener("mousedown", function(e){
      var handle = e.target.closest(".col-resizer");
      if(!handle) return;
      e.preventDefault();
      dragKey = handle.getAttribute("data-col");
      dragHandle = handle;
      startX = e.clientX;
      startWidth = widthOf(dragKey);
      handle.classList.add("col-resizing");
      document.body.style.cursor = "col-resize";
    });
    document.addEventListener("mousemove", function(e){
      if(!dragKey) return;
      var newWidth = Math.max(30, Math.round(startWidth + (e.clientX - startX)));
      colWidths[dragKey] = newWidth;
      var col = document.querySelector('#colgroup col[data-col="'+dragKey+'"]');
      if(col) col.style.width = newWidth + "px";
      updateTableWidth();
    });
    document.addEventListener("mouseup", function(){
      if(!dragKey) return;
      if(dragHandle) dragHandle.classList.remove("col-resizing");
      dragKey = null; dragHandle = null;
      document.body.style.cursor = "";
      saveColWidths();
      updateTableWidth();
    });
    thead.addEventListener("dblclick", function(e){
      var handle = e.target.closest(".col-resizer");
      if(!handle) return;
      var key = handle.getAttribute("data-col");
      var def = getColumnDef(key);
      colWidths[key] = def.width;
      var col = document.querySelector('#colgroup col[data-col="'+key+'"]');
      if(col) col.style.width = def.width + "px";
      saveColWidths();
      updateTableWidth();
    });
  }

  /* =====================================================================
     書き出し・読み込み(PCバックアップ)

  function dlJson(obj, filename){
    var json = JSON.stringify(obj, null, 2);
    var blob = new Blob([json], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function dateStamp(){
    var d = new Date();
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
  }

  function exportCurrentProjectData(){
    var projects = loadProjects();
    var proj = projects.find(function(p){return p.id === currentProjectId;});
    if(!proj){
      // まだ登録(保存)されていない場合は、今編集中の内容だけを1件として書き出す
      var snap = JSON.parse(JSON.stringify(state));
      proj = { id: uid(), name: state.projectName, versions: [{versionId: uid(), savedAt: nowLabel(), data: snap}] };
    }
    var copy = JSON.parse(JSON.stringify(proj));
    dlJson({app:"concrew-estimate", version:1, exportDate:new Date().toLocaleString("ja-JP"), projects:[copy]}, "kobetsu_"+(proj.name||"見積")+"_"+dateStamp()+".json");
    showToast("「"+proj.name+"」を書き出しました");
  }

    showToast("全"+projects.length+"件を書き出しました");

  function readJsonFile(input, cb){
    var file = input.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var obj = JSON.parse(e.target.result);
        if(!obj || !Array.isArray(obj.projects) || !obj.projects.length){
          alert("このファイルは対応していない形式です。");
          input.value=""; return;
        }
        cb(obj, file.name);
      }catch(ex){
        alert("読み込みに失敗しました。正しいファイルか確認してください。\n"+ex.message);
      }
      input.value = "";
    };
    reader.readAsText(file, "UTF-8");
  }

  document.getElementById("btnSave").addEventListener("click", function(){
    var projects = loadProjects();
    var snapshot = JSON.parse(JSON.stringify(state));
    var versionEntry = { versionId: uid(), savedAt: nowLabel(), data: snapshot };

    if(currentProjectId){
      var proj = projects.find(function(p){return p.id === currentProjectId;});
      if(proj){
        proj.name = state.projectName;
        proj.versions.unshift(versionEntry);
        currentVersionIndex = 0;
      } else {
        currentProjectId = null;
      }
    }
    if(!currentProjectId){
      var newProj = { id: uid(), name: state.projectName, versions: [versionEntry] };
      projects.unshift(newProj);
      currentProjectId = newProj.id;
      currentVersionIndex = 0;

    var projects = loadProjects();
    if(projects.length === 0){
      wrap.innerHTML = '<div class="empty-state">保存された見積・予算はまだありません</div>';
      return;
    }
    wrap.innerHTML = "";
    projects.forEach(function(p){
      var latest = p.versions[0];
      var g = latest ? calcGrandOf(latest.data) : null;
      var row = document.createElement("div");
      row.className = "proj-item";
      row.innerHTML =
        '<div>' +
          '<div class="name">'+escapeAttr(p.name)+'</div>' +
          '<div class="meta">最終保存: '+ (latest?latest.savedAt:"-") + (g?"　販売価格: "+yen(g.sell):"") + '　版数: '+p.versions.length+'</div>' +
        '</div>' +
        '<div class="proj-actions">' +
          '<button class="btn btn-sm" data-open="'+p.id+'">開く</button>' +
          '<button class="btn btn-sm btn-danger" data-del="'+p.id+'">削除</button>' +
        '</div>';
      wrap.appendChild(row);
    });
    wrap.querySelectorAll("[data-open]").forEach(function(btn){
      btn.addEventListener("click", function(){
        openProject(btn.getAttribute("data-open"));
        closeList();
      });
    });
    wrap.querySelectorAll("[data-del]").forEach(function(btn){
      btn.addEventListener("click", function(){
        if(!confirm("この見積・予算を削除しますか？（すべての版が削除されます）")) return;
        var projects = loadProjects().filter(function(p){return p.id !== btn.getAttribute("data-del");});
        saveProjects(projects);
        if(currentProjectId === btn.getAttribute("data-del")){
          currentProjectId = null;
          renderVersionSelect();
          updateLastSaved();
        }
        renderProjList();
      });
    });
  }
  function calcGrandOf(s){
    var t = {sell:0,cost:0,actual:0,profit:0,aProfit:0};
    s.categories.forEach(function(cat){
      cat.items.forEach(function(it){
        t.sell += it.qty*it.unitSell;
        t.cost += it.qty*it.unitCost;
        t.actual += it.qty*it.unitActual;
      });
    });
    return t;
  }
  function openProject(id){
    var projects = loadProjects();
    var proj = projects.find(function(p){return p.id === id;});
    if(!proj || !proj.versions.length) return;
    state = normalizeState(JSON.parse(JSON.stringify(proj.versions[0].data)));
    currentProjectId = proj.id;
    currentVersionIndex = 0;
    renderHead(); applyAllWidths(); render();
    renderVersionSelect();
    updateLastSaved();
    resetHistory();
  }

  // ---------- 見積書情報 modal ----------
  var infoOverlay = document.getElementById("infoOverlay");
  function openInfoModal(){
    var info = state.estimateInfo || defaultEstimateInfo();
    var co = info.company || defaultEstimateInfo().company;
    document.getElementById("infoClientName").value = info.clientName || "";
    document.getElementById("infoHonorific").value = info.honorific || "御中";
    document.getElementById("infoEstimateNo").value = info.estimateNo || "";
    document.getElementById("infoSiteAddress").value = info.siteAddress || "";
    document.getElementById("infoOverview").value = info.overview || "";
    document.getElementById("infoPeriod").value = info.period || "";
    document.getElementById("infoPaymentTerms").value = info.paymentTerms || "";
    document.getElementById("infoValidPeriod").value = info.validPeriod || "";
    document.getElementById("infoRemarks").value = info.remarks || "";
    document.getElementById("infoShowFooter").checked = info.showFooter !== false;
    document.getElementById("infoCoName").value = co.name || "";
    document.getElementById("infoCoRep").value = co.rep || "";
    document.getElementById("infoCoZip").value = co.zip || "";
    document.getElementById("infoCoAddress").value = co.address || "";
    document.getElementById("infoCoTel").value = co.tel || "";
    document.getElementById("infoCoFax").value = co.fax || "";
    document.getElementById("infoCoInvoice").value = co.invoice || "";
    infoOverlay.classList.add("show");
  }
  function closeInfoModal(){ infoOverlay.classList.remove("show"); }
  function saveInfoModal(){
    state.estimateInfo = {
      clientName: document.getElementById("infoClientName").value,
      honorific: document.getElementById("infoHonorific").value,
      estimateNo: document.getElementById("infoEstimateNo").value,
      siteAddress: document.getElementById("infoSiteAddress").value,
      overview: document.getElementById("infoOverview").value,
      period: document.getElementById("infoPeriod").value,
      paymentTerms: document.getElementById("infoPaymentTerms").value,
      validPeriod: document.getElementById("infoValidPeriod").value,
      remarks: document.getElementById("infoRemarks").value,
      showFooter: document.getElementById("infoShowFooter").checked,
      company: {
        name: document.getElementById("infoCoName").value,
        rep: document.getElementById("infoCoRep").value,
        zip: document.getElementById("infoCoZip").value,
        address: document.getElementById("infoCoAddress").value,
        tel: document.getElementById("infoCoTel").value,
        fax: document.getElementById("infoCoFax").value,
        invoice: document.getElementById("infoCoInvoice").value
      }
    };
    pushHistory();
    scheduleAutosave();
    closeInfoModal();
    showToast("見積書情報を保存しました");
  }
  document.getElementById("btnEstimateInfo").addEventListener("click", openInfoModal);
  document.getElementById("closeInfo").addEventListener("click", closeInfoModal);
  document.getElementById("closeInfo2").addEventListener("click", closeInfoModal);
  document.getElementById("btnInfoSave").addEventListener("click", saveInfoModal);
  infoOverlay.addEventListener("click", function(e){ if(e.target === infoOverlay) closeInfoModal(); });

  // ---------- 見積書出力 ----------
  function escHtml(s){
    return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function buildEstimateHtml(){
    var info = state.estimateInfo || defaultEstimateInfo();
    var co = info.company || defaultEstimateInfo().company;
    var taxRate = state.taxRate || 0.1;

    // ---- collect category subtotals (listed items only) ----
    var cats = [];
    var grandSell = 0;
    state.categories.forEach(function(cat){
      if(cat.hidden) return;
      var items = cat.items.filter(function(it){ return !it.hidden && it.listed; });
      if(!items.length) return;
      var subtotal = 0;
      items.forEach(function(it){ subtotal += it.qty * it.unitSell; });
      grandSell += subtotal;
      cats.push({name:cat.name, spec:cat.spec, items:items, subtotal:subtotal});
    });
    var taxAmount = Math.round(grandSell * taxRate);
    var total = grandSell + taxAmount;

    var d = new Date();
    function p2(x){ return (x<10?"0":"")+x; }
    var dateStr = d.getFullYear()+"年"+p2(d.getMonth()+1)+"月"+p2(d.getDate())+"日";

    // ---- shared CSS ----
    var css =
      '@page{ size: A4 landscape; margin: 12mm 14mm; }' +
      '*{box-sizing:border-box;}' +
      'body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;color:#222;margin:0;}' +
      '.sheet{width:100%;padding:6mm 4mm;page-break-after:always;page-break-inside:avoid;position:relative;overflow:hidden;}' +
      '.sheet:last-child{page-break-after:auto;}' +
      '.doc-head{display:flex;justify-content:space-between;font-size:10.5px;color:#555;margin-bottom:4px;}' +
      'table{width:100%;border-collapse:collapse;font-size:12px;}' +
      'th{background:#eef0f4;border:1px solid #999;padding:5px 8px;font-size:11px;}' +
      'td{border:1px solid #bbb;padding:4px 8px;}' +
      'td.l{text-align:left;} td.r{text-align:right;} td.c{text-align:center;}' +
      'tr.cat td{background:#eef0f7;font-weight:700;}' +
      'tr.subtotal td{background:#fafafa;font-weight:600;}' +
      '@media print{ .sheet{padding:0;} }';

    // ---- 鏡 (cover page) ----
    var cover =
      '<div class="sheet" style="max-width:900px;margin:0 auto;">' +
        '<div class="doc-head"><span>No. '+escHtml(info.estimateNo)+'</span><span>Page. 1</span></div>' +
        '<div style="border:2px solid #222;text-align:center;font-size:24px;font-weight:700;letter-spacing:.6em;padding:10px 0;margin-bottom:18px;">御見積書</div>' +
        '<div style="font-size:12px;margin-bottom:2px;">'+dateStr+'</div>' +
        '<div style="font-size:16px;font-weight:700;border-bottom:1.5px solid #222;display:inline-block;padding-bottom:2px;margin-bottom:10px;">'+escHtml(info.clientName||"　")+'　'+escHtml(info.honorific||"御中")+'</div>' +
        '<div style="font-size:12.5px;margin-bottom:2px;">工事件名：'+escHtml(state.projectName)+'</div>' +
        '<div style="font-size:12px;color:#555;margin-bottom:14px;">下記のとおり御見積申し上げます。</div>' +
        '<div style="text-align:center;font-size:26px;font-weight:700;margin:14px 0 8px;">御見積金額　'+yen(total)+'　－</div>' +
        '<div style="text-align:center;font-size:12px;color:#555;border-top:1px solid #999;border-bottom:2.5px solid #222;padding:8px 0 14px;margin-bottom:22px;">内消費税および地方消費税　'+yen(taxAmount)+'　－　　税抜合計金額　'+yen(grandSell)+'　－</div>' +
        '<div style="display:flex;justify-content:space-between;gap:24px;">' +
          '<div style="font-size:12.5px;line-height:2;">' +
            (info.siteAddress ? '工事場所：'+escHtml(info.siteAddress)+'<br>' : '') +
            '工事概要：'+escHtml(info.overview||state.projectName)+'<br>' +
            '工事期間：'+escHtml(info.period)+'<br>' +
            '支払条件：'+escHtml(info.paymentTerms)+'<br>' +
            '有効期限：'+escHtml(info.validPeriod) +
          '</div>' +
          '<div style="font-size:12.5px;line-height:1.9;text-align:left;min-width:260px;">' +
            '<div style="font-size:14px;font-weight:700;margin-bottom:4px;">'+escHtml(co.name)+'</div>' +
            (co.rep ? escHtml(co.rep)+'<br>' : '') +
            (co.zip ? escHtml(co.zip)+'<br>' : '') +
            (co.address ? escHtml(co.address)+'<br>' : '') +
            (co.tel ? 'TEL. '+escHtml(co.tel)+'<br>' : '') +
            (co.fax ? 'FAX. '+escHtml(co.fax)+'<br>' : '') +
            (co.invoice ? '<div style="margin-top:8px;display:flex;align-items:center;gap:10px;">インボイス登録番号 '+escHtml(co.invoice)+'<span style="border:1px solid #999;border-radius:50%;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;">印</span></div>' : '') +
          '</div>' +
        '</div>' +
        (info.remarks ? '<div style="margin-top:26px;font-size:12.5px;"><div style="font-weight:700;border-bottom:1px solid #222;display:inline-block;margin-bottom:6px;">備考</div><div style="white-space:pre-wrap;line-height:1.8;">'+escHtml(info.remarks)+'</div></div>' : '') +
      '</div>';

    // ---- 内訳 (summary breakdown) ----
    var showFooter = info.showFooter !== false;
    var footerLine = showFooter
      ? '<div style="font-size:11px;color:#666;">'+escHtml(state.projectName)+'　/　'+escHtml(info.clientName||"")+(info.clientName ? '　'+escHtml(info.honorific||"御中") : "")+'　/　'+dateStr+'　/　No.'+escHtml(info.estimateNo)+'</div>'
      : '';
    var summaryRows = cats.map(function(c, i){
      var memo = c.items.length===1 ? escHtml(c.items[0].spec||"") : "";
      return '<tr><td class="c">'+(i+1)+'</td><td class="l">'+escHtml(c.name)+'</td><td class="r">1</td><td class="c">式</td><td class="r">'+yen(c.subtotal)+'</td><td class="l">'+memo+'</td></tr>';
    }).join("");
    var summary =
      '<div class="sheet">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">' +
          '<div style="font-size:16px;font-weight:700;">見積書内訳</div>' +
          footerLine +
        '</div>' +
        '<table><thead><tr><th style="width:5%">No</th><th style="width:34%">工事名称</th><th style="width:8%">数量</th><th style="width:8%">単位</th><th style="width:20%">金額</th><th style="width:25%">備考</th></tr></thead>' +
        '<tbody>' + summaryRows +
        '<tr><td colspan="4" class="r" style="font-weight:700;">小　計</td><td class="r" style="font-weight:700;">'+yen(grandSell)+'</td><td></td></tr>' +
        '<tr><td colspan="4" class="r">消費税（'+Math.round(taxRate*100)+'%）</td><td class="r">'+yen(taxAmount)+'</td><td></td></tr>' +
        '<tr><td colspan="4" class="r" style="font-weight:700;font-size:13px;">合　計（税込）</td><td class="r" style="font-weight:700;font-size:13px;">'+yen(total)+'</td><td></td></tr>' +
        '</tbody></table>' +
      '</div>';

    // ---- per-category detail sheets ----
    var detailSheets = cats.map(function(c, i){
      var rows = c.items.map(function(it){
        return '<tr><td class="l">'+escHtml(it.name)+'</td><td class="r">'+it.qty+'</td><td class="c">'+escHtml(it.unit)+'</td><td class="r">'+yen(it.unitSell)+'</td><td class="r">'+yen(it.qty*it.unitSell)+'</td><td class="l">'+escHtml(it.spec)+'</td></tr>';
      }).join("");
      return '<div class="sheet">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">' +
          '<div style="font-size:15px;font-weight:700;">'+(i+1)+'. '+escHtml(c.name)+'</div>' +
          footerLine +
        '</div>' +
        '<table><thead><tr><th style="width:28%">工事名称</th><th style="width:8%">数量</th><th style="width:8%">単位</th><th style="width:14%">単価</th><th style="width:16%">金額</th><th style="width:26%">形状寸法等</th></tr></thead>' +
        '<tbody>' + rows +
        '<tr><td colspan="4" class="r" style="font-weight:700;">小　計</td><td class="r" style="font-weight:700;">'+yen(c.subtotal)+'</td><td></td></tr>' +
        '</tbody></table>' +
      '</div>';
    }).join("");

    return '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">' +
      '<title>'+escHtml(state.projectName)+' 御見積書</title>' +
      '<style>'+css+'</style></head><body>' +
      cover + summary + detailSheets +
      '</body></html>';
  }
  function openEstimateModal(){
    var html = buildEstimateHtml();
    var wrap = document.getElementById("estimatePreview");
    wrap.innerHTML = '<iframe id="estimateFrame" style="width:100%;height:70vh;border:none;display:block;"></iframe>';
    var frame = document.getElementById("estimateFrame");
    frame.srcdoc = html;
    document.getElementById("estimateOverlay").classList.add("show");
  }
  function downloadEstimateHtml(){
    var html = buildEstimateHtml();
    var blob = new Blob([html], {type:"text/html"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (state.projectName || "見積書") + "_見積書.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    showToast("ダウンロードしました");
  }
  function printEstimate(){
    var frame = document.getElementById("estimateFrame");
    if(!frame || !frame.contentWindow) return;
    frame.contentWindow.focus();
    frame.contentWindow.print();
  }
  document.getElementById("btnEstimateOutput").addEventListener("click", openEstimateModal);
  document.getElementById("closeEstimate").addEventListener("click", function(){ document.getElementById("estimateOverlay").classList.remove("show"); });
  document.getElementById("closeEstimate2").addEventListener("click", function(){ document.getElementById("estimateOverlay").classList.remove("show"); });
  document.getElementById("estimateOverlay").addEventListener("click", function(e){ if(e.target === this) this.classList.remove("show"); });
  document.getElementById("btnEstimateDownload").addEventListener("click", downloadEstimateHtml);
  document.getElementById("btnEstimatePrint").addEventListener("click", printEstimate);

  // ---------- toast ----------
  var toastTimer = null;
  function showToast(msg){
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 1800);
  }

  // ---------- init ----------
  // ①案件管理から「?caseId=...」付きで開かれた場合、その案件専用の物件を自動選択する
  // (無ければ案件名・宛先などを反映した新規物件を作って保存し、次回も同じ物件を開けるようにする)
  function applyCaseLink(){
    try{
      var params = new URLSearchParams(window.location.search);
      var caseId = params.get("caseId");
      if(!caseId) return false;
      var caseName = params.get("caseName") || "";
      var customerName = params.get("customerName") || "";
      var honorific = params.get("honorific") || "";
      var buildingName = params.get("buildingName") || "";
      var buildingAddress = params.get("buildingAddress") || "";
      var siteAddr = buildingAddress || buildingName || "";

      var projects = loadProjects();
      var proj = projects.find(function(p){ return p.caseId === caseId; });

      if(proj && proj.versions && proj.versions.length){
        state = normalizeState(JSON.parse(JSON.stringify(proj.versions[0].data)));
      } else {
        state = sampleState();
      }

      // 宛先・工事件名・工事場所は、案件管理側の基本情報を常に最新の状態で反映する
      // (明細データ(categories)は上書きしない。既存物件でも毎回同期されるので、
      //  過去に古い仮データのまま作られてしまった物件を開き直しても正しく反映される)
      if(caseName) state.projectName = caseName;
      state.estimateInfo.clientName = customerName || "";
      state.estimateInfo.honorific = honorific || "御中";
      state.estimateInfo.overview = caseName || "";
      state.estimateInfo.siteAddress = siteAddr;

      var snap = JSON.parse(JSON.stringify(state));
      if(proj){
        proj.name = state.projectName;
        proj.versions[0].data = snap;
        saveProjects(projects);
        currentProjectId = proj.id;
      } else {
        var newProj = { id: uid(), name: state.projectName, caseId: caseId, versions: [{versionId: uid(), savedAt: nowLabel(), data: snap}] };
        projects.unshift(newProj);
        saveProjects(projects);
        currentProjectId = newProj.id;
      }
      currentVersionIndex = 0;
      return true;
    }catch(e){ console.warn("案件連携エラー", e); return false; }
  }

  function init(){
    if(applyCaseLink()){
      // 案件連携で読み込み済みなのでドラフト(前回の編集途中データ)は無視する
    } else {
      var draftRaw = localStorage.getItem(DRAFT_KEY);
      if(draftRaw){
        try{
          var draft = JSON.parse(draftRaw);
          state = normalizeState(draft.state);
          currentProjectId = draft.currentProjectId;
          currentVersionIndex = draft.currentVersionIndex || 0;
        }catch(e){ state = sampleState(); }
      } else {
        state = sampleState();
      }
    }
    loadColWidths();
    renderHead();
    applyAllWidths();
    setupColumnResize();
    setupCellSelection();
    render();
    renderVersionSelect();
    updateLastSaved();
    resetHistory();
  }
  Promise.all([
    fsPullToLocal(STORAGE_KEY),
    fsPullToLocal(COLW_KEY),
    fsPullToLocal(DRAFT_KEY)
  ]).then(init).catch(init);
})();
</script>
