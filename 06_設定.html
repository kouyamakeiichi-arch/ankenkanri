<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>設定 | 太豊建設アプリ</title>
<style>
  :root {
    --bg: #F6F5FB; --surface: #FFFFFF; --primary: #6C47FF; --primary-dark: #5636D9;
    --primary-soft: #EFEAFF; --text: #1E1B2E; --text-secondary: #6B6580; --text-tertiary: #9C97AE;
    --border: #E7E4F0; --danger: #F0525C; --success: #10B981; --radius: 12px;
    --shadow-sm: 0 1px 2px rgba(30,27,46,0.06); --shadow-md: 0 8px 24px rgba(30,27,46,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Yu Gothic','Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }
  .shell { max-width: 1240px; margin: 0 auto; padding: 20px 20px 60px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .page-header__title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 22px; }
  .page-header__title .badge-count { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600; color: var(--primary); background: var(--primary-soft); padding: 3px 9px; border-radius: 100px; }
  .page-header__actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .search-box { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
  .search-box input { width: 100%; padding: 10px 12px 10px 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn--primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn--primary:hover { background: var(--primary-dark); }
  .btn--ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn--ghost:hover { background: #F1EFFB; }
  .btn--danger-ghost { background: transparent; color: var(--danger); border-color: #FBD5D8; }
  .btn--danger-ghost:hover { background: #FEF1F2; }
  .btn--sm { padding: 7px 12px; font-size: 12.5px; }

  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:hover { background: #F1EFFB; color: var(--text); }

  .module-tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 5px; flex-wrap: wrap; }
  .module-tab { display:flex; align-items:center; gap:6px; font-family: inherit; font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .module-tab.is-active { background: var(--primary); color: white; }
  .module-tab.is-disabled { color: var(--text-tertiary); cursor: default; }
  .module-tab .soon { font-size: 9px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 1px 6px; border-radius: 999px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
  table.data-table { width: 100%; border-collapse: collapse; }
  .data-table thead th { text-align: left; font-size: 12px; font-weight: 700; color: var(--text-tertiary); padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table tbody tr { border-bottom: 1px solid var(--border); }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: #FBFAFF; }
  .data-table td { padding: 13px 16px; font-size: 13.5px; vertical-align: middle; white-space: nowrap; }
  .cell-name { font-weight: 700; background:none; border:none; cursor:pointer; text-align:left; color:inherit; font-family:inherit; font-size:inherit; padding:0; }
  .cell-actions { text-align: right; }
  .amount-text { font-family: 'Courier New', monospace; font-weight: 700; }
  .tax-note { font-size: 10.5px; color: var(--text-tertiary); display:block; }

  .biz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 640px; }
  .biz-card h3 { font-size: 13px; color: var(--text-tertiary); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: .04em; }
  .biz-card h3:first-child { margin-top: 0; }
  .biz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
  .biz-grid .field--full { grid-column: 1 / -1; }
  @media (max-width: 560px) { .biz-grid { grid-template-columns: 1fr; } }

  .role-badge { display:inline-block; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 999px; color: white; }

  .card-list { display: none; flex-direction: column; gap: 10px; }
  .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; border-left: 4px solid var(--primary); }
  .data-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .data-card__name { font-weight: 700; font-size: 15px; }
  .data-card__meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 10px; font-size: 12.5px; color: var(--text-secondary); }

  @media (max-width: 860px) {
    .table-wrap { display: none; }
    .card-list { display: flex; }
    .shell { padding: 14px 12px 80px; }
    .page-header__title { font-size: 19px; }
    .search-box { max-width: none; order: 3; flex-basis: 100%; }
  }

  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; color: var(--text-tertiary); gap: 8px; }
  .empty-state__title { font-weight: 700; color: var(--text); font-size: 15px; margin-top: 6px; }
  .empty-state__desc { font-size: 13px; margin-bottom: 10px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
  .modal__header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .modal__header h2 { font-size: 17px; font-weight: 700; margin: 0; }
  .modal__body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal__footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); }
  .modal__footer-right { display: flex; gap: 8px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12.5px; font-weight: 700; color: var(--text-secondary); }
  .field .req { color: var(--danger); }
  .field input, .field select, .field textarea { font-family: inherit; font-size: 14px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; outline: none; color: var(--text); background: var(--surface); width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .field input.is-error, .field select.is-error { border-color: var(--danger); }
  .field__error { color: var(--danger); font-size: 11.5px; margin: 0; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; min-width: 0; }
  .unit-row { display: flex; gap: 6px; }
  .unit-row select { flex: 1; }
  @media (max-width: 480px) { .field-row { flex-direction: column; } }

  .confirm-box { background: var(--surface); border-radius: 14px; padding: 20px; max-width: 360px; width: 100%; box-shadow: var(--shadow-md); }
  .confirm-box__icon { color: var(--danger); margin-bottom: 8px; }
  .confirm-box h3 { margin: 0 0 6px; font-size: 15px; }
  .confirm-box p { margin: 0 0 16px; font-size: 13px; color: var(--text-secondary); }
  .confirm-box__actions { display: flex; justify-content: flex-end; gap: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 200; display: flex; align-items: center; gap: 8px; }

  .loading-wrap { display:flex; align-items:center; justify-content:center; padding: 80px 0; color: var(--text-tertiary); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid var(--primary-soft); border-top-color: var(--primary); animation: spin .7s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; flex-shrink: 0; }
  .hamburger-btn:hover { background: #F1EFFB; }
  .shell-wrap { transition: margin-left .2s ease; }
  @media (min-width: 961px) { .shell-wrap.sidebar-open { margin-left: 232px; } }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 232px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 18px 12px; display: flex; flex-direction: column;
    gap: 2px; overflow-y: auto; z-index: 150; transform: translateX(-100%); transition: transform .2s ease;
  }
  .sidebar.is-open { transform: translateX(0); box-shadow: var(--shadow-md); }
  .sidebar__brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 15px; color: var(--primary); padding: 6px 10px 16px; text-decoration:none; }
  .sidebar__section { font-size: 11px; font-weight: 700; color: var(--text-tertiary); padding: 14px 12px 4px; }
  .sidebar__link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--text-secondary); text-decoration: none; }
  .sidebar__link:hover { background: #F1EFFB; color: var(--text); }
  .sidebar__link.is-active { background: var(--primary-soft); color: var(--primary); }
  .sidebar__link.is-disabled { color: var(--text-tertiary); cursor: default; pointer-events: none; }
  .sidebar__link .soon { margin-left: auto; font-size: 9.5px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); z-index: 140; display: none; }
  .sidebar-overlay.is-open { display: block; }
</style>

<script>
(function () {
  "use strict";

  function storageGet(key) {
    return new Promise(function (resolve) {
      if (window.db) {
        window.db.collection("taiho_app_data").doc(key).get().then(function (doc) {
          resolve(doc.exists ? { value: doc.data().value } : null);
        }).catch(function () {
          try { var raw = window.localStorage.getItem(key); resolve(raw ? { value: raw } : null); }
          catch (e) { resolve(null); }
        });
      } else if (window.storage && typeof window.storage.get === "function") {
        window.storage.get(key, false).then(resolve).catch(function () { resolve(null); });
      } else {
        try { var raw = window.localStorage.getItem(key); resolve(raw ? { value: raw } : null); }
        catch (e) { resolve(null); }
      }
    });
  }
  function storageSet(key, value) {
    return new Promise(function (resolve) {
      if (window.db) {
        window.db.collection("taiho_app_data").doc(key).set({ value: value, updatedAt: Date.now() }).then(function () {
          resolve({ value: value });
        }).catch(function () {
          try { window.localStorage.setItem(key, value); } catch (e) {}
          resolve({ value: value });
        });
      } else if (window.storage && typeof window.storage.set === "function") {
        window.storage.set(key, value, false).then(resolve).catch(function () {
          try { window.localStorage.setItem(key, value); } catch (e) {}
          resolve({ value: value });
        });
      } else {
        try { window.localStorage.setItem(key, value); } catch (e) {}
        resolve({ value: value });
      }
    });
  }

  var PRICE_ITEMS_KEY = "taiho_price_items_v2";
  var BIZ_INFO_KEY = "taiho_biz_info_v1";
  var MEMBERS_KEY = "taiho_members_v1";
  var ROLES = [
    { id: "owner",   label: "オーナー", color: "#6C47FF" },
    { id: "admin",   label: "管理者",   color: "#F59E0B" },
    { id: "finance", label: "経理",     color: "#22D3EE" },
    { id: "member",  label: "一般",     color: "#94A3B8" }
  ];
  function roleOf(id) { for (var i=0;i<ROLES.length;i++) if (ROLES[i].id===id) return ROLES[i]; return ROLES[ROLES.length-1]; }

  var TYPE_SETTINGS_CATEGORIES = [

  function backupAll() {
    var btn = document.getElementById("backupBtn");
    var status = document.getElementById("backupStatus");
    if (btn) { btn.disabled = true; btn.textContent = "書き出し中..."; }
    if (status) status.textContent = "";
    Promise.all(BACKUP_KEYS.map(function (k) { return storageGet(k.key); })).then(function (results) {
      var data = {};
      BACKUP_KEYS.forEach(function (k, i) {
        data[k.key] = (results[i] && results[i].value) ? results[i].value : null;
      });
      var obj = { app: "taiho-kensetsu-app", version: 1, exportDate: new Date().toLocaleString("ja-JP"), data: data };
      var json = JSON.stringify(obj, null, 2);
      var blob = new Blob([json], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      var d = new Date();
      var ds = d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0") + "_" + String(d.getHours()).padStart(2,"0") + String(d.getMinutes()).padStart(2,"0");
      a.download = "taiho_backup_" + ds + ".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast("バックアップを書き出しました");
      if (status) status.textContent = "最終書き出し: " + obj.exportDate;
    }).catch(function () {
      showToast("書き出しに失敗しました");
    }).then(function () {
      if (btn) { btn.disabled = false; btn.textContent = "📤 全データをバックアップ(PCに保存)"; }
    });
  }

  function restoreFromFile(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var obj = JSON.parse(e.target.result);
        if (!obj || !obj.data || typeof obj.data !== "object") {
          alert("このファイルは対応していない形式です。「全データをバックアップ」で作成したファイルを選んでください。");
          input.value = ""; return;
        }
        if (!confirm("バックアップファイル「" + file.name + "」から復元します。\n現在クラウドに保存されているデータは全て上書きされます。\nこの操作は元に戻せません。よろしいですか？")) {
          input.value = ""; return;
        }
        var keys = Object.keys(obj.data);
        Promise.all(keys.map(function (k) {
          var v = obj.data[k];
          if (v === null || v === undefined) return Promise.resolve();
          return storageSet(k, v);
        })).then(function () {
          showToast("復元しました。ページを再読み込みします...");
          setTimeout(function () { location.reload(); }, 1200);
        }).catch(function () {
          alert("復元中にエラーが発生しました。");
        });
      } catch (ex) {
        alert("読み込みに失敗しました。正しいバックアップファイルか確認してください。\n" + ex.message);
      }
      input.value = "";
    };
    reader.readAsText(file, "UTF-8");
  }

      '<div class="table-wrap"><table class="data-table"><thead><tr><th>名称</th>' +
      (cat.hasHonorific ? '<th>帳票敬称</th>' : '') + (cat.hasDone ? '<th>完了とみなす</th>' : '') +
      '<th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';

    area.querySelectorAll("[data-tedit]").forEach(function (el) {
      el.addEventListener("click", function () {
        var t = list.find(function (x) { return x.id === el.getAttribute("data-tedit"); });
        if (t) openTypeModal(true, t);
      });
    });
  }

  function openTypeModal(isEdit, data) {
    var cat = typeCategoryOf(state.activeTypeCategory);
    editModal = { kind: "typeItem", isEdit: isEdit, category: cat.id, data: data ? Object.assign({}, data) : { label: "", color: "#6C47FF", done: false, honorific: "様" } };
    renderTypeModal();
  }
  function closeTypeModal() { editModal = null; document.getElementById("modalRoot").innerHTML = ""; }
  function renderTypeModal() {
    var root = document.getElementById("modalRoot");
    if (!editModal) { root.innerHTML = ""; return; }
    var cat = typeCategoryOf(editModal.category), d = editModal.data, isEdit = editModal.isEdit;
    root.innerHTML =
      '<div class="modal-overlay" id="modalOverlay"><div class="modal" role="dialog" aria-modal="true">' +
      '<div class="modal__header"><h2>' + (isEdit ? cat.label + "を編集" : cat.label + "を追加") + '</h2><button class="icon-btn" id="modalCloseBtn" aria-label="閉じる">' + ICON_X + '</button></div>' +
      '<div class="modal__body">' +
      '<div class="field"><label>名称 <span class="req">*</span></label><input type="text" id="f_tlabel" value="' + esc(d.label) + '" /><p class="field__error" id="err_tlabel" style="display:none"></p></div>' +
      '<div class="field" style="max-width:120px"><label>色</label><input type="color" id="f_tcolor" value="' + esc(d.color) + '" style="height:40px;padding:4px;" /></div>' +
      (cat.hasHonorific ? '<div class="field"><label>帳票敬称</label><input type="text" id="f_thonorific" value="' + esc(d.honorific||"") + '" /></div>' : '') +
      (cat.hasDone ? '<label class="toggle-check" style="margin-top:4px;"><input type="checkbox" id="f_tdone"' + (d.done?" checked":"") + ' /> このステータスは完了とみなす</label>' : '') +
      '</div><div class="modal__footer">' +
      (isEdit ? '<button class="btn btn--danger-ghost" id="modalDeleteBtn">' + ICON_TRASH + ' 削除</button>' : '<span></span>') +
      '<div class="modal__footer-right"><button class="btn btn--ghost" id="modalCancelBtn">キャンセル</button><button class="btn btn--primary" id="modalSaveBtn">' + (isEdit ? "保存" : "追加") + '</button></div>' +
      '</div></div></div>';
    document.getElementById("modalCloseBtn").addEventListener("click", closeTypeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeTypeModal);
    document.getElementById("modalOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "modalOverlay") closeTypeModal(); });
    document.getElementById("f_tlabel").focus();
    if (isEdit) document.getElementById("modalDeleteBtn").addEventListener("click", function () { confirmDeleteId = { kind: "typeItem", id: d.id }; closeTypeModal(); renderConfirm(); });
    document.getElementById("modalSaveBtn").addEventListener("click", function () {
      var label = document.getElementById("f_tlabel").value.trim();
      if (!label) { document.getElementById("err_tlabel").textContent = "名称を入力してください"; document.getElementById("err_tlabel").style.display = "block"; return; }
      var form = { id: d.id, label: label, color: document.getElementById("f_tcolor").value };
      if (cat.hasHonorific) form.honorific = document.getElementById("f_thonorific").value.trim();
      if (cat.hasDone) form.done = document.getElementById("f_tdone").checked;
      var list = state.typeSettings[cat.id] || [];
      if (isEdit) {
        persistTypeList(cat.id, list.map(function (t) { return t.id === form.id ? Object.assign({}, t, form) : t; }));
        showToast(cat.label + "を更新しました");
      } else {
        form.id = cat.id + "-" + Date.now();
        persistTypeList(cat.id, list.concat([form]));
        showToast(cat.label + "を追加しました");
      }
      closeTypeModal();
      renderResults();
    });
  }

  function openModal(isEdit, data) {
    editModal = { isEdit: isEdit, data: data ? Object.assign({}, data) : { name: "", spec: "", qty: 1, unit: state.units[0] || "式", sellPrice: "", costPrice: "", coef: "" } };
    renderModal();
  }
  function closeModal() { editModal = null; document.getElementById("modalRoot").innerHTML = ""; }

  function renderModal() {
    var root = document.getElementById("modalRoot");
    if (!editModal) { root.innerHTML = ""; return; }
    var d = editModal.data, isEdit = editModal.isEdit;

    root.innerHTML =
      '<div class="modal-overlay" id="modalOverlay"><div class="modal" role="dialog" aria-modal="true">' +
      '<div class="modal__header"><h2>' + (isEdit ? "単価を編集" : "単価を追加") + '</h2><button class="icon-btn" id="modalCloseBtn" aria-label="閉じる">' + ICON_X + '</button></div>' +
      '<div class="modal__body">' +
      '<div class="field"><label>名称 <span class="req">*</span></label><input type="text" id="f_name" placeholder="例: 玄関ポスト" value="' + esc(d.name) + '" /><p class="field__error" id="err_name" style="display:none"></p></div>' +
      '<div class="field"><label>仕様・摘要</label><input type="text" id="f_spec" placeholder="例: 天井、壁500番" value="' + esc(d.spec) + '" /></div>' +
      '<div class="field-row">' +
      '<div class="field" style="max-width:110px"><label>数量</label><input type="number" id="f_qty" value="' + esc(d.qty) + '" /></div>' +
      '<div class="field"><label>単位</label><div class="unit-row">' +
      '<select id="f_unit">' + unitOptions(d.unit) + '</select>' +
      '<button type="button" class="btn btn--ghost btn--sm" id="addUnitBtn">' + ICON_PLUS + '</button>' +
      '</div></div>' +
      '</div>' +
      '<div class="field-row">' +
      '<div class="field"><label>予定原価(税抜)</label><input type="number" id="f_costPrice" placeholder="例: 15000" value="' + esc(d.costPrice) + '" /></div>' +
      '<div class="field" style="max-width:150px"><label>係数</label><select id="f_coef">' +
      '<option value=""' + (!d.coef?" selected":"") + '>手動入力</option>' +
      '<option value="1.20"' + (d.coef==="1.20"?" selected":"") + '>×1.20</option>' +
      '<option value="1.25"' + (d.coef==="1.25"?" selected":"") + '>×1.25</option>' +
      '<option value="1.30"' + (d.coef==="1.30"?" selected":"") + '>×1.30</option>' +
      '<option value="1.35"' + (d.coef==="1.35"?" selected":"") + '>×1.35</option>' +
      '<option value="1.40"' + (d.coef==="1.40"?" selected":"") + '>×1.40</option>' +
      '<option value="1.45"' + (d.coef==="1.45"?" selected":"") + '>×1.45</option>' +
      '<option value="1.50"' + (d.coef==="1.50"?" selected":"") + '>×1.50</option>' +
      '<option value="custom"' + (d.coef==="custom"?" selected":"") + '>その他(入力)</option>' +
      '</select></div>' +
      '<div class="field" id="coefCustomWrap" style="max-width:90px;display:' + (d.coef==="custom"?"flex":"none") + '"><label>倍率</label><input type="number" step="0.01" id="f_coefCustom" placeholder="例: 1.32" value="' + esc(d.coefCustom||"") + '" /></div>' +
      '</div>' +
      '<div class="field"><label>販売価格(税抜) <span class="hint" style="font-size:11px;color:var(--text-tertiary);font-weight:400;">係数を選ぶと自動計算されます(手動修正も可)</span></label><input type="number" id="f_sellPrice" placeholder="例: 18000" value="' + esc(d.sellPrice) + '" /></div>' +
      '</div><div class="modal__footer">' +
      (isEdit ? '<button class="btn btn--danger-ghost" id="modalDeleteBtn">' + ICON_TRASH + ' 削除</button>' : '<span></span>') +
      '<div class="modal__footer-right"><button class="btn btn--ghost" id="modalCancelBtn">キャンセル</button><button class="btn btn--primary" id="modalSaveBtn">' + (isEdit ? "保存" : "追加") + '</button></div>' +
      '</div></div></div>';

    function recalcSellPrice() {
      var coefSel = document.getElementById("f_coef").value;
      var cost = Number(document.getElementById("f_costPrice").value);
      var coefValue = null;
      if (coefSel === "custom") {
        var cv = Number(document.getElementById("f_coefCustom").value);
        if (!isNaN(cv) && cv > 0) coefValue = cv;
      } else if (coefSel) {
        coefValue = Number(coefSel);
      }
      if (coefValue && !isNaN(cost) && cost > 0) {
        document.getElementById("f_sellPrice").value = Math.round(cost * coefValue);
      }
    }
    document.getElementById("f_coef").addEventListener("change", function () {
      document.getElementById("coefCustomWrap").style.display = this.value === "custom" ? "flex" : "none";
      recalcSellPrice();
    });
    document.getElementById("f_coefCustom").addEventListener("input", recalcSellPrice);
    document.getElementById("f_costPrice").addEventListener("input", recalcSellPrice);

    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "modalOverlay") closeModal(); });
    document.getElementById("f_name").focus();
    if (isEdit) document.getElementById("modalDeleteBtn").addEventListener("click", function () { confirmDeleteId = { kind: "item", id: d.id }; closeModal(); renderConfirm(); });

    document.getElementById("addUnitBtn").addEventListener("click", function () {
      var newUnit = window.prompt("追加する単位名を入力してください(例: セット)");
      if (!newUnit) return;
      newUnit = newUnit.trim();
      if (!newUnit) return;
      if (state.units.indexOf(newUnit) === -1) {
        persistUnits(state.units.concat([newUnit]));
      }
      var sel = document.getElementById("f_unit");
      sel.innerHTML = unitOptions(newUnit);
    });

    document.getElementById("modalSaveBtn").addEventListener("click", function () {
      var name = document.getElementById("f_name").value.trim();
      if (!name) { document.getElementById("err_name").textContent = "名称を入力してください"; document.getElementById("err_name").style.display = "block"; document.getElementById("f_name").classList.add("is-error"); return; }
      var form = {
        id: d.id, name: name,
        spec: document.getElementById("f_spec").value.trim(),
        qty: document.getElementById("f_qty").value,
        unit: document.getElementById("f_unit").value,
        sellPrice: document.getElementById("f_sellPrice").value,
        costPrice: document.getElementById("f_costPrice").value,
        coef: document.getElementById("f_coef").value,
        coefCustom: document.getElementById("f_coefCustom").value
      };
      if (isEdit) {
        persistItems(state.items.map(function (it) { return it.id === form.id ? Object.assign({}, it, form) : it; }));
        showToast("単価を更新しました");
      } else {
        form.id = "u-" + Date.now();
        persistItems([form].concat(state.items));
        showToast("単価を追加しました");
      }
      closeModal();
      renderResults();
    });
  }

  function renderConfirm() {
    var root = document.getElementById("modalRoot");
    if (!confirmDeleteId) { root.innerHTML = ""; return; }
    var labelMap = { item: "単価項目", member: "メンバー", typeItem: "項目" };
    root.innerHTML =
      '<div class="modal-overlay" id="confirmOverlay"><div class="confirm-box">' + ICON_ALERT +
      '<h3>この' + labelMap[confirmDeleteId.kind] + 'を削除しますか?</h3><p>削除すると元に戻せません。</p>' +
      '<div class="confirm-box__actions"><button class="btn btn--ghost btn--sm" id="confirmCancelBtn">キャンセル</button>' +
      '<button class="btn btn--danger-ghost btn--sm" id="confirmDeleteBtn">削除する</button></div></div></div>';
    document.getElementById("confirmOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "confirmOverlay") { confirmDeleteId = null; renderConfirm(); } });
    document.getElementById("confirmCancelBtn").addEventListener("click", function () { confirmDeleteId = null; renderConfirm(); });
    document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
      if (confirmDeleteId.kind === "item") {
        persistItems(state.items.filter(function (it) { return it.id !== confirmDeleteId.id; }));
        showToast("単価項目を削除しました");
      } else if (confirmDeleteId.kind === "member") {
        persistMembers(state.members.filter(function (m) { return m.id !== confirmDeleteId.id; }));
        showToast("メンバーを削除しました");
      } else {
        var catId = state.activeTypeCategory;
        var list = state.typeSettings[catId] || [];
        persistTypeList(catId, list.filter(function (t) { return t.id !== confirmDeleteId.id; }));
        showToast("項目を削除しました");
      }
      confirmDeleteId = null;
      renderConfirm();
      renderResults();
    });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (editModal) closeModal();
      if (confirmDeleteId) { confirmDeleteId = null; renderConfirm(); }
    }
  });

  document.getElementById("searchInput").addEventListener("input", function (e) { state.search = e.target.value; renderResults(); });
  document.getElementById("btnCreate").addEventListener("click", function () {
    if (state.tab === "members") openMemberModal(false, null);
    else if (state.tab === "typeSettings") openTypeModal(false, null);
    else openModal(false, null);
  });

  function setSidebar(open) {
    document.getElementById("sidebar").classList.toggle("is-open", open);
    document.getElementById("shellWrap").classList.toggle("sidebar-open", open);
    document.getElementById("sidebarOverlay").classList.toggle("is-open", open && window.innerWidth <= 960);
  }
  document.getElementById("hamburgerBtn").addEventListener("click", function () {
    setSidebar(!document.getElementById("sidebar").classList.contains("is-open"));
  });
  document.getElementById("sidebarOverlay").addEventListener("click", function () { setSidebar(false); });
  setSidebar(window.innerWidth > 960);

  function init() {
    renderResults();
    var typeKeys = TYPE_SETTINGS_CATEGORIES.map(function (c) { return storageGet(c.key); });
    Promise.all([storageGet(PRICE_ITEMS_KEY), storageGet(UNITS_KEY), storageGet(BIZ_INFO_KEY), storageGet(MEMBERS_KEY)].concat(typeKeys)).then(function (res) {
      var iData = null, uData = null, bData = null, mData = null;
      try { iData = res[0] && res[0].value ? JSON.parse(res[0].value) : null; } catch (e) {}
      try { uData = res[1] && res[1].value ? JSON.parse(res[1].value) : null; } catch (e) {}
      try { bData = res[2] && res[2].value ? JSON.parse(res[2].value) : null; } catch (e) {}
      try { mData = res[3] && res[3].value ? JSON.parse(res[3].value) : null; } catch (e) {}
      state.items = Array.isArray(iData) ? iData : seedPriceItems();
      state.units = Array.isArray(uData) ? uData : seedUnits();
      state.bizInfo = bData && typeof bData === "object" ? bData : seedBizInfo();
      state.members = Array.isArray(mData) ? mData : seedMembers();
      if (!Array.isArray(iData)) storageSet(PRICE_ITEMS_KEY, JSON.stringify(state.items));
      if (!Array.isArray(uData)) storageSet(UNITS_KEY, JSON.stringify(state.units));
      if (!bData) storageSet(BIZ_INFO_KEY, JSON.stringify(state.bizInfo));
      if (!Array.isArray(mData)) storageSet(MEMBERS_KEY, JSON.stringify(state.members));

      TYPE_SETTINGS_CATEGORIES.forEach(function (c, i) {
        var raw = res[4 + i];
        var data = null;
        try { data = raw && raw.value ? JSON.parse(raw.value) : null; } catch (e) {}
        var list = Array.isArray(data) ? data : seedForCategory(c.id);
        state.typeSettings[c.id] = list;
        if (!Array.isArray(data)) storageSet(c.key, JSON.stringify(list));
      });

      state.loading = false;
      renderResults();
    }).catch(function () {
      state.items = seedPriceItems();
      state.units = seedUnits();
      state.bizInfo = seedBizInfo();
      state.members = seedMembers();
      TYPE_SETTINGS_CATEGORIES.forEach(function (c) { state.typeSettings[c.id] = seedForCategory(c.id); });
      state.loading = false;
      renderResults();
    });
  }

  init();
})();
</script>
</body>
</html>
