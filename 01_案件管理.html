<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>案件管理 | 太豊建設アプリ</title>
<style>
  :root {
    --bg: #F6F5FB; --surface: #FFFFFF; --primary: #6C47FF; --primary-dark: #5636D9;
    --primary-soft: #EFEAFF; --text: #1E1B2E; --text-secondary: #6B6580; --text-tertiary: #9C97AE;
    --border: #E7E4F0; --danger: #F0525C; --success: #10B981; --radius: 12px;
    --shadow-sm: 0 1px 2px rgba(30,27,46,0.06); --shadow-md: 0 8px 24px rgba(30,27,46,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Yu Gothic','Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

  .shell { max-width: 1240px; margin: 0 auto; padding: 20px 20px 60px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
  .page-header__title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 22px; letter-spacing: 0.01em; }
  .page-header__title .badge-count { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600; color: var(--primary); background: var(--primary-soft); padding: 3px 9px; border-radius: 100px; }
  .page-header__actions { display: flex; gap: 10px; align-items: center; }

  .search-box { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
  .search-box input { width: 100%; padding: 10px 12px 10px 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color .15s, box-shadow .15s; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: transform .1s, background .15s, box-shadow .15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn--primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn--primary:hover { background: var(--primary-dark); }
  .btn--ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn--ghost:hover { background: #F1EFFB; }
  .btn--danger-ghost { background: transparent; color: var(--danger); border-color: #FBD5D8; }
  .btn--danger-ghost:hover { background: #FEF1F2; }
  .btn--sm { padding: 7px 12px; font-size: 12.5px; }

  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:hover { background: #F1EFFB; color: var(--text); }

  .type-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .type-tabs::-webkit-scrollbar { display: none; }
  .type-tab { font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 8px 14px; border-radius: 999px; border: 1px solid transparent; background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .type-tab:hover { background: #EDEAFA; }
  .type-tab.is-active { background: var(--text); color: white; }

  .filter-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .status-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .status-chip { font-family: inherit; font-size: 12px; font-weight: 700; padding: 6px 11px; border-radius: 999px; cursor: pointer; border: 1.5px solid var(--chip-color); color: var(--chip-color); background: color-mix(in srgb, var(--chip-color) 10%, white); transition: all .15s; }
  .status-chip.is-active { background: var(--chip-color); color: white; }

  .toggle-check { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
  .toggle-check input { accent-color: var(--primary); width: 15px; height: 15px; }

  .link-reset { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: var(--primary); background: none; border: none; cursor: pointer; }
  .link-reset:hover { text-decoration: underline; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
  table.projects-table { width: 100%; border-collapse: collapse; }
  .projects-table thead th { text-align: left; font-size: 12px; font-weight: 700; color: var(--text-tertiary); padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .projects-table tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  .projects-table tbody tr:last-child { border-bottom: none; }
  .projects-table tbody tr:hover { background: #FBFAFF; }
  .projects-table td { padding: 13px 16px; font-size: 13.5px; vertical-align: middle; white-space: nowrap; }
  .cell-no { font-family: 'Courier New', monospace; color: var(--text-tertiary); font-size: 12.5px; }
  .cell-name-wrap { display: flex; align-items: center; gap: 10px; }
  .type-bar { width: 4px; height: 26px; border-radius: 3px; background: var(--bar-color); flex-shrink: 0; }
  .cell-name { font-weight: 700; background: none; border: none; cursor: pointer; text-align: left; color: inherit; font-family: inherit; font-size: inherit; padding: 0; }
  .cell-actions { text-align: right; }

  .type-tag { font-size: 11.5px; font-weight: 700; color: var(--tag-color); background: color-mix(in srgb, var(--tag-color) 12%, white); padding: 3px 9px; border-radius: 999px; white-space: nowrap; }

  .status-pill { position: relative; display: inline-flex; align-items: center; gap: 6px; background: var(--pill-color); border-radius: 999px; padding: 5px 26px 5px 10px; }
  .status-pill__dot { width: 6px; height: 6px; border-radius: 50%; background: white; opacity: .9; flex-shrink:0; }
  .status-pill select { appearance: none; background: transparent; border: none; color: white; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; outline: none; }
  .status-pill select option { color: var(--text); }
  .status-pill__chev { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: white; pointer-events:none; }
  .status-pill--sm { padding: 4px 22px 4px 8px; }
  .status-pill--sm select { font-size: 11px; }

  .card-list { display: none; flex-direction: column; gap: 10px; }
  .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; position: relative; border-left: 4px solid var(--bar-color); }
  .project-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .project-card__name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .project-card__no { font-family: 'Courier New', monospace; font-size: 11px; color: var(--text-tertiary); }
  .project-card__meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 10px; font-size: 12.5px; color: var(--text-secondary); }
  .project-card__meta span { display: flex; align-items: center; gap: 4px; }
  .project-card__footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .amount-text { font-family: 'Courier New', monospace; font-weight: 700; color: var(--text); font-size: 13px; }

  @media (max-width: 860px) {
    .table-wrap { display: none; }
    .card-list { display: flex; }
    .shell { padding: 14px 12px 80px; }
    .page-header__title { font-size: 19px; }
    .search-box { max-width: none; order: 3; flex-basis: 100%; }
  }

  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; color: var(--text-tertiary); gap: 8px; }
  .empty-state__title { font-weight: 700; color: var(--text); font-size: 15px; margin-top: 6px; }
  .empty-state__desc { font-size: 13px; margin-bottom: 10px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 300; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
  .modal__header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .modal__header h2 { font-size: 17px; font-weight: 700; margin: 0; }
  .modal__body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal__footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); }
  .modal__footer-right { display: flex; gap: 8px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12.5px; font-weight: 700; color: var(--text-secondary); }
  .field .req { color: var(--danger); }
  .field input, .field select { font-family: inherit; font-size: 14px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; outline: none; color: var(--text); background: var(--surface); width: 100%; }
  .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .field input.is-error, .field select.is-error { border-color: var(--danger); }
  .field__error { color: var(--danger); font-size: 11.5px; margin: 0; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; min-width: 0; }
  @media (max-width: 480px) { .field-row { flex-direction: column; } }

  .confirm-box { background: var(--surface); border-radius: 14px; padding: 20px; max-width: 360px; width: 100%; box-shadow: var(--shadow-md); }
  .confirm-box__icon { color: var(--danger); margin-bottom: 8px; }
  .confirm-box h3 { margin: 0 0 6px; font-size: 15px; }
  .confirm-box p { margin: 0 0 16px; font-size: 13px; color: var(--text-secondary); }
  .confirm-box__actions { display: flex; justify-content: flex-end; gap: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 200; display: flex; align-items: center; gap: 8px; }

  .loading-wrap { display:flex; align-items:center; justify-content:center; padding: 80px 0; color: var(--text-tertiary); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid var(--primary-soft); border-top-color: var(--primary); animation: spin .7s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------------- 案件詳細(ハブ画面) ---------------- */
  .detail-page { position: fixed; inset: 0; background: var(--bg); z-index: 250; overflow-y: auto; }
  .detail-page__inner { max-width: 900px; margin: 0 auto; padding: 20px 20px 60px; }
  .detail-back { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--text-secondary); background: none; border: none; cursor: pointer; padding: 6px 0; margin-bottom: 10px; }
  .detail-back:hover { color: var(--primary); }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
  .detail-head__no { font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-tertiary); }
  .detail-head__name { font-size: 20px; font-weight: 900; margin: 2px 0 8px; }
  .detail-head__meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .detail-tabs { display: flex; gap: 6px; overflow-x: auto; margin: 18px 0 16px; scrollbar-width: none; }
  .detail-tabs::-webkit-scrollbar { display: none; }
  .detail-tab { font-family: inherit; font-weight: 700; font-size: 13px; padding: 9px 15px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
  .detail-tab.is-active { background: var(--primary); border-color: var(--primary); color: white; }
  .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .detail-section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin: 0 0 10px; }
  .detail-info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 20px; margin-bottom: 16px; }
  @media (max-width: 640px) { .detail-info-grid { grid-template-columns: 1fr; } }
  .detail-info-item .l { font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 2px; }
  .detail-info-item .v { font-size: 13.5px; font-weight: 600; }
  .detail-summary-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .detail-summary-item { background: var(--bg); border-radius: 10px; padding: 10px 16px; flex: 1; min-width: 120px; }
  .detail-summary-item .l { font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 2px; }
  .detail-summary-item .v { font-family: 'Courier New', monospace; font-weight: 700; font-size: 15px; }
  .detail-list-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-list-row:last-child { border-bottom: none; }
  .detail-list-row .main { flex: 1; min-width: 0; }
  .detail-list-row .main .t1 { font-weight: 700; }
  .detail-list-row .main .t2 { color: var(--text-tertiary); font-size: 11.5px; margin-top: 1px; }
  .detail-empty { color: var(--text-tertiary); font-size: 13px; padding: 20px 0; text-align: center; }
  .detail-file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 14px; }
  .detail-file-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; position: relative; }
  .detail-file-card__name { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .detail-file-card__sub { font-size: 10.5px; color: var(--text-tertiary); margin: 3px 0 8px; }
  .detail-file-card__actions { display: flex; justify-content: space-between; }
  .detail-upload-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .detail-upload-row select { font-family: inherit; font-size: 12.5px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
  .detail-task-add { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 16px; padding: 14px; background: var(--bg); border-radius: 10px; }
  .detail-task-add input[type="date"] { font-family: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; }
  .detail-task-add textarea { flex: 1; min-width: 180px; font-family: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; resize: vertical; }
  .link-jump { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 700; color: var(--primary); text-decoration: none; }
  .link-jump:hover { text-decoration: underline; }
  @media (max-width: 640px) { .detail-page__inner { padding: 14px 12px 70px; } }

  /* ---------------- サイドバー / ハンバーガー ---------------- */
  .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; flex-shrink: 0; }
  .hamburger-btn:hover { background: #F1EFFB; }
  .shell-wrap { transition: margin-left .2s ease; }
  @media (min-width: 961px) { .shell-wrap.sidebar-open { margin-left: 232px; } }

  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 232px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 18px 12px; display: flex; flex-direction: column;
    gap: 2px; overflow-y: auto; z-index: 150; transform: translateX(-100%); transition: transform .2s ease;
  }
  .sidebar.is-open { transform: translateX(0); box-shadow: var(--shadow-md); }
  .sidebar__brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 15px; color: var(--primary); padding: 6px 10px 16px; text-decoration:none; }
  .sidebar__section { font-size: 11px; font-weight: 700; color: var(--text-tertiary); padding: 14px 12px 4px; }
  .sidebar__link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--text-secondary); text-decoration: none; }
  .sidebar__link:hover { background: #F1EFFB; color: var(--text); }
  .sidebar__link.is-active { background: var(--primary-soft); color: var(--primary); }
  .sidebar__link.is-disabled { color: var(--text-tertiary); cursor: default; pointer-events: none; }
  .sidebar__link .soon { margin-left: auto; font-size: 9.5px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); z-index: 140; display: none; }
  .sidebar-overlay.is-open { display: block; }
</style>

  var ICON_CHEV_R = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="m9 18 6-6-6-6"/></svg>';
  var ICON_UPLOAD = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>';

  var toastTimer = null;
  function showToast(msg) {
    var root = document.getElementById("toastRoot");
    root.innerHTML = '<div class="toast">' + ICON_CHECK + ' ' + esc(msg) + '</div>';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { root.innerHTML = ""; }, 2200);
  }

  function persist(next) {
    state.projects = next;
    storageSet(STORAGE_KEY, JSON.stringify(next)).catch(function () { showToast("保存に失敗しました"); });
    renderResults();
  }

  function nextNo() {
    if (state.projects.length === 0) return 1;
    var max = 0;
    state.projects.forEach(function (p) { if ((p.no||0) > max) max = p.no; });
    return max + 1;
  }

  function computeFiltered() {
    var q = state.search.trim().toLowerCase();
    return state.projects
      .filter(function (p) { return state.activeType === "all" ? true : p.typeId === state.activeType; })
      .filter(function (p) { return state.activeStatus ? p.status === state.activeStatus : true; })
      .filter(function (p) { return state.hideDone ? !statusOf(p.status).done : true; })
      .filter(function (p) {
        if (!q) return true;
        return (p.name||"").toLowerCase().indexOf(q) >= 0 ||
               (p.customerName||"").toLowerCase().indexOf(q) >= 0 ||
               (p.buildingName||"").toLowerCase().indexOf(q) >= 0 ||
               (p.manager||"").toLowerCase().indexOf(q) >= 0;
      })
      .sort(function (a,b) { return (b.no||0) - (a.no||0); });
  }

  function renderTypeTabs() {
    var el = document.getElementById("typeTabs");
    var html = '<button class="type-tab' + (state.activeType==="all"?" is-active":"") + '" data-type="all">全て</button>';
    TYPE_LIST.forEach(function (t) {
      html += '<button class="type-tab' + (state.activeType===t.id?" is-active":"") + '" data-type="' + t.id + '">' + esc(t.label) + '</button>';
    });
    el.innerHTML = html;
    el.querySelectorAll(".type-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.activeType = btn.getAttribute("data-type");
        renderTypeTabs();
        renderResults();
        syncResetVisibility();
      });
    });
  }

  function renderStatusChips() {
    var el = document.getElementById("statusChips");
    var html = "";
    STATUS_LIST.forEach(function (s) {
      html += '<button class="status-chip' + (state.activeStatus===s.id?" is-active":"") + '" style="--chip-color:' + s.color + '" data-status="' + s.id + '">' + esc(s.label) + '</button>';
    });
    el.innerHTML = html;
    el.querySelectorAll(".status-chip").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-status");
        state.activeStatus = (state.activeStatus === id) ? null : id;
        renderStatusChips();
        renderResults();
        syncResetVisibility();
      });
    });
  }

  function syncResetVisibility() {
    var has = state.search || state.activeType !== "all" || state.activeStatus || state.hideDone;
    document.getElementById("btnReset").style.display = has ? "inline-flex" : "none";
  }

  function renderResults() {
    var area = document.getElementById("resultsArea");
    document.getElementById("countBadge").textContent = computeFiltered().length + "件";

    if (state.loading) {
      area.innerHTML = '<div class="loading-wrap"><span class="spinner"></span> 読み込み中...</div>';
      return;
    }

    var filtered = computeFiltered();

    if (filtered.length === 0) {
      area.innerHTML =
        '<div class="empty-state">' + ICON_FOLDER +
        '<p class="empty-state__title">まだ案件がありません</p>' +
        '<p class="empty-state__desc">「作成」から最初の案件を登録しましょう。</p>' +
        '<button class="btn btn--primary" id="emptyCreateBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> 案件を作成</button>' +
        '</div>';
      var btn = document.getElementById("emptyCreateBtn");
      if (btn) btn.addEventListener("click", function () { openModal(false, null); });
      return;
    }

    var tableRows = "", cardItems = "";
    filtered.forEach(function (p) {
      var t = typeOf(p.typeId);
      tableRows +=
        '<tr>' +
          '<td class="cell-no">' + esc(p.no) + '</td>' +
          '<td><div class="cell-name-wrap"><span class="type-bar" style="--bar-color:' + t.color + '"></span>' +
            '<button class="cell-name" data-detail="' + p.id + '">' + esc(p.name) + '</button></div></td>' +
          '<td><span class="type-tag" style="--tag-color:' + t.color + '">' + esc(t.label) + '</span></td>' +
          '<td>' + statusPillHtml(p.id, p.status, "") + '</td>' +
          '<td>' + esc(p.customerName || "-") + '</td>' +
          '<td>' + esc(p.buildingName || "-") + '</td>' +
          '<td>' + esc(p.manager || "-") + '</td>' +
          '<td>' + fmtDate(p.contractDate) + '</td>' +
          '<td>' + fmtDate(p.startDate) + '</td>' +
          '<td>' + fmtDate(p.completionDate) + '</td>' +
          '<td>' + fmtYen(p.contractAmount) + '</td>' +
          '<td>' + esc(p.creator || "-") + '</td>' +
          '<td class="cell-actions"><button class="icon-btn" data-edit="' + p.id + '" aria-label="編集">' + ICON_PENCIL + '</button></td>' +
        '</tr>';

      cardItems +=
        '<div class="project-card" style="--bar-color:' + t.color + '">' +
          '<div class="project-card__top"><div><div class="project-card__no">No.' + esc(p.no) + '</div>' +
          '<button class="cell-name project-card__name" data-detail="' + p.id + '" style="display:block;">' + esc(p.name) + '</button></div>' +
          '<button class="icon-btn" data-edit="' + p.id + '" aria-label="編集">' + ICON_PENCIL + '</button></div>' +
          '<div class="project-card__meta"><span class="type-tag" style="--tag-color:' + t.color + '">' + esc(t.label) + '</span>' +
          (p.customerName ? '<span>' + ICON_USER + esc(p.customerName) + '</span>' : '') +
          (p.manager ? '<span>' + esc(p.manager) + '</span>' : '') + '</div>' +
          (p.buildingName ? '<div class="project-card__meta"><span>' + ICON_BUILDING + esc(p.buildingName) + '</span></div>' : '') +
          '<div class="project-card__meta"><span>' + ICON_CAL + '着工 ' + fmtDate(p.startDate) + '</span>' +
          '<span>' + ICON_CAL + '完工 ' + fmtDate(p.completionDate) + '</span></div>' +
          (fmtYen(p.contractAmount) !== "-" ? '<div class="project-card__meta"><span class="amount-text">' + fmtYen(p.contractAmount) + '</span></div>' : '') +
          '<div class="project-card__footer">' + statusPillHtml(p.id, p.status, "sm") + '</div>' +
        '</div>';
    });

    area.innerHTML =
      '<div class="table-wrap"><table class="projects-table"><thead><tr>' +
      '<th>No</th><th>案件名</th><th>案件タイプ</th><th>ステータス</th><th>顧客</th><th>建物</th><th>担当者</th><th>契約日</th><th>着工日</th><th>完工日</th><th>契約金額</th><th>作成者</th><th></th>' +
      '</tr></thead><tbody>' + tableRows + '</tbody></table></div>' +
      '<div class="card-list">' + cardItems + '</div>';

    bindResultsEvents();
  }

  function statusPillHtml(id, statusId, size) {
    var s = statusOf(statusId);
    var opts = STATUS_LIST.map(function (st) {
      return '<option value="' + st.id + '"' + (st.id===statusId?" selected":"") + '>' + esc(st.label) + '</option>';
    }).join("");
    return '<div class="status-pill' + (size?" status-pill--"+size:"") + '" style="--pill-color:' + s.color + '">' +
      '<span class="status-pill__dot"></span>' +
      '<select data-status-change="' + id + '" aria-label="ステータスを変更">' + opts + '</select>' +
      ICON_CHEV + '</div>';
  }

  function bindResultsEvents() {
    var area = document.getElementById("resultsArea");
    area.querySelectorAll("[data-edit]").forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-edit");
        var p = state.projects.find(function (x) { return x.id === id; });
        if (p) openModal(true, p);
      });
    });
    area.querySelectorAll("[data-detail]").forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-detail");
        var p = state.projects.find(function (x) { return x.id === id; });
        if (p) openDetailView(p.id);
      });
    });
    area.querySelectorAll("[data-status-change]").forEach(function (el) {
      el.addEventListener("change", function () {
        var id = el.getAttribute("data-status-change");
        persist(state.projects.map(function (p) { return p.id === id ? Object.assign({}, p, { status: el.value }) : p; }));
      });
    });
  }

  function openModal(isEdit, data) {
    modalState = { isEdit: isEdit, data: data ? Object.assign({}, data) : { typeId: "", name: "", customerName: "", buildingName: "", contractDate: "", startDate: "", completionDate: "", manager: "", creator: "", contractAmount: "", status: "inquiry" } };
    renderModal();
  }
  function closeModal() { modalState = null; document.getElementById("modalRoot").innerHTML = ""; }

  function renderModal() {
    var root = document.getElementById("modalRoot");
    if (!modalState) { root.innerHTML = ""; return; }
    var d = modalState.data, isEdit = modalState.isEdit;

    var typeOptions = '<option value="">選択してください</option>' + TYPE_LIST.map(function (t) {
      return '<option value="' + t.id + '"' + (d.typeId===t.id?" selected":"") + '>' + esc(t.label) + '</option>';
    }).join("");

    var managerOptions = MANAGER_SUGGESTIONS.map(function (m) { return '<option value="' + esc(m) + '"></option>'; }).join("");
    var selectedCustomerId = d.customerId || findCustomerIdByName(d.customerName);
    var selectedBuildingId = d.buildingId || findBuildingIdByName(d.buildingName);

    root.innerHTML =
      '<div class="modal-overlay" id="modalOverlay">' +
        '<div class="modal" role="dialog" aria-modal="true">' +
          '<div class="modal__header"><h2>' + (isEdit ? "案件を編集" : "案件を作成") + '</h2>' +
          '<button class="icon-btn" id="modalCloseBtn" aria-label="閉じる">' + ICON_X + '</button></div>' +
          '<div class="modal__body">' +
            '<div class="field"><label>案件タイプ <span class="req">*</span></label>' +
            '<select id="f_typeId">' + typeOptions + '</select><p class="field__error" id="err_typeId" style="display:none"></p></div>' +
            '<div class="field"><label>案件名 <span class="req">*</span></label>' +
            '<input type="text" id="f_name" placeholder="例: 山田邸外構工事" value="' + esc(d.name) + '" />' +
            '<p class="field__error" id="err_name" style="display:none"></p></div>' +
            '<div class="field-row">' +
              '<div class="field"><label>顧客 <span class="hint" style="font-size:11px;color:var(--text-tertiary);font-weight:400;">②顧客管理から選択</span></label><select id="f_customerId">' + customerOptionsHtml(selectedCustomerId) + '</select></div>' +
              '<div class="field"><label>建物</label><select id="f_buildingId">' + buildingOptionsHtml(selectedCustomerId, selectedBuildingId) + '</select></div>' +
            '</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>契約日</label><input type="date" id="f_contractDate" value="' + esc(d.contractDate) + '" /></div>' +
              '<div class="field"><label>着工日</label><input type="date" id="f_startDate" value="' + esc(d.startDate) + '" /></div>' +
              '<div class="field"><label>完工日</label><input type="date" id="f_completionDate" value="' + esc(d.completionDate) + '" /></div>' +
            '</div>' +
            '<div class="field-row">' +
              '<div class="field"><label>担当者</label><input type="text" id="f_manager" list="managerSuggestions" placeholder="担当者名" value="' + esc(d.manager) + '" /></div>' +
              '<div class="field"><label>作成者</label><input type="text" id="f_creator" list="managerSuggestions" placeholder="作成者名" value="' + esc(d.creator) + '" /></div>' +
            '</div>' +
            '<datalist id="managerSuggestions">' + managerOptions + '</datalist>' +
            '<div class="field"><label>契約金額</label><input type="text" inputmode="numeric" id="f_contractAmount" placeholder="例: 1,250,000" value="' + (d.contractAmount ? Number(d.contractAmount).toLocaleString("ja-JP") : "") + '" /></div>' +
          '</div>' +
          '<div class="modal__footer">' +
            (isEdit ? '<button class="btn btn--danger-ghost" id="modalDeleteBtn">' + ICON_TRASH + ' 削除</button>' : '<span></span>') +
            '<div class="modal__footer-right"><button class="btn btn--ghost" id="modalCancelBtn">キャンセル</button>' +
            '<button class="btn btn--primary" id="modalSaveBtn">' + (isEdit ? "保存" : "作成") + '</button></div>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "modalOverlay") closeModal(); });
    document.getElementById("f_typeId").focus();
    document.getElementById("f_customerId").addEventListener("change", function (e) {
      document.getElementById("f_buildingId").innerHTML = buildingOptionsHtml(e.target.value, "");
    });
    // 契約金額: 入力中はカンマなしの数字、確定するとカンマ区切りで表示する
    document.getElementById("f_contractAmount").addEventListener("focus", function () {
      this.value = this.value.replace(/,/g, "");
    });
    document.getElementById("f_contractAmount").addEventListener("blur", function () {
      var n = parseFloat(this.value.replace(/,/g, ""));
      this.value = (!isNaN(n) && n !== 0) ? n.toLocaleString("ja-JP") : "";
    });

    if (isEdit) {
      document.getElementById("modalDeleteBtn").addEventListener("click", function () { confirmDeleteId = d.id; closeModal(); renderConfirm(); });
    }
    document.getElementById("modalSaveBtn").addEventListener("click", function () {
      var custId = document.getElementById("f_customerId").value;
      var bldId = document.getElementById("f_buildingId").value;
      var cust = state.customers.find(function (c) { return c.id === custId; });
      var bld = state.buildings.find(function (b) { return b.id === bldId; });
      var form = {
        id: d.id,
        typeId: document.getElementById("f_typeId").value,
        name: document.getElementById("f_name").value.trim(),
        customerId: custId, customerName: cust ? cust.name : "",
        buildingId: bldId, buildingName: bld ? bld.name : "",
        contractDate: document.getElementById("f_contractDate").value,
        startDate: document.getElementById("f_startDate").value,
        completionDate: document.getElementById("f_completionDate").value,
        manager: document.getElementById("f_manager").value.trim(),
        creator: document.getElementById("f_creator").value.trim(),
        contractAmount: document.getElementById("f_contractAmount").value.replace(/,/g, ""),
        status: d.status || "inquiry"
      };
      var ok = true;
      if (!form.typeId) { document.getElementById("err_typeId").textContent = "案件タイプを選択してください"; document.getElementById("err_typeId").style.display = "block"; document.getElementById("f_typeId").classList.add("is-error"); ok = false; }
      if (!form.name) { document.getElementById("err_name").textContent = "案件名を入力してください"; document.getElementById("err_name").style.display = "block"; document.getElementById("f_name").classList.add("is-error"); ok = false; }
      if (!ok) return;

      if (isEdit) {
        persist(state.projects.map(function (p) { return p.id === form.id ? Object.assign({}, p, form) : p; }));
        showToast("案件を更新しました");
      } else {
        form.id = "p-" + Date.now();
        form.no = nextNo();
        persist([form].concat(state.projects));
        showToast("案件を作成しました");
      }
      closeModal();
    });
  }

  function renderConfirm() {
    var root = document.getElementById("modalRoot");
    if (!confirmDeleteId) { root.innerHTML = ""; return; }
    root.innerHTML =
      '<div class="modal-overlay" id="confirmOverlay">' +
        '<div class="confirm-box">' + ICON_ALERT +
        '<h3>この案件を削除しますか?</h3><p>削除すると元に戻せません。関連するデータも表示されなくなります。</p>' +
        '<div class="confirm-box__actions">' +
        '<button class="btn btn--ghost btn--sm" id="confirmCancelBtn">キャンセル</button>' +
        '<button class="btn btn--danger-ghost btn--sm" id="confirmDeleteBtn">削除する</button>' +
        '</div></div></div>';
    document.getElementById("confirmOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "confirmOverlay") { confirmDeleteId = null; renderConfirm(); } });
    document.getElementById("confirmCancelBtn").addEventListener("click", function () { confirmDeleteId = null; renderConfirm(); });
    document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
      persist(state.projects.filter(function (p) { return p.id !== confirmDeleteId; }));
      confirmDeleteId = null;
      renderConfirm();
      showToast("案件を削除しました");
    });
  }

  /* =====================================================================
     案件詳細ハブ画面
     ===================================================================== */
  var DETAIL_TABS = [
    { id: "info",     label: "基本情報" },
    { id: "quote",    label: "見積" },
    { id: "customer", label: "顧客・建物" },
    { id: "files",    label: "ファイル" },
    { id: "schedule", label: "工程表" },
    { id: "money",    label: "金銭" },
    { id: "worklog",  label: "日報・申請" }
  ];

  function loadSecondaryData() {
    if (state.secondaryLoaded) return Promise.resolve();
    return Promise.all([
      storageGet(FILES_KEY), storageGet(SCHEDULE_TASKS_KEY), storageGet(CONTRACTORS_KEY),
      storageGet(ORDERS_KEY), storageGet(BILLINGS_KEY), storageGet(WORKLOGS_KEY), storageGet(REQUESTS_KEY)
    ]).then(function (res) {
      function arr(i) { try { var v = res[i] && res[i].value ? JSON.parse(res[i].value) : null; return Array.isArray(v) ? v : []; } catch (e) { return []; } }
      state.files = arr(0);
      state.scheduleTasks = arr(1);
      state.contractors = arr(2);
      state.orders = arr(3);
      state.billings = arr(4);
      state.worklogs = arr(5);
      state.requests = arr(6);
      state.secondaryLoaded = true;
    }).catch(function () { state.secondaryLoaded = true; });
  }

  function contractorName(id) { var c = state.contractors.find(function (x) { return x.id === id; }); return c ? c.name : "-"; }

  function openDetailView(projectId) {
    state.detailProjectId = projectId;
    state.detailTab = "info";
    var root = document.getElementById("detailRoot");
    root.innerHTML = '<div class="detail-page"><div class="detail-page__inner"><div class="loading-wrap"><span class="spinner"></span> 読み込み中...</div></div></div>';
    loadSecondaryData().then(function () { renderDetailView(); });
  }
  function closeDetailView() {
    state.detailProjectId = null;
    document.getElementById("detailRoot").innerHTML = "";
  }

  function renderDetailView() {
    var p = state.projects.find(function (x) { return x.id === state.detailProjectId; });
    var root = document.getElementById("detailRoot");
    if (!p) { root.innerHTML = ""; return; }
    var t = typeOf(p.typeId), s = statusOf(p.status);

    var tabsHtml = DETAIL_TABS.map(function (tb) {
      return '<button class="detail-tab' + (tb.id===state.detailTab?" is-active":"") + '" data-dtab="' + tb.id + '">' + tb.label + '</button>';
    }).join("");

    root.innerHTML =
      '<div class="detail-page"><div class="detail-page__inner">' +
      '<button class="detail-back" id="detailBackBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>案件一覧に戻る</button>' +
      '<div class="detail-head">' +
        '<div><div class="detail-head__no">No.' + esc(p.no) + '</div><div class="detail-head__name">' + esc(p.name) + '</div>' +
        '<div class="detail-head__meta"><span class="type-tag" style="--tag-color:' + t.color + '">' + esc(t.label) + '</span>' + statusPillHtml(p.id, p.status, "sm") + '</div></div>' +
        '<button class="btn btn--ghost" id="detailEditBtn">' + ICON_PENCIL + ' 基本情報を編集</button>' +
      '</div>' +
      '<div class="detail-tabs">' + tabsHtml + '</div>' +
      '<div class="detail-panel" id="detailPanel"></div>' +
      '</div></div>';

    document.getElementById("detailBackBtn").addEventListener("click", closeDetailView);
    document.getElementById("detailEditBtn").addEventListener("click", function () { openModal(true, p); });
    root.querySelectorAll("[data-dtab]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.detailTab = btn.getAttribute("data-dtab");
        renderDetailView();
      });
    });

    renderDetailPanel(p);
  }

  function renderDetailPanel(p) {
    var panel = document.getElementById("detailPanel");
    if (state.detailTab === "info") return renderDetailInfo(panel, p);
    if (state.detailTab === "quote") return renderDetailQuote(panel, p);
    if (state.detailTab === "customer") return renderDetailCustomer(panel, p);
    if (state.detailTab === "files") return renderDetailFiles(panel, p);
    if (state.detailTab === "schedule") return renderDetailSchedule(panel, p);
    if (state.detailTab === "money") return renderDetailMoney(panel, p);
    if (state.detailTab === "worklog") return renderDetailWorklog(panel, p);
  }

  /* ---- 基本情報タブ ---- */
  function renderDetailInfo(panel, p) {
    panel.innerHTML =
      '<div class="detail-info-grid">' +
      infoItem("契約日", fmtDate(p.contractDate)) +
      infoItem("着工日", fmtDate(p.startDate)) +
      infoItem("完工日", fmtDate(p.completionDate)) +
      infoItem("契約金額", fmtYen(p.contractAmount)) +
      infoItem("担当者", p.manager || "-") +
      infoItem("作成者", p.creator || "-") +
      '</div>' +
      '<p style="font-size:12.5px;color:var(--text-tertiary);margin:0;">右上の「基本情報を編集」からタイプ・名前・日付・金額などを編集できます。</p>';
  }
  function infoItem(label, value) {
    return '<div class="detail-info-item"><div class="l">' + esc(label) + '</div><div class="v">' + esc(value) + '</div></div>';
  }

  /* ---- 見積タブ(独立ツールへのリンク) ---- */
  function renderDetailQuote(panel, p) {
    panel.innerHTML =
      '<div class="detail-section-title">見積・実行予算</div>' +
      '<p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin:0 0 10px;">' +
      '工事種別ごとの明細入力、実行金額・見積金額・粗利の自動計算、印刷用の御見積書作成ができるツールです。' +
      '下のボタンから開くと、「' + esc(p.name) + '」専用の物件が自動で選択された状態で開き、そのまま明細入力を始められます。' +
      '</p>' +
      '<p style="margin-bottom:20px;"><a class="link-jump" href="08_見積実行予算.html?caseId=' + encodeURIComponent(p.id) + '&caseName=' + encodeURIComponent(p.name) + '" target="_blank" rel="noopener">⑧見積・実行予算アプリを開く ' + ICON_CHEV_R + '</a></p>' +
      '<div class="detail-section-title">見積・予算(表計算式)</div>' +
      '<p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin:0 0 10px;">' +
      'Excel感覚でセル選択・コピペ・列幅調整ができる、表計算タイプの見積ツールです。バージョン管理もできます。この書式に慣れている方はこちらをお使いください。' +
      '</p>' +
      '<p style="margin-bottom:20px;"><a class="link-jump" href="09_見積予算.html" target="_blank" rel="noopener">⑨見積・予算(表計算式)アプリを開く ' + ICON_CHEV_R + '</a></p>' +
      '<div class="detail-section-title">簡易見積書(1枚)</div>' +
      '<p style="font-size:13px;color:var(--text-secondary);line-height:1.7;margin:0 0 10px;">' +
      '種別・規格寸法・数量・単位・単価・金額・備考だけのシンプルな明細で、A4一枚に収まる見積書をサッと作れるツールです。役所向けなど、シンプルな見積書1枚で済む案件におすすめです。' +
      '</p>' +
      '<p><a class="link-jump" href="10_簡易見積書.html" target="_blank" rel="noopener">⑩簡易見積書アプリを開く ' + ICON_CHEV_R + '</a></p>' +
      '<p style="font-size:11.5px;color:var(--text-tertiary);margin-top:16px;">※いずれも今のところ独立して動作しており、データはブラウザ内に保存されます。①〜⑦のように案件へ自動で紐付ける形にしたくなったら、いつでも変更できます。</p>';
  }

  /* ---- 顧客・建物タブ ---- */
  function renderDetailCustomer(panel, p) {
    var c = state.customers.find(function (x) { return x.id === p.customerId; });
    var b = state.buildings.find(function (x) { return x.id === p.buildingId; });
    var html = '<div class="detail-section-title">顧客</div>';
    if (c) {
      html += '<div class="detail-info-grid">' +
        infoItem("顧客名", c.name + (c.honorific ? " " + c.honorific : "")) +
        infoItem("担当", c.manager || "-") +
        infoItem("電話番号", c.phone || "-") +
        infoItem("住所", (c.zip ? "〒" + c.zip + " " : "") + (c.address || "-")) +
        '</div>' +
        '<p style="margin-top:10px;"><a class="link-jump" href="02_顧客建物管理.html?editCustomerId=' + encodeURIComponent(c.id) + '">この顧客の情報を編集する ' + ICON_CHEV_R + '</a></p>';
    } else {
      html += '<div class="detail-empty">この案件には顧客が紐付けられていません</div>';
    }
    html += '<div class="detail-section-title" style="margin-top:18px;">建物</div>';
    if (b) {
      html += '<div class="detail-info-grid">' +
        infoItem("建物名", b.name) +
        infoItem("住所", (b.zip ? "〒" + b.zip + " " : "") + (b.address || "-")) +
        '</div>' +
        '<p style="margin-top:10px;"><a class="link-jump" href="02_顧客建物管理.html?editBuildingId=' + encodeURIComponent(b.id) + '">この建物の情報を編集する ' + ICON_CHEV_R + '</a></p>';
    } else {
      html += '<div class="detail-empty">この案件には建物が紐付けられていません</div>';
    }
    html += '<p style="margin-top:16px;"><a class="link-jump" href="02_顧客建物管理.html">②顧客・建物管理を開く ' + ICON_CHEV_R + '</a></p>';
    panel.innerHTML = html;
  }

  /* ---- ファイルタブ ---- */
  function projectFiles() {
    return state.files.filter(function (f) { return f.projectId === state.detailProjectId; }).sort(function (a,b) { return b.uploadedAt - a.uploadedAt; });
  }
  function renderDetailFiles(panel, p) {
    var list = projectFiles();
    var folderOptions = FOLDERS.map(function (f) { return '<option value="' + f.id + '">' + esc(f.label) + '</option>'; }).join("");
    var html =
      '<div class="detail-section-title">この案件のファイル(' + list.length + '件)</div>' +
      '<div class="detail-upload-row">' +
        '<select id="detailFolderSelect">' + folderOptions + '</select>' +
        '<button class="btn btn--primary btn--sm" id="detailUploadBtn">' + ICON_UPLOAD + ' アップロード</button>' +
        '<input type="file" id="detailFileInput" accept="image/*,application/pdf" multiple style="display:none" />' +
        '<span style="font-size:11px;color:var(--text-tertiary);">画像・PDF、1ファイル1.5MBまで</span>' +
      '</div>';
    if (!list.length) {
      html += '<div class="detail-empty">まだファイルがアップロードされていません</div>';
    } else {
      html += '<div class="detail-file-grid">' + list.map(function (f) {
        return '<div class="detail-file-card">' +
          '<div class="detail-file-card__name">' + esc(f.name) + '</div>' +
          '<div class="detail-file-card__sub">' + esc(folderOf(f.folderId).label) + ' ・ ' + fmtSize(f.sizeBytes) + '</div>' +
          '<div class="detail-file-card__actions">' +
          '<a class="icon-btn" href="' + f.dataUrl + '" target="_blank" rel="noopener" title="開く"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6M10 14 21 3"/></svg></a>' +
          '<button class="icon-btn" data-fdel="' + f.id + '" title="削除">' + ICON_TRASH + '</button>' +
          '</div></div>';
      }).join("") + '</div>';
    }
    html += '<p style="margin-top:16px;"><a class="link-jump" href="03_ファイル管理.html">③ファイル管理を開く ' + ICON_CHEV_R + '</a></p>';
    panel.innerHTML = html;

    document.getElementById("detailUploadBtn").addEventListener("click", function () { document.getElementById("detailFileInput").click(); });
    document.getElementById("detailFileInput").addEventListener("change", function (e) {
      var files = Array.prototype.slice.call(e.target.files || []);
      e.target.value = "";
      if (!files.length) return;
      var folderId = document.getElementById("detailFolderSelect").value;
      var accepted = [], rejected = 0;
      files.forEach(function (f) {
        var isImage = f.type && f.type.indexOf("image/") === 0;
        var isPdf = f.type === "application/pdf";
        if ((!isImage && !isPdf) || f.size > MAX_FILE_SIZE) { rejected++; return; }
        accepted.push(f);
      });
      if (rejected > 0) showToast(rejected + "件のファイルは形式または容量の制限でスキップされました");
      if (!accepted.length) return;
      Promise.all(accepted.map(function (f) {
        return new Promise(function (resolve) {
          var reader = new FileReader();
          reader.onload = function () {
            resolve({ id: "f-" + uid(), projectId: state.detailProjectId, folderId: folderId, name: f.name, mime: f.type, sizeBytes: f.size, dataUrl: reader.result, uploadedAt: Date.now() });
          };
          reader.readAsDataURL(f);
        });
      })).then(function (newFiles) {
        var next = newFiles.concat(state.files);
        state.files = next;
        storageSet(FILES_KEY, JSON.stringify(next)).then(function () {
          showToast("アップロードしました");
          renderDetailPanel(p);
        });
      });
    });
    panel.querySelectorAll("[data-fdel]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-fdel");
        var next = state.files.filter(function (f) { return f.id !== id; });
        state.files = next;
        storageSet(FILES_KEY, JSON.stringify(next)).then(function () {
          showToast("削除しました");
          renderDetailPanel(p);
        });
      });
    });
  }

  /* ---- 工程表タブ ---- */
  function projectTasks(p) {
    return state.scheduleTasks.filter(function (t) { return t.projectId === p.id && t.content; }).sort(function (a,b) { return a.date < b.date ? -1 : 1; });
  }
  function renderDetailSchedule(panel, p) {
    var tasks = projectTasks(p);
    var html =
      '<div class="detail-summary-row">' +
        '<div class="detail-summary-item"><div class="l">着工日</div><div class="v" style="font-size:13px;">' + fmtDate(p.startDate) + '</div></div>' +
        '<div class="detail-summary-item"><div class="l">完工日</div><div class="v" style="font-size:13px;">' + fmtDate(p.completionDate) + '</div></div>' +
      '</div>' +
      '<div class="detail-section-title">日別工事内容を追加</div>' +
      '<div class="detail-task-add">' +
        '<input type="date" id="taskDateInput" value="' + esc(p.startDate || "") + '" />' +
        '<textarea id="taskContentInput" rows="2" placeholder="例: 基礎配筋、型枠組立"></textarea>' +
        '<button class="btn btn--primary btn--sm" id="taskAddBtn">追加</button>' +
      '</div>' +
      '<div class="detail-section-title">登録済みの日別工事内容(' + tasks.length + '件)</div>';
    if (!tasks.length) {
      html += '<div class="detail-empty">まだ登録されていません</div>';
    } else {
      html += tasks.map(function (t) {
        return '<div class="detail-list-row"><div class="main"><div class="t1">' + fmtDateShort(t.date) + '</div><div class="t2">' + esc(t.content) + '</div></div>' +
          '<button class="icon-btn" data-tdel="' + t.id + '" title="削除">' + ICON_TRASH + '</button></div>';
      }).join("");
    }
    html += '<p style="margin-top:16px;"><a class="link-jump" href="07_工程表カレンダー.html">⑦工程表・カレンダーを開く(ガントチャート表示) ' + ICON_CHEV_R + '</a></p>';
    panel.innerHTML = html;

    document.getElementById("taskAddBtn").addEventListener("click", function () {
      var date = document.getElementById("taskDateInput").value;
      var content = document.getElementById("taskContentInput").value.trim();
      if (!date) { showToast("日付を選択してください"); return; }
      if (!content) { showToast("工事内容を入力してください"); return; }
      var next = state.scheduleTasks.filter(function (t) { return !(t.projectId === p.id && t.date === date); });
      next.push({ id: uid(), projectId: p.id, date: date, content: content });
      state.scheduleTasks = next;
      storageSet(SCHEDULE_TASKS_KEY, JSON.stringify(next)).then(function () {
        showToast("追加しました");
        renderDetailPanel(p);
      });
    });
    panel.querySelectorAll("[data-tdel]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-tdel");
        var next = state.scheduleTasks.filter(function (t) { return t.id !== id; });
        state.scheduleTasks = next;
        storageSet(SCHEDULE_TASKS_KEY, JSON.stringify(next)).then(function () {
          showToast("削除しました");
          renderDetailPanel(p);
        });
      });
    });
  }

  /* ---- 金銭タブ ---- */
  function renderDetailMoney(panel, p) {
    var orders = state.orders.filter(function (o) { return o.projectId === p.id; });
    var billings = state.billings.filter(function (b) { return b.projectId === p.id; });
    var ordersTotal = orders.filter(function (o) { return o.status !== "cancelled"; }).reduce(function (s,o) { return s + (Number(o.orderAmount)||0); }, 0);
    var billingsTotal = billings.reduce(function (s,b) { return s + (Number(b.totalAmount)||0); }, 0);
    var receivedTotal = billings.reduce(function (s,b) { return s + (Number(b.receivedAmount)||0); }, 0);
    var profit = billingsTotal - ordersTotal;

    var html =
      '<div class="detail-summary-row">' +
        '<div class="detail-summary-item"><div class="l">請求合計</div><div class="v">' + fmtYen(billingsTotal) + '</div></div>' +
        '<div class="detail-summary-item"><div class="l">発注合計</div><div class="v">' + fmtYen(ordersTotal) + '</div></div>' +
        '<div class="detail-summary-item"><div class="l">粗利</div><div class="v" style="color:' + (profit<0?"var(--danger)":"var(--success)") + '">' + fmtYen(profit) + '</div></div>' +
        '<div class="detail-summary-item"><div class="l">入金済み</div><div class="v">' + fmtYen(receivedTotal) + '</div></div>' +
      '</div>' +
      '<div class="detail-section-title">発注(' + orders.length + '件)</div>';
    if (!orders.length) {
      html += '<div class="detail-empty">発注はまだありません</div>';
    } else {
      html += orders.map(function (o) {
        var st = orderStatusOf(o.status);
        return '<div class="detail-list-row"><div class="main"><div class="t1">' + esc(o.title || "-") + '</div><div class="t2">' + esc(contractorName(o.contractorId)) + '</div></div>' +
          '<div style="text-align:right;"><div style="font-size:11px;font-weight:700;color:' + st.color + ';">' + esc(st.label) + '</div><div class="amount-text" style="font-size:12.5px;">' + fmtYen(o.orderAmount) + '</div></div></div>';
      }).join("");
    }
    html += '<div class="detail-section-title" style="margin-top:18px;">請求(' + billings.length + '件)</div>';
    if (!billings.length) {
      html += '<div class="detail-empty">請求はまだありません</div>';
    } else {
      html += billings.map(function (b) {
        var st = billingStatusOf(b.status);
        return '<div class="detail-list-row"><div class="main"><div class="t1">' + fmtYen(b.totalAmount) + '</div><div class="t2">次回入金予定 ' + fmtDateTime(b.nextPaymentDate) + '</div></div>' +
          '<div style="font-size:11px;font-weight:700;color:' + st.color + ';">' + esc(st.label) + '</div></div>';
      }).join("");
    }
    html += '<p style="margin-top:16px;"><a class="link-jump" href="05_金銭管理.html">⑤金銭管理を開く(発注・支払い・請求の編集) ' + ICON_CHEV_R + '</a></p>';
    panel.innerHTML = html;
  }

  /* ---- 日報・申請タブ ---- */
  function renderDetailWorklog(panel, p) {
    var worklogs = state.worklogs.filter(function (w) { return w.projectId === p.id; }).sort(function (a,b) { return (a.workDate < b.workDate) ? 1 : -1; });
    var requests = state.requests.filter(function (r) { return r.projectId === p.id; });

    var html = '<div class="detail-section-title">日報(' + worklogs.length + '件)</div>';
    if (!worklogs.length) {
      html += '<div class="detail-empty">この案件の日報はまだありません</div>';
    } else {
      html += worklogs.map(function (w) {
        return '<div class="detail-list-row"><div class="main"><div class="t1">' + esc(w.workerName) + '</div><div class="t2">' + esc(w.workContent || "-") + '</div></div>' +
          '<div style="font-size:11.5px;color:var(--text-tertiary);">' + fmtDateShort(w.workDate) + '</div></div>';
      }).join("");
    }
    html += '<div class="detail-section-title" style="margin-top:18px;">社内申請(' + requests.length + '件)</div>';
    if (!requests.length) {
      html += '<div class="detail-empty">この案件の申請はまだありません</div>';
    } else {
      html += requests.map(function (r) {
        var st = requestStatusOf(r.status);
        return '<div class="detail-list-row"><div class="main"><div class="t1">' + esc(r.title || "-") + '</div><div class="t2">' + esc(r.applicant||"-") + ' → ' + esc(r.approver||"-") + '</div></div>' +
          '<div style="font-size:11px;font-weight:700;color:' + st.color + ';">' + esc(st.label) + '</div></div>';
      }).join("");
    }
    html += '<p style="margin-top:16px;"><a class="link-jump" href="04_日報社内申請.html">④日報・社内申請を開く ' + ICON_CHEV_R + '</a></p>';
    panel.innerHTML = html;
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (modalState) closeModal();
      if (confirmDeleteId) { confirmDeleteId = null; renderConfirm(); }
      if (state.detailProjectId) closeDetailView();
    }
  });

  document.getElementById("searchInput").addEventListener("input", function (e) {
    state.search = e.target.value;
    renderResults();
    syncResetVisibility();
  });
  document.getElementById("hideDoneCheckbox").addEventListener("change", function (e) {
    state.hideDone = e.target.checked;
    renderResults();
    syncResetVisibility();
  });
  document.getElementById("btnCreate").addEventListener("click", function () { openModal(false, null); });
  document.getElementById("btnReset").addEventListener("click", function () {
    state.search = ""; state.activeType = "all"; state.activeStatus = null; state.hideDone = false;
    document.getElementById("searchInput").value = "";
    document.getElementById("hideDoneCheckbox").checked = false;
    renderTypeTabs(); renderStatusChips(); renderResults(); syncResetVisibility();
  });

  function setSidebar(open) {
    document.getElementById("sidebar").classList.toggle("is-open", open);
    document.getElementById("shellWrap").classList.toggle("sidebar-open", open);
    document.getElementById("sidebarOverlay").classList.toggle("is-open", open && window.innerWidth <= 960);
  }
  document.getElementById("hamburgerBtn").addEventListener("click", function () {
    setSidebar(!document.getElementById("sidebar").classList.contains("is-open"));
  });
  document.getElementById("sidebarOverlay").addEventListener("click", function () { setSidebar(false); });
  setSidebar(window.innerWidth > 960);

  function init() {
    renderTypeTabs();
    renderStatusChips();
    renderResults();
    Promise.all([
      storageGet(STORAGE_KEY), storageGet(CUSTOMERS_KEY), storageGet(BUILDINGS_KEY),
      storageGet(SETTINGS_STATUS_KEY), storageGet(SETTINGS_TYPE_KEY)
    ]).then(function (res) {
      var data = null, cData = null, bData = null, sData = null, tData = null;
      try { data = res[0] && res[0].value ? JSON.parse(res[0].value) : null; } catch (e) {}
      try { cData = res[1] && res[1].value ? JSON.parse(res[1].value) : null; } catch (e) {}
      try { bData = res[2] && res[2].value ? JSON.parse(res[2].value) : null; } catch (e) {}
      try { sData = res[3] && res[3].value ? JSON.parse(res[3].value) : null; } catch (e) {}
      try { tData = res[4] && res[4].value ? JSON.parse(res[4].value) : null; } catch (e) {}

      if (data && Array.isArray(data)) {
        state.projects = data;
      } else {
        state.projects = seedProjects();
        storageSet(STORAGE_KEY, JSON.stringify(state.projects));
      }
      state.customers = Array.isArray(cData) ? cData : [];
      state.buildings = Array.isArray(bData) ? bData : [];

      // ⑥設定で編集された案件ステータス・案件タイプがあれば、こちらの一覧にも反映する
      if (Array.isArray(sData) && sData.length) {
        STATUS_LIST.length = 0;
        sData.forEach(function (s) { STATUS_LIST.push(s); });
      }
      if (Array.isArray(tData) && tData.length) {
        TYPE_LIST.length = 0;
        tData.forEach(function (t) { TYPE_LIST.push(t); });
      }

      state.loading = false;
      renderTypeTabs();
      renderStatusChips();
      renderResults();
    }).catch(function () {
      state.projects = seedProjects();
      state.loading = false;
      renderResults();
    });
  }

  init();
})();
</script>
</body>
</html>
