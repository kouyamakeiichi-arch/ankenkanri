<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Construction Estimate Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f7;--bg3:#efefef;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#d0d0d0;--border2:#b0b0b0;
  --accent:#2563eb;--green:#16a34a;--red:#dc2626;
  --th-bg:#eef2ff;--tr-hover:#f5f7ff;--metric-bg:#f0f4ff;
}
body.dark{--bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--text:#e0e0e0;--text2:#aaa;--text3:#666;--border:#334;--border2:#557;--th-bg:#1e2a4a;--tr-hover:#1e2a3a;--metric-bg:#1e2a4a;}
body.cad{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--text:#39d353;--text2:#58a6ff;--text3:#3fb950;--border:#30363d;--border2:#484f58;--accent:#58a6ff;--th-bg:#161b22;--tr-hover:#1c2128;--metric-bg:#161b22;}
body.gray{--bg:#f4f4f4;--bg2:#ebebeb;--bg3:#e0e0e0;--text:#222;--text2:#555;--text3:#888;--border:#c0c0c0;--border2:#a0a0a0;--th-bg:#e0e5eb;--tr-hover:#eaeef4;--metric-bg:#e8ecf4;}
body.navy{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#334155;--border2:#475569;--accent:#38bdf8;--th-bg:#1e293b;--tr-hover:#1e2d3d;--metric-bg:#1e293b;}
body{font-family:'Segoe UI','Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;background:var(--bg);color:var(--text)}

/* ===== TOPBAR ===== */
.topbar{background:var(--bg2);border-bottom:2px solid var(--border2);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.logo-main{font-size:17px;font-weight:700;letter-spacing:.08em;color:var(--accent);font-family:Georgia,serif;cursor:pointer;border-bottom:1px dashed var(--accent)}
.logo-main:hover{opacity:.8}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.theme-btns{display:flex;gap:4px;align-items:center}
.tb{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;transition:.15s}
.tb:hover,.tb.on{transform:scale(1.25);border-color:var(--accent)}
.tw{background:#fff}.tg{background:#bbb}.td{background:#2a2a3e}.tc{background:#0d1117;border-color:#39d353!important}.tn{background:#0f172a;border-color:#38bdf8!important}
.btn{padding:5px 12px;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-size:13px;background:var(--bg2);color:var(--text);font-family:inherit;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--bg3)}
.btn.on,.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.warn{background:#d97706;color:#fff;border-color:#d97706}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.save-st{font-size:11px;color:var(--text3);white-space:nowrap}
.copyright{font-size:10px;color:var(--text3);white-space:nowrap;letter-spacing:.03em}

/* 物件ボタン */
.proj-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--accent);border-radius:5px;cursor:pointer;font-size:13px;background:var(--bg);color:var(--accent);font-family:inherit;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-btn:hover{background:var(--metric-bg)}

/* ===== METRICS ===== */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.mc{background:var(--metric-bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.mc-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mc-val{font-size:19px;font-weight:700}
.blue{color:var(--accent)}.green{color:var(--green)}

/* ===== TABS ===== */
.tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px}
.tabs{display:flex;flex-wrap:wrap;gap:2px;padding-top:7px}
.tab{padding:5px 9px;cursor:pointer;font-size:12px;border-radius:5px 5px 0 0;border:1px solid transparent;border-bottom:none;margin-bottom:-1px;white-space:nowrap;transition:.1s}
.tab.on{font-weight:600;border-color:var(--border)}
.tab:hover:not(.on){background:var(--bg3)}
.tab-label{font-size:12px;font-weight:600;cursor:pointer;pointer-events:none;white-space:nowrap}
.tab-edit{display:none;border:none;font-size:12px;font-weight:600;color:inherit;width:90px;background:rgba(255,255,255,.15);border-radius:3px;padding:1px 4px;font-family:inherit}
.tab-edit:focus{outline:1px solid rgba(255,255,255,.6);display:inline-block}
.cat-inp{background:transparent;border:none;font-size:12px;font-weight:600;color:inherit;max-width:110px;cursor:pointer;font-family:inherit;padding:0}
.cat-inp:focus{outline:1px solid rgba(255,255,255,.4);border-radius:2px;background:rgba(255,255,255,.1)}

/* ===== SECTION ===== */
.sec{margin:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.sec-ttl{font-size:14px;font-weight:600}
.badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:12px;font-weight:600}
.badge.good{background:#dcfce7;color:#166534}.badge.bad{background:#fee2e2;color:#991b1b}

/* ===== TABLE ===== */
.tw-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{padding:7px 5px;background:var(--th-bg);border-right:1px solid var(--border);border-bottom:2px solid var(--border2);font-weight:600;font-size:12px;color:var(--text2);text-align:right;white-space:nowrap}
th.L{text-align:left}th.C{text-align:center}
td{padding:5px 5px;border-right:1px solid var(--border);border-bottom:1px dashed var(--border);text-align:right;vertical-align:middle;font-size:13px}
td.L{text-align:left}td.C{text-align:center;color:var(--text3);font-size:12px}
td.gr{color:var(--text3);font-size:12px}
tbody tr:hover td{background:var(--tr-hover)}
tfoot td{background:var(--bg2);font-weight:700;font-size:13px;border-right:1px solid var(--border);border-top:2px solid var(--border2);border-bottom:2px solid var(--border2)}
th:first-child,td:first-child{text-align:center}
th:last-child,td:last-child{border-right:none}
tfoot td:first-child{border-left:none}
input[type=text],input[type=number]{width:100%;border:none;background:transparent;font-size:13px;color:var(--text);padding:1px 0;font-family:inherit;text-align:right}
input[type=text]{text-align:left}
input.C{text-align:center}
input:focus{outline:1px solid var(--accent);border-radius:2px;background:var(--metric-bg)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:1px 5px;border-radius:3px}
.del-btn:hover{color:var(--red);background:#fee2e2}
.ins-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:1px 5px;border-radius:3px}
.ins-btn:hover{color:var(--accent);background:#dbeafe}
.cell-x{position:relative}
.cell-x.cell-selected{outline:2px solid var(--accent);outline-offset:-2px;background:rgba(59,130,246,.10)!important;z-index:1}
.ctxmenu{position:fixed;z-index:99999;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);padding:5px;min-width:180px;font-size:12.5px;display:none}
.ctxmenu.on{display:block}
.ctxmenu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;color:#1f2937}
.ctxmenu button:hover{background:#eff3fb}
.ctxmenu button.danger{color:#c0392b}
.ctxmenu hr{border:none;border-top:1px solid var(--border2);margin:5px 2px}
.dropmenu{position:absolute;top:100%;left:0;margin-top:4px;z-index:500;background:#fff;border:1px solid var(--border2);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);padding:5px;min-width:240px;font-size:12.5px;display:none}
.dropmenu.on{display:block}
.dropmenu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;color:#1f2937;white-space:nowrap}
.dropmenu button:hover{background:#eff3fb}
.dropmenu hr{border:none;border-top:1px solid var(--border2);margin:5px 2px}
.pick-row{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #f1f1f1;font-size:13px;cursor:pointer}
.pick-row:last-child{border-bottom:none}
.add-btn{width:100%;padding:7px;font-size:12px;color:var(--text3);border:1px dashed var(--border2);border-top:none;background:transparent;cursor:pointer;font-family:inherit}
.add-btn:hover{background:var(--bg2)}

/* ===== SUMMARY TOTALS ===== */
.tot-area{padding:14px 16px;display:flex;justify-content:flex-end}
.tot-box{border:1px solid var(--border);border-radius:7px;overflow:hidden;min-width:360px}
.tot-row{display:flex;align-items:center;border-bottom:1px dashed var(--border);padding:7px 14px;gap:12px}
.tot-row:last-child{border-bottom:none}
.tot-lbl{flex:1;font-size:13px;color:var(--text2);text-align:right;padding-right:8px}
.tot-val{font-size:14px;font-weight:700;min-width:120px;text-align:right}
.tot-row.grand{background:var(--bg2)}
.tot-row.grand .tot-lbl{font-size:14px;font-weight:600;color:var(--text)}
.tot-row.grand .tot-val{font-size:17px;color:var(--accent)}
.disc-inp{width:110px;text-align:right;font-size:13px;border:1px solid var(--border2);border-radius:4px;padding:3px 6px;background:var(--bg);color:var(--text)}

/* ===== VIEWS ===== */
.det-v,.alt-v{display:none}
.det-v.on,.alt-v.on{display:block}

/* ===== MODAL BASE ===== */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;justify-content:center;align-items:center}
.modal-ov.on{display:flex}
.modal{background:var(--bg);border:1px solid var(--border2);border-radius:10px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:20px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.f-row{display:grid;grid-template-columns:130px 1fr;align-items:center;gap:8px;margin-bottom:10px}
.f-row label{font-size:13px;color:var(--text2);text-align:right}
.f-inp{width:100%;border:1px solid var(--border2);border-radius:5px;padding:6px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.f-inp:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.f-sec{font-weight:600;font-size:13px;margin:14px 0 8px;color:var(--text2)}

/* ===== 物件管理モーダル ===== */
.proj-modal{width:640px}
.proj-list{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:14px}
.proj-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:.15s}
.proj-item:last-child{border-bottom:none}
.proj-item:hover{background:var(--bg3)}
.proj-item.active{background:var(--metric-bg);border-left:3px solid var(--accent)}
.proj-item-name{flex:1;font-size:14px;font-weight:500;cursor:pointer}
.proj-item-name-edit{flex:1;border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.proj-item-date{font-size:11px;color:var(--text3);white-space:nowrap}
.proj-new-area{display:flex;gap:8px;align-items:center}
.proj-new-inp{flex:1;border:1px solid var(--border2);border-radius:5px;padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.proj-new-inp:focus{outline:none;border-color:var(--accent)}
.proj-empty{padding:20px;text-align:center;color:var(--text3);font-size:13px}

/* ===== QUOTE PREVIEW ===== */
.qprev-wrap{margin:14px 16px}
.qprev{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:24px 28px;max-width:640px;margin:0 auto}
.q-hr2{border:none;border-top:2px solid var(--border2);margin:14px 0}
.stamp-box{width:64px;height:64px;border:1px solid var(--border2);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3)}

/* ===== PRINT: A4 横 全ページ ===== */
@media print{
  @page{size:A4 landscape;margin:8mm 12mm}
  .no-print,.topbar,.metrics,.tabs-wrap,.modal-ov,.save-st{display:none!important}
  body{font-size:9.5pt;color:#000;background:#fff;font-family:'Yu Gothic','MS Gothic','Hiragino Sans',sans-serif}
  .det-v,.alt-v{display:none!important}
  #print-area{display:block!important}
  .p-page{page-break-after:always;page-break-inside:avoid}
  .p-page:last-child{page-break-after:auto}

  /* 表紙 */
  .pc-outer{border:1.5px solid #333;padding:16px 24px;min-height:176mm;position:relative;box-sizing:border-box}
  .pc-no-line{display:flex;justify-content:space-between;font-size:9pt;margin-bottom:8px}
  .pc-title-box{border:2px solid #333;padding:5px 20px;font-size:20pt;font-weight:700;letter-spacing:.25em;text-align:center;display:block;margin:8px auto 10px}
  .pc-sep{border:none;border-top:1px solid #888;margin:6px 0}
  .pc-sep2{border:none;border-top:1.5px solid #555;margin:10px 0}
  .pc-date{font-size:9.5pt;margin-bottom:4px}
  .pc-client{font-size:13pt;font-weight:700;text-decoration:underline;margin-bottom:4px}
  .pc-kojimei{font-size:9.5pt;margin-bottom:3px}
  .pc-shita{font-size:9.5pt;margin-bottom:14px}
  /* ★ 見積金額を大きく ★ */
  .pc-amount-wrap{text-align:center;margin:14px 0 12px;border-bottom:1.5px solid #555;padding-bottom:10px}
  .pc-amount-lbl{font-size:20pt;font-weight:700;margin-right:16px;letter-spacing:.05em}
  .pc-amount{font-size:22pt;font-weight:700;letter-spacing:.08em}
  .pc-sub-amounts{font-size:9.5pt;margin-top:8px;color:#333}
  .pc-bottom{display:flex;justify-content:space-between;align-items:flex-start;margin-top:14px}
  .pc-left{font-size:9.5pt;line-height:2.1}
  .pc-right{font-size:9.5pt;line-height:2.1;text-align:left;min-width:200px}
  .pc-right-co1{font-size:9pt;color:#666}
  .pc-right-co2{font-size:12pt;font-weight:700}
  .pc-stamp-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
  .pc-stamp{border:1px solid #aaa;width:52px;height:52px;display:inline-flex;align-items:center;justify-content:center;font-size:9pt;flex-shrink:0}

  /* 共通テーブル */
  .pt{width:100%;border-collapse:collapse;font-size:9.5pt;table-layout:fixed}
  .pt th{padding:3px 3px;background:#e4e9f2;border:1px solid #888;font-weight:700;font-size:8.5pt;text-align:right;white-space:nowrap}
  .pt th.L{text-align:left}.pt th.C{text-align:center}
  .pt td{padding:2px 3px;border-right:1px solid #bbb;border-bottom:1px dotted #ccc;text-align:right;vertical-align:middle;font-size:9pt}
  .pt td.L{text-align:left}.pt td.C{text-align:center;font-size:9pt}
  .pt tbody tr:nth-child(even) td{background:#f8f8f8}
  .pt tfoot td{background:#e4e9f2;font-weight:700;border:1px solid #888;border-top:2px solid #555}
  .pt th:first-child,.pt td:first-child{border-left:1px solid #888;text-align:center}
  .pt th:last-child,.pt td:last-child{border-right:1px solid #888}

  /* ページヘッダー */
  .p-hdr{border-bottom:2px solid #333;padding-bottom:4px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-end}
  .p-hdr-title{font-size:12pt;font-weight:700}
  .p-hdr-sub{font-size:8pt;color:#555}
}
#print-area{display:none}
</style>

<div class="app">

<!-- TOPBAR -->
<div class="topbar no-print">
  <div>
    <div class="logo-main" id="app-title" onclick="editAppTitle()" title="ダブルクリックで編集">Construction Estimate Pro</div>
    <div class="logo-sub" id="co-sub">Loading...</div>
  </div>
  <div class="topbar-r">
    <span class="save-st" id="save-st">—</span>
    <!-- 物件選択ボタン -->
    <button class="proj-btn" onclick="openProjModal()">
      📁 <span id="cur-proj-name" style="max-width:180px;overflow:hidden;text-overflow:ellipsis">物件を選択</span> ▼
    </button>
    <div class="theme-btns">
      <span style="font-size:11px;color:var(--text3)">背景:</span>
      <div class="tb tw on" data-theme="white" onclick="setTheme('white',this)"></div>
      <div class="tb tg" data-theme="gray" onclick="setTheme('gray',this)"></div>
      <div class="tb td" data-theme="dark" onclick="setTheme('dark',this)"></div>
      <div class="tb tc" data-theme="cad" onclick="setTheme('cad',this)"></div>
      <div class="tb tn" data-theme="navy" onclick="setTheme('navy',this)"></div>
    </div>
    <div style="display:flex;gap:4px">
      <button class="btn on" id="btn-detail" onclick="switchView('detail')">明細入力</button>
      <button class="btn" id="btn-summary" onclick="switchView('summary')">見積鏡</button>
      <button class="btn" id="btn-quote" onclick="switchView('quote')">御見積書</button>
    </div>
    <div style="display:flex;gap:4px">
      <button class="btn" id="btn-undo" onclick="undo()" title="元に戻す (Ctrl+Z)" style="font-size:15px;padding:4px 10px" disabled>↩</button>
      <button class="btn" id="btn-redo" onclick="redo()" title="やり直し (Ctrl+Y)" style="font-size:15px;padding:4px 10px" disabled>↪</button>
    </div>
    <button class="btn warn no-print" onclick="saveNow()">💾 保存</button>
    <button class="btn no-print" onclick="showSettings()">⚙ 会社設定</button>
    <button class="btn pri no-print" onclick="doPrint()">🖨 印刷</button>
    <button class="btn pri no-print" onclick="savePDF()" style="background:#e53e3e;border-color:#e53e3e">📄 PDFで保存</button>
    <div style="position:relative;display:inline-block" class="no-print">
      <button class="btn" onclick="toggleIoMenu(event)">📤📥 書き出し・読み込み ▾</button>
      <div class="dropmenu" id="iomenu">
        <button onclick="closeIoMenu();exportCurrentProject()">📤 選択中の物件を書き出し</button>
        <button onclick="closeIoMenu();exportData()">📤 全物件を書き出し</button>
        <hr>
        <button onclick="closeIoMenu();document.getElementById('import-pick-file').click()">📥 物件を選んで読み込み</button>
        <button onclick="closeIoMenu();document.getElementById('import-add-file').click()">📥 全物件を読み込み（追加）</button>
        <button onclick="closeIoMenu();document.getElementById('import-file').click()">📥 全物件を読み込み（上書き）</button>
      </div>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">

// ===== Firebase 保存(クラウド同期) =====
// taiho_app_data コレクションに他ページと同じ形式(doc id=キー名, value フィールド)で保存する
function fsSet(key,value){
  if(!window.db)return;
  window.db.collection("taiho_app_data").doc(key).set({value:value,updatedAt:Date.now()}).catch(function(e){console.warn('クラウド保存失敗',key,e);});
}
function fsGet(key){
  return new Promise(function(resolve){
    if(!window.db){resolve(null);return;}
    window.db.collection("taiho_app_data").doc(key).get().then(function(doc){
      resolve(doc.exists?doc.data().value:null);
    }).catch(function(){resolve(null);});
  });
}
// 起動時にクラウドの値をこのブラウザのlocalStorageへ反映する(クラウドに無ければローカルの値をクラウドへ移行)
function fsPullToLocal(key){
  return fsGet(key).then(function(remote){
    if(remote!==null&&remote!==undefined){
      try{localStorage.setItem(key,remote);}catch(e){}
    }else{
      var local=null;
      try{local=localStorage.getItem(key);}catch(e){}
      if(local)fsSet(key,local);
    }
  });
}

// Undo/Redo 履歴
let undoStack=[];
let redoStack=[];
const MAX_HISTORY=50;

function snapshot(){
  // 現在の物件データをディープコピーして履歴に積む
  try{
    undoStack.push(JSON.stringify({projects:projects,curProjId:curProjId,curCat:curCat}));
    if(undoStack.length>MAX_HISTORY)undoStack.shift();
    redoStack=[];// 新操作でRedoはクリア
    updateUndoRedoBtns();
  }catch(e){}
}

function undo(){
  if(undoStack.length===0)return;
  try{
    // 現状をRedoに積む
    redoStack.push(JSON.stringify({projects:projects,curProjId:curProjId,curCat:curCat}));
    // 一つ前に戻す
    const prev=JSON.parse(undoStack.pop());
    projects=prev.projects;
    curProjId=prev.curProjId;
    curCat=prev.curCat||0;
    updateUndoRedoBtns();
    updateProjBtn();
    document.getElementById('co-sub').textContent=curCfg().co1||'';
    sched();
    renderAll();
  }catch(e){console.warn('undo error',e);}
}

function redo(){
  if(redoStack.length===0)return;
  try{
    undoStack.push(JSON.stringify({projects:projects,curProjId:curProjId,curCat:curCat}));
    const next=JSON.parse(redoStack.pop());
    projects=next.projects;
    curProjId=next.curProjId;
    curCat=next.curCat||0;
    updateUndoRedoBtns();
    updateProjBtn();
    document.getElementById('co-sub').textContent=curCfg().co1||'';
    sched();
    renderAll();
  }catch(e){console.warn('redo error',e);}
}

function updateUndoRedoBtns(){
  const bu=document.getElementById('btn-undo');
  const br=document.getElementById('btn-redo');
  if(bu){bu.disabled=undoStack.length===0;bu.style.opacity=undoStack.length===0?'0.35':'1';}
  if(br){br.disabled=redoStack.length===0;br.style.opacity=redoStack.length===0?'0.35':'1';}
}

// ===== CALC =====
function ci(it){const e=Math.round(it.qty*it.price);const d=Math.round(e*it.rate);return{exec:e,dec:d,margin:d-e};}
function cc(cat){let e=0,d=0,m=0;cat.items.forEach(it=>{const c=ci(it);e+=c.exec;d+=c.dec;m+=c.margin;});return{exec:e,dec:d,margin:m};}
function ca(){
  let e=0,d=0,m=0;
  curData().forEach(cat=>{const c=cc(cat);e+=c.exec;d+=c.dec;m+=c.margin;});
  const disc=curDiscount();
  const ad=d-disc;const tax=Math.round(ad*0.1);
  const pr=ad>0?Math.round((m-disc)/ad*1000)/10:0;
  return{exec:e,dec:d,margin:m,ad,tax,total:ad+tax,pr};
}
function fmt(n){return Math.round(n).toLocaleString('ja-JP');}
function escNl(s){
  if(!s)return'';
  const d=document.createElement('div');d.textContent=s;
  return d.innerHTML.replace(/\n/g,'<br>');
}
function formatNum(v){
  // カンマを除去して数値に変換し、カンマ付きで返す
  const n=parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)||n===0)return '';
  return n.toLocaleString('ja-JP');
}

function addCategory(){
  const name=prompt('新しい工事名称を入力してください：','新規工事');
  if(!name||!name.trim())return;
  snapshot();
  const data=curData();
  const newId=Math.max(...data.map(c=>c.id),0)+1;
  data.push({
    id:newId,
    name:name.trim(),
    items:[]
  });
  curCat=data.length-1;
  sched();renderAll();
}

function editCatId(){
  const cat=curData()[curCat];if(!cat)return;
  const v=prompt('工事番号を変更してください(例: 1)：',cat.id);
  if(v===null)return;
  const n=parseInt(v,10);
  if(!n||n<1){alert('1以上の数字を入力してください。');return;}
  snapshot();
  cat.id=n;
  sched();renderAll();
}

function deleteCategory(){
  const data=curData();
  if(data.length<=1){alert('最後の工事は削除できません。');return;}
  const cat=data[curCat];
  if(!confirm(`「${cat.name}」を削除しますか？
明細データもすべて削除されます。`))return;
  data.splice(curCat,1);
  if(curCat>=data.length)curCat=data.length-1;
  sched();renderAll();
}

function renumberItems(items){
  // Noを1から連番に振り直す
  items.forEach((it,i)=>{it.no=i+1;});
}

function updItem(idx,f,v){
  snapshot();
  curData()[curCat].items[idx][f]=v;
  sched();renderAll();
}
function addItem(){
  const cat=curData()[curCat];if(cat.items.length>=MAX)return;
  snapshot();
  cat.items.push({no:cat.items.length+1,name:"",kei:"",qty:1,unit:"式",price:0,rate:1.25});
  renumberItems(cat.items);
  sched();renderAll();
}
function insItemAfter(idx){
  const cat=curData()[curCat];if(cat.items.length>=MAX)return;
  snapshot();
  cat.items.splice(idx+1,0,{no:0,name:"",kei:"",qty:1,unit:"式",price:0,rate:1.25});
  renumberItems(cat.items);
  sched();renderAll();
}
function delItem(idx){
  snapshot();
  curData()[curCat].items.splice(idx,1);
  renumberItems(curData()[curCat].items);
  sched();renderAll();
}
function updDecUnit(idx,v){
  const it=curData()[curCat].items[idx];if(!it)return;
  const val=parseFloat(String(v).replace(/,/g,''))||0;
  snapshot();
  if(val<=0){
    // 空欄に戻した場合は掛率をリセットせず、単価(実行)×掛率の自動計算に任せる
    sched();renderAll();return;
  }
  if(it.price>0){
    // 単価(実行)は変えず、決定単価に合うよう掛率を逆算する
    it.rate=Math.round((val/it.price)*10000)/10000;
  }else{
    // 単価(実行)が未入力の場合は、決定単価をそのまま単価(実行)として使う(掛率1.0)
    it.price=val;
    it.rate=1;
  }
  sched();renderAll();
}

/* =====================================================================
   セル選択・コピー&ペースト(Excelライク)
   論理列: 0=工事名称 1=形状寸法等 2=数量 3=単位 4=単価(実行) 5=掛率
   ===================================================================== */
const COL_FIELDS=['name','kei','qty','unit','price','rate'];
const COL_NUM=[false,false,true,false,true,true];
let cellSel=null;      // {r1,c1,r2,c2}
let cellSelecting=false;
let clipGrid=null;     // 内部クリップボード(配列の配列)

function cellDown(r,c){
  cellSel={r1:r,c1:c,r2:r,c2:c};
  cellSelecting=true;
  applyCellHighlight();
}
function cellEnter(r,c){
  if(!cellSelecting||!cellSel)return;
  cellSel.r2=r;cellSel.c2=c;
  applyCellHighlight();
}
document.addEventListener('mouseup',()=>{cellSelecting=false;});

function applyCellHighlight(){
  document.querySelectorAll('td.cell-selected').forEach(td=>td.classList.remove('cell-selected'));
  if(!cellSel)return;
  const r1=Math.min(cellSel.r1,cellSel.r2),r2=Math.max(cellSel.r1,cellSel.r2);
  const c1=Math.min(cellSel.c1,cellSel.c2),c2=Math.max(cellSel.c1,cellSel.c2);
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
    const td=document.querySelector('td.cell-x[data-r="'+r+'"][data-c="'+c+'"]');
    if(td)td.classList.add('cell-selected');
  }
}

/* Tab / 矢印キーでのセル移動(工事名称などの明細セル間を横・縦に移動) */
let pendingFocus=null; // Tab/矢印キーでの移動先。再描画をまたいでも移動を復元するために使う
function focusCell(r,c){
  const cat=curData()[curCat];if(!cat)return;
  if(r<0||r>=cat.items.length)return;
  if(c<0||c>5)return;
  const td=document.querySelector('td.cell-x[data-r="'+r+'"][data-c="'+c+'"]');
  if(!td)return;
  const inp=td.querySelector('input');
  if(!inp)return;
  inp.focus();
  inp.select();
  cellSel={r1:r,c1:c,r2:r,c2:c};
  applyCellHighlight();
}
function cellNav(e,r,c){
  const key=e.key;
  const inp=e.target;
  let nr=r,nc=c;
  if(key==='ArrowUp'){nr=r-1;}
  else if(key==='ArrowDown'){nr=r+1;}
  else if(key==='ArrowLeft'){
    // テキスト編集中(カーソルが先頭以外)は通常のカーソル移動を優先する
    if(inp.selectionStart!==0||inp.selectionEnd!==0)return;
    nc=c-1;
  }
  else if(key==='ArrowRight'){
    const len=inp.value.length;
    if(inp.selectionStart!==len||inp.selectionEnd!==len)return;
    nc=c+1;
  }
  else if(key==='Tab'){
    if(e.shiftKey){nc=c-1;if(nc<0){nc=5;nr=r-1;}}
    else{nc=c+1;if(nc>5){nc=0;nr=r+1;}}
  }
  else return;
  e.preventDefault();
  // 移動元セルの値が変わっていた場合、直後のchange/blurで表が再描画され
  // せっかく移した focus が消えてしまうため、移動先を pendingFocus に控えておく。
  // renderDetail() 側でこれを見て、再描画後にもう一度フォーカスし直す。
  pendingFocus={r:nr,c:nc};
  focusCell(nr,nc);
  pendingFocus=null;
}

function gridCopy(){
  if(!cellSel)return;
  const cat=curData()[curCat];if(!cat)return;
  const r1=Math.min(cellSel.r1,cellSel.r2),r2=Math.max(cellSel.r1,cellSel.r2);
  const c1=Math.min(cellSel.c1,cellSel.c2),c2=Math.max(cellSel.c1,cellSel.c2);
  const grid=[];
  for(let r=r1;r<=r2;r++){
    const row=[];
    const it=cat.items[r];
    for(let c=c1;c<=c2;c++){
      row.push(it?(it[COL_FIELDS[c]]??''):'');
    }
    grid.push(row);
  }
  clipGrid=grid;
  try{
    const tsv=grid.map(row=>row.join('\t')).join('\n');
    navigator.clipboard&&navigator.clipboard.writeText(tsv).catch(()=>{});
  }catch(e){}
}

async function gridPaste(){
  if(!cellSel)return;
  let grid=clipGrid;
  if(!grid){
    try{
      const text=await navigator.clipboard.readText();
      if(text)grid=text.replace(/\r/g,'').split('\n').filter((l,i,arr)=>!(i===arr.length-1&&l==='')).map(l=>l.split('\t'));
    }catch(e){}
  }
  if(!grid||!grid.length)return;
  const cat=curData()[curCat];if(!cat)return;
  const r1=Math.min(cellSel.r1,cellSel.r2),c1=Math.min(cellSel.c1,cellSel.c2);
  const destR2=Math.max(cellSel.r1,cellSel.r2),destC2=Math.max(cellSel.c1,cellSel.c2);
  const gh=grid.length,gw=grid[0].length;
  // コピー元が1行/1列の場合は、選択した範囲いっぱいに同じ値を繰り返して貼り付ける
  const rowsNeeded=(gh===1&&destR2>r1)?(destR2-r1+1):gh;
  const colsNeeded=(gw===1&&destC2>c1)?(destC2-c1+1):gw;
  snapshot();
  for(let i=0;i<rowsNeeded;i++){
    const r=r1+i;
    if(r>=MAX)break;
    while(cat.items.length<=r&&cat.items.length<MAX){
      cat.items.push({no:cat.items.length+1,name:"",kei:"",qty:1,unit:"式",price:0,rate:1.25});
    }
    if(r>=cat.items.length)break;
    for(let j=0;j<colsNeeded;j++){
      const c=c1+j;
      if(c>5)break;
      const field=COL_FIELDS[c];
      const raw=grid[gh===1?0:i][gw===1?0:j];
      let val=raw;
      if(COL_NUM[c]){
        val=parseFloat(String(raw).replace(/,/g,''))||0;
        if(field==='rate'&&!val)val=1;
      }else{
        val=String(raw==null?'':raw);
      }
      cat.items[r][field]=val;
    }
  }
  renumberItems(cat.items);
  cellSel={r1:r1,c1:c1,r2:r1+rowsNeeded-1,c2:c1+colsNeeded-1};
  sched();renderAll();
  applyCellHighlight();
}

document.addEventListener('keydown',function(e){
  if(!(e.ctrlKey||e.metaKey))return;
  const key=e.key.toLowerCase();
  if(key==='c'){
    if(!cellSel)return;
    const ae=document.activeElement;
    if(ae&&ae.tagName==='INPUT'&&ae.selectionStart!==ae.selectionEnd)return; // 一部テキストだけ選択中は通常コピーに任せる
    e.preventDefault();
    gridCopy();
  }else if(key==='v'){
    if(!cellSel)return;
    e.preventDefault();
    gridPaste();
  }
});

/* ---------------- 右クリックメニュー(Excelライク) ---------------- */
let ctxRow=null;

function openCtxMenu(e,r,c){
  e.preventDefault();
  // 右クリックしたセルが今の選択範囲の外なら、そのセル単体を選び直す
  const inRange=cellSel&&r>=Math.min(cellSel.r1,cellSel.r2)&&r<=Math.max(cellSel.r1,cellSel.r2)&&c>=Math.min(cellSel.c1,cellSel.c2)&&c<=Math.max(cellSel.c1,cellSel.c2);
  if(!inRange){
    cellSel={r1:r,c1:c,r2:r,c2:c};
    applyCellHighlight();
  }
  ctxRow=r;
  const menu=document.getElementById('ctxmenu');
  const mw=190,mh=280;
  const x=Math.min(e.clientX,window.innerWidth-mw-8);
  const y=Math.min(e.clientY,window.innerHeight-mh-8);
  menu.style.left=x+'px';
  menu.style.top=y+'px';
  menu.classList.add('on');
}
function closeCtxMenu(){
  const m=document.getElementById('ctxmenu');
  if(m)m.classList.remove('on');
}
document.addEventListener('click',closeCtxMenu);
document.addEventListener('contextmenu',function(e){
  if(!e.target.closest('.cell-x'))closeCtxMenu();
});
document.addEventListener('scroll',closeCtxMenu,true);

function ctxCopy(){closeCtxMenu();gridCopy();}
function ctxCut(){closeCtxMenu();gridCopy();clearSelectedCells();}
function ctxPaste(){closeCtxMenu();gridPaste();}
function ctxClear(){closeCtxMenu();clearSelectedCells();}
function ctxInsAbove(){closeCtxMenu();if(ctxRow==null)return;insItemAfter(ctxRow-1);}
function ctxInsBelow(){closeCtxMenu();if(ctxRow==null)return;insItemAfter(ctxRow);}
function ctxDelRow(){closeCtxMenu();if(ctxRow==null)return;delItem(ctxRow);}

function clearSelectedCells(){
  if(!cellSel)return;
  const cat=curData()[curCat];if(!cat)return;
  const r1=Math.min(cellSel.r1,cellSel.r2),r2=Math.max(cellSel.r1,cellSel.r2);
  const c1=Math.min(cellSel.c1,cellSel.c2),c2=Math.max(cellSel.c1,cellSel.c2);
  snapshot();
  for(let r=r1;r<=r2;r++){
    if(r>=cat.items.length)break;
    for(let c=c1;c<=c2;c++){
      const field=COL_FIELDS[c];
      cat.items[r][field]=COL_NUM[c]?(field==='rate'?1:0):'';
    }
  }
  renumberItems(cat.items);
  sched();renderAll();
  applyCellHighlight();
}

// ===== PDF保存 =====
function savePDF(){
  buildPrint();
  setTimeout(()=>{
    // Chromeの印刷ダイアログを開く
    // ユーザーが「送信先→PDFに保存」を選ぶだけでOK
    const style=document.createElement('style');
    style.id='pdf-hint-style';
    style.textContent=`
      @media print{
        body::before{
          content:"";
        }
      }
    `;
    document.head.appendChild(style);
    window.print();
    setTimeout(()=>{
      const s=document.getElementById('pdf-hint-style');
      if(s)s.remove();
    },2000);
  },150);
}

// ===== 書き出し・読み込みドロップダウンメニュー =====
function toggleIoMenu(e){
  e.stopPropagation();
  document.getElementById('iomenu').classList.toggle('on');
}
function closeIoMenu(){
  const m=document.getElementById('iomenu');
  if(m)m.classList.remove('on');
}

// ===== データ書き出し（JSON） =====
function exportData(){
  try{
    const exportObj={
      version:"1.0",
      exportDate:new Date().toLocaleString('ja-JP'),
      projects:projects,
      currentProjectId:curProjId
    };
    const json=JSON.stringify(exportObj,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const d=new Date();
    const ds=d.getFullYear()+(d.getMonth()+1).toString().padStart(2,'0')+d.getDate().toString().padStart(2,'0');
    a.download='mitsumori_data_'+ds+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('データを書き出しました！\nファイル名: mitsumori_data_'+ds+'.json');
  }catch(e){
    alert('書き出しに失敗しました: '+e.message);
  }
}

// ===== 選択中の物件だけを書き出し =====
function exportCurrentProject(){
  const p=curProj();
  if(!p){alert('物件が選択されていません。');return;}
  try{
    const copy=JSON.parse(JSON.stringify(p));
    const exportObj={
      version:"1.0",
      exportDate:new Date().toLocaleString('ja-JP'),
      projects:[copy],
      currentProjectId:copy.id
    };
    const json=JSON.stringify(exportObj,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const d=new Date();
    const ds=d.getFullYear()+(d.getMonth()+1).toString().padStart(2,'0')+d.getDate().toString().padStart(2,'0');
    const safe=(p.name||'物件').replace(/[\\\/:*?"<>|]/g,'_');
    a.download='mitsumori_'+safe+'_'+ds+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('「'+p.name+'」を書き出しました！');
  }catch(e){
    alert('書き出しに失敗しました: '+e.message);
  }
}

// ===== データ読み込み（JSON） =====
function importData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const obj=JSON.parse(e.target.result);
      if(!obj.projects||!Array.isArray(obj.projects)){
        alert('このファイルは対応していない形式です。');
        return;
      }
      if(!confirm(`「${file.name}」を読み込みます。\n現在のデータは上書きされます。\n続けますか？`)){
        input.value='';return;
      }
      snapshot();
      projects=obj.projects;
      curProjId=obj.currentProjectId||projects[0].id;
      if(!projects.find(p=>p.id===curProjId))curProjId=projects[0].id;
      curCat=0;
      saveNow();
      updateProjBtn();
      document.getElementById('co-sub').textContent=curCfg().co1||'';
      renderAll();
      alert('データを読み込みました！\n物件数：'+projects.length+'件');
    }catch(ex){
      alert('読み込みに失敗しました。\n正しいファイルか確認してください。\n'+ex.message);
    }
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ===== 物件追加インポート =====
function importAddData(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var obj=JSON.parse(e.target.result);
      if(!obj.projects||!Array.isArray(obj.projects)){
        alert('このファイルは対応していない形式です。');
        input.value='';return;
      }
      var existIds={};
      projects.forEach(function(p){existIds[p.id]=true;});
      var newProjs=obj.projects.filter(function(p){return !existIds[p.id];});
      var dupProjs=obj.projects.filter(function(p){return !!existIds[p.id];});
      var lines=[];
      lines.push('読み込むファイル: '+file.name);
      lines.push('');
      lines.push('追加される物件: '+newProjs.length+'件');
      newProjs.forEach(function(p){lines.push('  '+p.name);});
      if(dupProjs.length>0){
        lines.push('');
        lines.push('重複のためスキップ: '+dupProjs.length+'件');
        dupProjs.forEach(function(p){lines.push('  '+p.name);});
      }
      lines.push('');
      lines.push('追加しますか？');
      if(!confirm(lines.join('\n'))){input.value='';return;}
      if(newProjs.length===0){
        alert('追加できる物件がありませんでした。');
        input.value='';return;
      }
      snapshot();
      newProjs.forEach(function(p){
        p.id=genId();
        projects.push(p);
      });
      saveNow();
      renderAll();
      alert(newProjs.length+'件の物件を追加しました！');
    }catch(ex){
      alert('読み込みに失敗しました: '+ex.message);
    }
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ===== 物件を選んで読み込み =====
let pickParsed=null; // {fileName, list:[...]}

function importPickData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const obj=JSON.parse(e.target.result);
      if(!obj.projects||!Array.isArray(obj.projects)||!obj.projects.length){
        alert('このファイルは対応していない形式です。');
        input.value='';return;
      }
      pickParsed={fileName:file.name,list:obj.projects};
      openPickModal();
    }catch(ex){
      alert('読み込みに失敗しました。\n正しいファイルか確認してください。\n'+ex.message);
    }
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}
function openPickModal(){
  if(!pickParsed)return;
  document.getElementById('pick-file-name').textContent='ファイル: '+pickParsed.fileName+'　（'+pickParsed.list.length+'件の物件）';
  document.getElementById('pick-list').innerHTML=pickParsed.list.map(function(p,i){
    return '<label class="pick-row"><input type="checkbox" class="pick-chk" data-i="'+i+'" checked><span>'+(p.name||'（無題）')+'</span></label>';
  }).join('');
  document.getElementById('pickmodal').className='modal-ov on';
}
function closePickModal(){
  document.getElementById('pickmodal').className='modal-ov';
  pickParsed=null;
}
function pickSelAll(v){
  document.querySelectorAll('.pick-chk').forEach(function(el){el.checked=v;});
}
function confirmPickImport(){
  if(!pickParsed)return;
  const checks=document.querySelectorAll('.pick-chk');
  const chosen=[];
  checks.forEach(function(el){
    if(el.checked)chosen.push(pickParsed.list[parseInt(el.getAttribute('data-i'))]);
  });
  if(!chosen.length){alert('物件が選択されていません。');return;}
  snapshot();
  chosen.forEach(function(p){
    const copy=JSON.parse(JSON.stringify(p));
    copy.id=genId();
    projects.push(copy);
  });
  saveNow();
  updateProjBtn();
  renderAll();
  const n=chosen.length;
  closePickModal();
  alert(n+'件の物件を追加しました！');
}

// ①案件管理から「?caseId=...&caseName=...」付きで開かれた場合、
// その案件専用の物件を自動選択(無ければ案件名で新規作成)し、
// 「物件を選択」の手動操作なしにすぐ明細入力へ入れるようにする
function applyCaseLink(){
  try{
    const params=new URLSearchParams(window.location.search);
    const caseId=params.get('caseId');
    if(!caseId)return;
    const caseName=params.get('caseName')||'';
    const customerName=params.get('customerName')||'';
    const honorific=params.get('honorific')||'';
    const buildingName=params.get('buildingName')||'';
    const buildingAddress=params.get('buildingAddress')||'';
    let proj=projects.find(p=>p.caseId===caseId);
    if(!proj){
      const id=genId();
      const cfg=JSON.parse(JSON.stringify(DEF_CFG));
      // サンプルデータの宛先・工事情報を、案件の情報(または空欄)で上書きする
      cfg.client=customerName||'';
      cfg.honorific=honorific||'御中';
      cfg.proj=caseName||'';
      cfg.loc=buildingAddress||buildingName||'';
      cfg.ovr='';
      proj={
        id,name:caseName||'新規物件',
        createdAt:new Date().toLocaleDateString('ja-JP'),
        cats:JSON.parse(JSON.stringify(DEF_CATS)),
        cfg:cfg,
        discount:0,
        caseId:caseId
      };
      projects.push(proj);
      persistAll();
    }
    curProjId=proj.id;
    curCat=0;
    updateProjBtn();
    const sub=document.getElementById('co-sub');
    if(sub)sub.textContent=curCfg().co1||'';
  }catch(e){console.warn('案件連携エラー',e);}
}
function bootApp(){
  loadAll();loadAppTitle();loadTheme();applyCaseLink();updateUndoRedoBtns();renderAll();
}
