<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>簡易見積書(1枚) | 太豊建設アプリ</title>
<style>
  :root{
    --purple:#6C47FF; --border:#ccc; --border2:#888; --text2:#555; --text3:#999;
    --bg:#F6F5FB; --surface:#fff; --danger:#F0525C; --green:#10B981;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;background:var(--bg);color:#1e1b2e;}
  .topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;position:relative;z-index:100;}
  .topbar input.proj-name{font-size:14px;font-weight:700;padding:7px 10px;border:1px solid var(--border);border-radius:8px;min-width:200px;}
  .btn{font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;white-space:nowrap;}
  .btn:hover{background:#f1f1f5;}
  .btn-primary{background:var(--purple);border-color:var(--purple);color:#fff;}
  .btn-primary:hover{background:#5636d9;}
  .btn-danger{color:var(--danger);border-color:#fbd5d8;}
  .btn-danger:hover{background:#fef1f2;}
  .spacer{flex:1;}
  .wrap{max-width:1000px;margin:20px auto 60px;padding:0 16px;}
  .panel{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .panel h3{margin:0 0 14px;font-size:14px;color:var(--text2);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
  .frow{margin-bottom:8px;}
  .frow label{display:block;font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:3px;}
  .frow input,.frow select,.frow textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;}
  .frow .row2{display:flex;gap:6px;}
  .frow .row2 input{flex:1;}
  .frow .row2 select{width:90px;}
  table.items{width:100%;border-collapse:collapse;margin-top:6px;}
  table.items th,table.items td{border:1px solid var(--border);padding:6px;font-size:12.5px;}
  table.items th{background:#f6f5fb;color:var(--text2);font-weight:700;}
  table.items td input{width:100%;border:none;background:transparent;font-family:inherit;font-size:12.5px;padding:2px;}
  table.items td input:focus{outline:1.5px solid var(--purple);border-radius:3px;}
  table.items td.num input{text-align:right;}
  table.items td.amount{text-align:right;font-weight:700;}
  .del-cell{text-align:center;}
  .del-cell button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
  .del-cell button:hover{color:var(--danger);}
  .ins-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;}
  .ins-btn:hover{color:var(--purple);}
  .cell-x{position:relative;}
  .cell-x.cell-selected{outline:2px solid var(--purple);outline-offset:-2px;background:rgba(108,71,255,.08)!important;z-index:1;}
  .ctxmenu{position:fixed;z-index:99999;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);padding:5px;min-width:180px;font-size:12.5px;display:none;}
  .ctxmenu.on{display:block;}
  .ctxmenu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;color:#1f2937;}
  .ctxmenu button:hover{background:#eff3fb;}
  .ctxmenu button.danger{color:#c0392b;}
  .ctxmenu hr{border:none;border-top:1px solid var(--border);margin:5px 2px;}
  .width-panel{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#f6f5fb;border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;}
  .width-panel .wi{display:flex;align-items:center;gap:6px;}
  .width-panel .wi label{font-weight:700;color:var(--text2);white-space:nowrap;}
  .width-panel .wi input{width:56px;padding:5px 6px;border:1px solid var(--border);border-radius:6px;text-align:right;font-family:inherit;}
  .width-panel .rowcount{margin-left:auto;color:var(--text2);}
  .width-panel .rowcount.warn{color:var(--danger);font-weight:700;}
  .add-row-btn{margin-top:8px;padding:7px;width:100%;border:1px dashed var(--border2);background:transparent;border-radius:7px;color:var(--text2);cursor:pointer;font-family:inherit;font-size:12.5px;}
  .totals{margin-top:10px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .totals .row{display:flex;gap:14px;align-items:center;font-size:13.5px;}
  .totals .row .lbl{color:var(--text2);width:90px;text-align:right;}
  .totals .row .val{width:130px;text-align:right;font-weight:700;font-family:'Courier New',monospace;}
  .totals .row.grand .val{font-size:16px;color:var(--purple);}
  .totals .row input[type=number]{width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;text-align:right;}

  /* dropdown */
  .dropwrap{position:relative;display:inline-block;}
  .dropmenu{position:absolute;top:100%;left:0;margin-top:4px;z-index:500;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.2);padding:5px;min-width:230px;font-size:12.5px;display:none;}
  .dropmenu.on{display:block;}
  .dropmenu button{display:block;width:100%;text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:5px;font-family:inherit;font-size:12.5px;color:#1f2937;white-space:nowrap;}
  .dropmenu button:hover{background:#eff3fb;}
  .dropmenu hr{border:none;border-top:1px solid var(--border);margin:5px 2px;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,15,40,.4);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;padding:20px;}
  .modal h3{margin:0 0 14px;font-size:15px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .pick-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #f1f1f1;font-size:13px;cursor:pointer;}
  .pick-row:last-child{border-bottom:none;}
  .proj-row{display:flex;align-items:center;justify-content:space-between;padding:10px 6px;border-bottom:1px solid #f1f1f1;font-size:13px;}
  .proj-row:last-child{border-bottom:none;}
  .proj-row .pname{font-weight:700;cursor:pointer;flex:1;}
  .proj-row .pname:hover{color:var(--purple);}
  .proj-row .pmeta{font-size:11px;color:var(--text3);margin-left:8px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1b2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:2000;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== 印刷レイアウト(見積書1枚) ===== */
  #printArea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printArea,#printArea *{visibility:visible;}
    #printArea{display:block;position:absolute;top:0;left:0;width:100%;}
    .no-print{display:none!important;}
  }
  .pq-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;font-size:11pt;}
  .pq-date{font-size:11pt;}
  .pq-title{text-align:center;font-size:24pt;font-weight:700;letter-spacing:.5em;margin:4px 0 14px;}
  .pq-co{text-align:right;font-size:11pt;line-height:1.7;}
  .pq-co .name{font-size:15pt;font-weight:700;}
  .pq-client{font-size:15pt;font-weight:700;text-decoration:underline;margin:10px 0 18px;}
  .pq-amount-box{border-top:2px solid #000;border-bottom:2px solid #000;padding:10px 0;margin:10px 0 16px;}
  .pq-amount-box .lbl{font-size:13pt;}
  .pq-amount-box .val{font-size:20pt;font-weight:700;letter-spacing:.05em;}
  .pq-meta{display:flex;flex-direction:column;gap:3px;font-size:10.5pt;margin-bottom:6px;}
  .pq-meta .r{display:flex;}
  .pq-meta .r .k{width:110px;font-weight:700;}
  .pq-meta .r .v{border-bottom:1px dotted #999;flex:1;}
  .pq-kojimei{font-size:11pt;font-weight:700;margin:10px 0 10px;}
  table.pq-table{width:100%;border-collapse:collapse;margin-top:6px;}
  table.pq-table th,table.pq-table td{border:1px solid #333;padding:6px 8px;font-size:10pt;}
  table.pq-table th{background:#eee;text-align:center;}
  table.pq-table td.num{text-align:right;}
  table.pq-table td.l{text-align:left;}
  table.pq-table td.ctr{text-align:center;}
  table.pq-table tr.total-row td{font-weight:700;text-align:right;}
  table.pq-table tr.total-row td.val{text-align:right;}

  /* A4よこ(landscape)選択時は、1枚に収まるよう全体をコンパクトにする */
  #printArea.orient-landscape .pq-top{font-size:9pt;margin-bottom:3px;}
  #printArea.orient-landscape .pq-co{font-size:9pt;line-height:1.35;}
  #printArea.orient-landscape .pq-co .name{font-size:12pt;}
  #printArea.orient-landscape .pq-title{font-size:18pt;letter-spacing:.35em;margin:2px 0 8px;}
  #printArea.orient-landscape .pq-client{font-size:12pt;margin:4px 0 8px;}
  #printArea.orient-landscape .pq-amount-box{padding:4px 0;margin:4px 0 8px;}
  #printArea.orient-landscape .pq-amount-box .lbl{font-size:10pt;}
  #printArea.orient-landscape .pq-amount-box .val{font-size:14pt;}
  #printArea.orient-landscape .pq-meta{font-size:8.5pt;gap:1px;margin-bottom:3px;}
  #printArea.orient-landscape .pq-meta .r .k{width:85px;}
  #printArea.orient-landscape .pq-kojimei{font-size:9pt;margin:4px 0 4px;}
  #printArea.orient-landscape table.pq-table th,#printArea.orient-landscape table.pq-table td{padding:2px 5px;font-size:8pt;}
</style>
<style id="pageOrientStyle">
  @media print{ @page{ size: A4 portrait; margin: 12mm 14mm; } }
</style>
</head>

  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>

<div class="topbar no-print">
  <input type="text" class="proj-name" id="projName" value="無題の見積" spellcheck="false">
  <button class="btn btn-primary" id="btnSave">💾 保存</button>
  <button class="btn" id="btnNew">＋ 新規</button>
  <button class="btn" id="btnList">📁 保存済み一覧</button>

  <button class="btn" id="btnSample">🏠 サンプルを読込</button>
  <div class="spacer"></div>
  <button class="btn" id="btnPrint">🖨 印刷/PDF保存</button>
  <select id="printOrient" class="btn" style="padding:8px 10px;">
    <option value="portrait">A4たて</option>

      <button id="ioImportOver">📥 全物件を読み込み（上書き）</button>

  </div>
  <input type="file" id="importFilePick" accept=".json" style="display:none">

</div>

<div class="wrap no-print">
  <div class="panel">
    <h3>見積書情報</h3>
    <div class="grid2">
      <div class="frow"><label>発行日</label><input type="text" id="f_date"></div>
      <div class="frow"><label>見積番号</label><input type="text" id="f_no"></div>
      <div class="frow">
        <label>宛先</label>
        <div class="row2">
          <input type="text" id="f_client">
          <select id="f_honorific"><option value="御中">御中</option><option value="様">様</option></select>
        </div>
      </div>
      <div class="frow"><label>見積担当者</label><input type="text" id="f_estimator"></div>
      <div class="frow"><label>工事名</label><input type="text" id="f_kojimei"></div>
      <div class="frow"><label>納期(御注文後)</label><input type="text" id="f_delivery"></div>
      <div class="frow"><label>御受渡場所</label><input type="text" id="f_place"></div>
      <div class="frow"><label>御支払条件</label><input type="text" id="f_pay"></div>
      <div class="frow"><label>見積有効期間</label><input type="text" id="f_valid"></div>
    </div>
    <div class="frow" style="margin-top:6px;">
      <label>備考</label>
      <textarea id="f_remarks" rows="2" placeholder="例：※塗装は、現地合わせの為若干異なる場合がございますがご理解下さい。" style="resize:vertical;"></textarea>
    </div>
  </div>

  <div class="panel">
    <h3>明細</h3>
    <div class="width-panel">
      <span style="font-weight:700;color:var(--text2);">印刷時の列幅調整：</span>
      <div class="wi"><label>種別</label><input type="number" id="w_cat" min="5" max="54" step="1"><span>%</span></div>
      <div class="wi"><label>規格・寸法</label><input type="number" id="w_spec" min="5" max="54" step="1"><span>%</span></div>
      <div class="wi"><label>備考</label><input type="number" id="w_note" min="5" max="54" step="1"><span>%</span></div>
      <span style="color:var(--text3);">(どれか1つを増やすと、残り2つが自動で縮みます。数量・単位・単価・金額の幅は固定です)</span>
      <span class="rowcount" id="rowCountLabel"></span>
    </div>
    <table class="items">
      <colgroup><col style="width:11%"><col style="width:12%"><col style="width:5%"><col style="width:5%"><col style="width:9%"><col style="width:9%"><col style="width:6%"><col style="width:9%"><col style="width:9%"><col style="width:8%"><col style="width:12%"><col style="width:28px"></colgroup>
      <thead><tr>
        <th>種別</th><th>規格・寸法</th><th>数量</th><th>単位</th>
        <th style="background:#fff3e0;">実行単価</th><th style="background:#fff3e0;">実行金額</th>
        <th style="background:#eef2ff;">掛率</th>
        <th>単価</th><th>金額</th>
        <th style="background:#e8f9f0;">粗利</th>
        <th>備考</th><th></th>
      </tr></thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <datalist id="rateOptions">
      <option value="1.25"><option value="1.3"><option value="1.35"><option value="1.4"><option value="1.45"><option value="1.5">
    </datalist>
    <button class="add-row-btn" id="btnAddRow">＋ 行を追加</button>
    <p style="font-size:11px;color:var(--text3);margin:6px 0 0;">「実行単価」「実行金額」「掛率」「粗利」の列は社内用です。印刷・PDFの見積書には表示されません。単価＝実行単価×掛率、金額＝数量×単価で自動計算されます。</p>
    <div class="totals">
      <div class="row"><span class="lbl">小　計</span><span class="val" id="t_sub">¥0</span></div>
      <div class="row"><span class="lbl">消費税</span><input type="number" id="t_taxrate" value="10" min="0" style="width:50px"> %<span class="val" id="t_tax">¥0</span></div>
      <div class="row grand"><span class="lbl">合　計</span><span class="val" id="t_total">¥0</span></div>
    </div>
    <div class="totals" style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);">
      <div class="row"><span class="lbl">実行原価計</span><span class="val" id="t_exec">¥0</span></div>
      <div class="row"><span class="lbl">粗利合計</span><span class="val" id="t_margin" style="color:var(--green);">¥0</span></div>
      <div class="row"><span class="lbl">利益率</span><span class="val" id="t_marginrate">0%</span></div>
    </div>
  </div>
</div>

</div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "simple_quote_projects_v1";
  var COMPANY_KEY = "simple_quote_company_v1";

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function fmt(n){ return Math.round(n||0).toLocaleString("ja-JP"); }
  function esc(s){ var d=document.createElement("div"); d.textContent = (s==null?"":s); return d.innerHTML; }

  function loadProjects(){
    try{ var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
    catch(e){ return []; }
  }
  function saveProjects(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

  var DEF_COMPANY = {
    co1:"有限会社 太豊建設", rep:"代表取締役　青塚 恒太",
    zip:"〒059-1262", addr1:"苫小牧市美原町3丁目1番5号",
    tel:"(0144) 82-7648", fax:"(0144) 82-7649", inv:"T5-4300-0206-0556"
  };
  function loadCompany(){
    try{
      var raw = localStorage.getItem(COMPANY_KEY);
      return raw ? Object.assign({}, DEF_COMPANY, JSON.parse(raw)) : Object.assign({}, DEF_COMPANY);
    }catch(e){ return Object.assign({}, DEF_COMPANY); }
  }
  function saveCompany(c){ localStorage.setItem(COMPANY_KEY, JSON.stringify(c)); }

  /* =====================================================================
     セル選択・コピー&ペースト・右クリックメニュー(Excelライク)
     論理列: 0=種別 1=規格寸法 2=数量 3=単位 4=実行単価 5=掛率 6=備考
     ===================================================================== */
  var COL_FIELDS = ["cat","spec","qty","unit","execPrice","rate","note"];
  var COL_NUM = [false,false,true,false,true,true,false];
  var cellSel = null;
  var cellSelecting = false;
  var clipGrid = null;

  function cellDown(r,c){
    cellSel = { r1:r, c1:c, r2:r, c2:c };
    cellSelecting = true;
    applyCellHighlight();
  }
  function cellEnter(r,c){
    if(!cellSelecting || !cellSel) return;
    cellSel.r2 = r; cellSel.c2 = c;
    applyCellHighlight();
  }
  document.addEventListener("mouseup", function(){ cellSelecting = false; });

  function applyCellHighlight(){
    document.querySelectorAll("td.cell-selected").forEach(function(td){ td.classList.remove("cell-selected"); });
    if(!cellSel) return;
    var r1=Math.min(cellSel.r1,cellSel.r2), r2=Math.max(cellSel.r1,cellSel.r2);
    var c1=Math.min(cellSel.c1,cellSel.c2), c2=Math.max(cellSel.c1,cellSel.c2);
    for(var r=r1;r<=r2;r++)for(var c=c1;c<=c2;c++){
      var td = document.querySelector('td.cell-x[data-r="'+r+'"][data-c="'+c+'"]');
      if(td) td.classList.add("cell-selected");
    }
  }

  function gridCopy(){
    if(!cellSel) return;
    var r1=Math.min(cellSel.r1,cellSel.r2), r2=Math.max(cellSel.r1,cellSel.r2);
    var c1=Math.min(cellSel.c1,cellSel.c2), c2=Math.max(cellSel.c1,cellSel.c2);
    var grid = [];
    for(var r=r1;r<=r2;r++){
      var row = []; var it = data.items[r];
      for(var c=c1;c<=c2;c++){ row.push(it ? (it[COL_FIELDS[c]] == null ? "" : it[COL_FIELDS[c]]) : ""); }
      grid.push(row);
    }
    clipGrid = grid;
    try{
      var tsv = grid.map(function(row){ return row.join("\t"); }).join("\n");
      navigator.clipboard && navigator.clipboard.writeText(tsv).catch(function(){});
    }catch(e){}
  }

  function gridPaste(){
    if(!cellSel) return;
    var doPasteWith = function(grid){
      if(!grid || !grid.length) return;
      var r1=Math.min(cellSel.r1,cellSel.r2), c1=Math.min(cellSel.c1,cellSel.c2);
      var destR2=Math.max(cellSel.r1,cellSel.r2), destC2=Math.max(cellSel.c1,cellSel.c2);
      var gh=grid.length, gw=grid[0].length;
      var rowsNeeded = (gh===1 && destR2>r1) ? (destR2-r1+1) : gh;
      var colsNeeded = (gw===1 && destC2>c1) ? (destC2-c1+1) : gw;
      for(var i=0;i<rowsNeeded;i++){
        var r = r1+i;
        while(data.items.length<=r){ data.items.push(emptyItem()); }
        for(var j=0;j<colsNeeded;j++){
          var c = c1+j;
          if(c>6) break;
          var field = COL_FIELDS[c];
          var raw = grid[gh===1?0:i][gw===1?0:j];
          var val = raw;
          if(COL_NUM[c]){ val = parseFloat(String(raw).replace(/,/g,""))||0; if(field==="rate"&&!val) val=1; }
          else { val = String(raw==null?"":raw); }
          data.items[r][field] = val;
        }
      }
      cellSel = { r1:r1, c1:c1, r2:r1+rowsNeeded-1, c2:c1+colsNeeded-1 };
      renderItems(); renderTotals();
      applyCellHighlight();
    };
    if(clipGrid){ doPasteWith(clipGrid); return; }
    try{
      navigator.clipboard.readText().then(function(text){
        if(!text) return;
        var grid = text.replace(/\r/g,"").split("\n").filter(function(l,i,arr){ return !(i===arr.length-1 && l===""); }).map(function(l){ return l.split("\t"); });
        doPasteWith(grid);
      }).catch(function(){});
    }catch(e){}
  }

  document.addEventListener("keydown", function(e){
    if(!(e.ctrlKey||e.metaKey)) return;
    var key = e.key.toLowerCase();
    if(key==="c"){
      if(!cellSel) return;
      var ae = document.activeElement;
      if(ae && ae.tagName==="INPUT" && ae.selectionStart!==ae.selectionEnd) return;

      gridPaste();
    }

  /* =====================================================================
     印刷時の列幅調整(種別・規格寸法・備考の3つを自動バランス)
     ===================================================================== */
  var FIXED_COL_WIDTH = { qty:6, unit:7, price:11, amount:11 }; // 固定4列の合計=35%
  var FIXED_TOTAL = 35;
  var FLEX_TOTAL = 100 - FIXED_TOTAL; // 65
  var printColWidths = { cat: 23, spec: 21, note: 21 };

  function renderWidthInputs(){
    document.getElementById("w_cat").value = Math.round(printColWidths.cat);
    document.getElementById("w_spec").value = Math.round(printColWidths.spec);
    document.getElementById("w_note").value = Math.round(printColWidths.note);
  }
  function updateFlexWidth(changedKey, newVal){
    newVal = Math.max(5, Math.min(FLEX_TOTAL-10, newVal));
    var keys = ["cat","spec","note"];
    var others = keys.filter(function(k){ return k!==changedKey; });
    var oldOthersSum = others.reduce(function(s,k){ return s+printColWidths[k]; }, 0);
    var remaining = FLEX_TOTAL - newVal;
    if(oldOthersSum<=0){
      others.forEach(function(k){ printColWidths[k] = remaining/2; });
    }else{
      others.forEach(function(k){ printColWidths[k] = remaining * (printColWidths[k]/oldOthersSum); });
    }
    printColWidths[changedKey] = newVal;
    renderWidthInputs();
  }
  ["cat","spec","note"].forEach(function(k){
    document.getElementById("w_"+k).addEventListener("input", function(){
      var v = parseFloat(this.value);
      if(isNaN(v)) return;
      updateFlexWidth(k, v);
    });
  });

  function calcTotals(){
    var sub = data.items.reduce(function(s,it){ return s + itemAmount(it); }, 0);
    var tax = Math.round(sub * (data.taxRate||0) / 100);
    var exec = data.items.reduce(function(s,it){ return s + itemExecAmount(it); }, 0);
    var margin = sub - exec;
    var marginRate = sub>0 ? Math.round(margin/sub*1000)/10 : 0;
    return { sub: sub, tax: tax, total: sub + tax, exec: exec, margin: margin, marginRate: marginRate };
  }
  function renderTotals(){

    document.getElementById("t_sub").textContent = "¥"+fmt(t.sub);
    document.getElementById("t_tax").textContent = "¥"+fmt(t.tax);

  /* ---------------- 印刷(1枚の見積書) ---------------- */
  function buildPrintArea(){
    var t = calcTotals();
    var rows = data.items.filter(function(it){ return it.cat || it.spec || it.qty || it.execPrice || it.note; }).map(function(it){
      var price = itemPrice(it), amt = itemAmount(it);
      return "<tr><td class='l'>"+esc(it.cat)+"</td><td class='l'>"+esc(it.spec)+"</td>" +
        "<td class='num'>"+(it.qty||"")+"</td><td class='ctr'>"+esc(it.unit)+"</td>" +
        "<td class='num'>"+(price?fmt(price):"")+"</td>" +
        "<td class='num'>"+(amt?fmt(amt):"")+"</td><td class='l'>"+esc(it.note)+"</td></tr>";
    }).join("");
    // 種別〜備考は最大15行を目安に、それ未満なら空行で埋めて見た目を整える
    var minRows = 15;
    var filled = data.items.filter(function(it){ return it.cat||it.spec||it.qty||it.execPrice||it.note; }).length;
    for(var i=filled;i<minRows;i++){ rows += "<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>"; }

    var wCat = printColWidths.cat, wSpec = printColWidths.spec, wNote = printColWidths.note;
    var wQty = FIXED_COL_WIDTH.qty, wUnit = FIXED_COL_WIDTH.unit, wPrice = FIXED_COL_WIDTH.price, wAmount = FIXED_COL_WIDTH.amount;

    document.getElementById("printArea").innerHTML =
      "<div class='pq-top'>" +
        "<div class='pq-date'>" + esc(data.date) + "<br>見積番号　第　　　号</div>" +
        "<div class='pq-co'>" +
          (company.co1?("<div class='name'>"+esc(company.co1)+"</div>"):"") +
          (company.rep?("<div>"+esc(company.rep)+"</div>"):"") +
          "<div>"+esc(company.zip)+" "+esc(company.addr1)+"</div>" +
          "<div>TEL "+esc(company.tel)+"　FAX "+esc(company.fax)+"</div>" +
          (company.inv?("<div>インボイス登録番号　"+esc(company.inv)+"</div>"):"") +
        "</div>" +
      "</div>" +
      "<div class='pq-title'>御見積書</div>" +
      "<div class='pq-client'>"+esc(data.client)+"　"+esc(data.honorific||"御中")+"</div>" +
      "<div class='pq-amount-box'><span class='lbl'>総金額　</span><span class='val'>¥ "+fmt(t.total)+"　－</span></div>" +
      "<div class='pq-kojimei'>工事名　"+esc(data.kojimei)+"</div>" +
      "<div class='pq-meta'>" +
        "<div class='r'><span class='k'>納期(御注文後)</span><span class='v'>"+esc(data.delivery)+"</span></div>" +
        "<div class='r'><span class='k'>御受渡場所</span><span class='v'>"+esc(data.place)+"</span></div>" +
        "<div class='r'><span class='k'>御支払条件</span><span class='v'>"+esc(data.pay)+"</span></div>" +
        "<div class='r'><span class='k'>見積有効期間</span><span class='v'>"+esc(data.valid)+"</span></div>" +
        (data.estimator?("<div class='r'><span class='k'>見積担当者</span><span class='v'>"+esc(data.estimator)+"</span></div>"):"") +
      "</div>" +
      "<table class='pq-table'>" +
        "<thead><tr>" +
          "<th style='width:"+wCat+"%'>種別</th><th style='width:"+wSpec+"%'>規格・寸法</th>" +
          "<th style='width:"+wQty+"%'>数量</th><th style='width:"+wUnit+"%'>単位</th>" +
          "<th style='width:"+wPrice+"%'>単価</th><th style='width:"+wAmount+"%'>金額</th>" +
          "<th style='width:"+wNote+"%'>備考</th>" +
        "</tr></thead>" +
        "<tbody>" + rows +
          "<tr class='total-row'><td colspan='5'>小　計</td><td class='val'>"+fmt(t.sub)+"</td><td></td></tr>" +
          "<tr class='total-row'><td colspan='5'>消費税　"+(data.taxRate||0)+"%</td><td class='val'>"+fmt(t.tax)+"</td><td></td></tr>" +
          "<tr class='total-row'><td colspan='5'>合　計</td><td class='val'>"+fmt(t.total)+"</td><td></td></tr>" +
        "</tbody>" +
      "</table>" +
      (data.remarks ? "<div style='margin-top:12px;font-size:10pt;line-height:1.7;white-space:pre-wrap;border-top:1px dashed #999;padding-top:8px;'>"+esc(data.remarks).replace(/\n/g,"<br>")+"</div>" : "");
  }
  function applyPrintOrientation(){
    var v = document.getElementById("printOrient").value;
    var margin = v === "landscape" ? "8mm 10mm" : "12mm 14mm";
    document.getElementById("pageOrientStyle").textContent =
      "@media print{ @page{ size: A4 " + v + "; margin: " + margin + "; } }";
    document.getElementById("printArea").className = "orient-" + v;
  }
  document.getElementById("printOrient").addEventListener("change", applyPrintOrientation);

  document.getElementById("btnPrint").addEventListener("click", function(){
    applyPrintOrientation();
    buildPrintArea();
    setTimeout(function(){ window.print(); }, 100);
  });

  /* ---------------- 書き出し・読み込み ---------------- */
  function dlJson(obj, filename){
    var json = JSON.stringify(obj, null, 2);
    var blob = new Blob([json], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function dateStamp(){
    var d = new Date();
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
  }
  function currentProjectSnapshot(){
    var name = document.getElementById("projName").value.trim() || "無題の見積";
    if(currentProjectId){
      var p = loadProjects().find(function(x){return x.id===currentProjectId;});
      if(p) return JSON.parse(JSON.stringify(p));
    }
    return { id: uid(), name: name, data: JSON.parse(JSON.stringify(data)), createdAt: Date.now(), updatedAt: Date.now() };
  }

  document.getElementById("ioExportCur").addEventListener("click", function(){
    closeIoMenu();
    var proj = currentProjectSnapshot();
    dlJson({app:"simple-quote", version:1, exportDate:new Date().toLocaleString("ja-JP"), projects:[proj]}, "mitsumori1mai_"+proj.name+"_"+dateStamp()+".json");
    showToast("「"+proj.name+"」を書き出しました");
  });
  document.getElementById("ioExportAll").addEventListener("click", function(){
    closeIoMenu();
    var projects = loadProjects();
    if(!projects.length){ alert("保存されている物件がありません。"); return; }
    dlJson({app:"simple-quote", version:1, exportDate:new Date().toLocaleString("ja-JP"), projects:projects}, "mitsumori1mai_zenbutsuken_"+dateStamp()+".json");
    showToast("全"+projects.length+"件を書き出しました");
  });

  function readJsonFile(input, cb){
    var file = input.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var obj = JSON.parse(e.target.result);
        if(!obj || !Array.isArray(obj.projects) || !obj.projects.length){
          alert("このファイルは対応していない形式です。"); input.value=""; return;
        }
        cb(obj, file.name);
      }catch(ex){ alert("読み込みに失敗しました。\n"+ex.message); }
      input.value = "";
    };
    reader.readAsText(file, "UTF-8");
  }

  document.getElementById("ioImportAdd").addEventListener("click", function(){ closeIoMenu(); document.getElementById("importFileAdd").click(); });
  document.getElementById("ioImportOver").addEventListener("click", function(){ closeIoMenu(); document.getElementById("importFileAll").click(); });
  document.getElementById("ioImportPick").addEventListener("click", function(){ closeIoMenu(); document.getElementById("importFilePick").click(); });

  document.getElementById("importFileAdd").addEventListener("change", function(){
    readJsonFile(this, function(obj, fname){
      var projects = loadProjects();
      var existIds = {}; projects.forEach(function(p){existIds[p.id]=true;});
      var news = obj.projects.filter(function(p){return !existIds[p.id];});
      var dups = obj.projects.filter(function(p){return !!existIds[p.id];});
      var lines = ["読み込むファイル: "+fname, "", "追加される物件: "+news.length+"件"];
      news.forEach(function(p){lines.push("  "+p.name);});
      if(dups.length){ lines.push(""); lines.push("重複のためスキップ: "+dups.length+"件"); }
      lines.push(""); lines.push("追加しますか？");
      if(!confirm(lines.join("\n"))) return;
      if(!news.length){ alert("追加できる物件がありませんでした。"); return; }
      news.forEach(function(p){ p.id = uid(); projects.push(p); });
      saveProjects(projects);
      showToast(news.length+"件の物件を追加しました！");
    });
  });
  document.getElementById("importFileAll").addEventListener("change", function(){
    readJsonFile(this, function(obj, fname){
      if(!confirm("「"+fname+"」を読み込みます。\n保存されている全物件が上書きされます。\nこの操作は元に戻せません。続けますか？")) return;
      saveProjects(obj.projects);
      showToast("読み込みました！物件数："+obj.projects.length+"件");
      currentProjectId = null;
      loadIntoForm(emptyData(), "無題の見積");
    });
  });
  var pickParsed = null;
  document.getElementById("importFilePick").addEventListener("change", function(){
    readJsonFile(this, function(obj, fname){
      pickParsed = { fileName: fname, list: obj.projects };
      document.getElementById("pickFileName").textContent = "ファイル: "+fname+"　（"+obj.projects.length+"件の物件）";
      document.getElementById("pickList").innerHTML = obj.projects.map(function(p,i){
        return "<label class='pick-row'><input type='checkbox' class='pick-chk' data-i='"+i+"' checked><span>"+esc(p.name||"（無題）")+"</span></label>";
      }).join("");
      document.getElementById("pickOverlay").classList.add("show");
    });
  });
  document.getElementById("pickCancel").addEventListener("click", function(){ document.getElementById("pickOverlay").classList.remove("show"); pickParsed=null; });
  document.getElementById("pickOverlay").addEventListener("click", function(e){ if(e.target===this){ this.classList.remove("show"); pickParsed=null; } });
  document.getElementById("pickSelAll").addEventListener("click", function(){ document.querySelectorAll(".pick-chk").forEach(function(el){el.checked=true;}); });
  document.getElementById("pickSelNone").addEventListener("click", function(){ document.querySelectorAll(".pick-chk").forEach(function(el){el.checked=false;}); });
  document.getElementById("pickConfirm").addEventListener("click", function(){
    if(!pickParsed) return;
    var chosen = [];
    document.querySelectorAll(".pick-chk").forEach(function(el){
      if(el.checked) chosen.push(pickParsed.list[parseInt(el.getAttribute("data-i"))]);
    });
    if(!chosen.length){ alert("物件が選択されていません。"); return; }
    var projects = loadProjects();
    chosen.forEach(function(p){ var copy = JSON.parse(JSON.stringify(p)); copy.id = uid(); projects.push(copy); });
    saveProjects(projects);
    var n = chosen.length;
    document.getElementById("pickOverlay").classList.remove("show");
    pickParsed = null;
    showToast(n+"件の物件を追加しました！");
  });

  function closeIoMenu(){ document.getElementById("ioMenu").classList.remove("on"); }
  document.getElementById("btnIoMenu").addEventListener("click", function(e){
    e.stopPropagation();
    document.getElementById("ioMenu").classList.toggle("on");
  });
  document.addEventListener("click", closeIoMenu);

  /* ---------------- トースト ---------------- */
  var toastTimer = null;
  function showToast(msg){
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2200);
  }

  /* ---------------- 初期化 ---------------- */
  bindHeaderEvents();
  loadIntoForm(emptyData(), "無題の見積");
})();
</script>
</body>
</html>
