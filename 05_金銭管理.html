<title>金銭管理 | 太豊建設アプリ</title>
<style>
  :root {
    --bg: #F6F5FB; --surface: #FFFFFF; --primary: #6C47FF; --primary-dark: #5636D9;
    --primary-soft: #EFEAFF; --text: #1E1B2E; --text-secondary: #6B6580; --text-tertiary: #9C97AE;
    --border: #E7E4F0; --danger: #F0525C; --success: #10B981; --radius: 12px;
    --shadow-sm: 0 1px 2px rgba(30,27,46,0.06); --shadow-md: 0 8px 24px rgba(30,27,46,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Yu Gothic','Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

  .shell { max-width: 1240px; margin: 0 auto; padding: 20px 20px 60px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .page-header__title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 22px; letter-spacing: 0.01em; }
  .page-header__title .badge-count { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600; color: var(--primary); background: var(--primary-soft); padding: 3px 9px; border-radius: 100px; }
  .page-header__actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .search-box { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
  .search-box input { width: 100%; padding: 10px 12px 10px 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: transform .1s, background .15s, box-shadow .15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn--primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn--primary:hover { background: var(--primary-dark); }
  .btn--ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn--ghost:hover { background: #F1EFFB; }
  .btn--danger-ghost { background: transparent; color: var(--danger); border-color: #FBD5D8; }
  .btn--danger-ghost:hover { background: #FEF1F2; }
  .btn--sm { padding: 7px 12px; font-size: 12.5px; }

  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:hover { background: #F1EFFB; color: var(--text); }

  .module-tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 5px; width: fit-content; flex-wrap: wrap; }
  .module-tab { display:flex; align-items:center; gap:6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 9px 16px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; transition: all .15s; }
  .module-tab.is-active { background: var(--primary); color: white; }
  .module-tab.is-disabled { color: var(--text-tertiary); cursor: default; }
  .module-tab .soon { font-size: 9px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 1px 6px; border-radius: 999px; }

  .type-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .type-tabs::-webkit-scrollbar { display: none; }
  .type-tab { font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 8px 14px; border-radius: 999px; border: 1px solid transparent; background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .type-tab:hover { background: #EDEAFA; }
  .type-tab.is-active { background: var(--text); color: white; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
  table.data-table { width: 100%; border-collapse: collapse; }
  .data-table thead th { text-align: left; font-size: 12px; font-weight: 700; color: var(--text-tertiary); padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .data-table tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  .data-table tbody tr:last-child { border-bottom: none; }
  .data-table tbody tr:hover { background: #FBFAFF; }
  .data-table td { padding: 13px 16px; font-size: 13.5px; vertical-align: middle; white-space: nowrap; }
  .cell-name { font-weight: 700; background:none; border:none; cursor:pointer; text-align:left; color:inherit; font-family:inherit; font-size:inherit; padding:0; }
  .cell-actions { text-align: right; }
  .muted { color: var(--text-tertiary); }

  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; font-size:11px; font-weight:800; color:white; background: var(--rank-color); }

  .status-pill { position: relative; display: inline-flex; align-items: center; gap: 6px; background: var(--pill-color); border-radius: 999px; padding: 5px 26px 5px 10px; }
  .status-pill__dot { width: 6px; height: 6px; border-radius: 50%; background: white; opacity: .9; flex-shrink:0; }
  .status-pill select { appearance: none; background: transparent; border: none; color: white; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; outline: none; }
  .status-pill select option { color: var(--text); }
  .status-pill__chev { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: white; pointer-events:none; }
  .type-tag { font-size: 11.5px; font-weight: 700; color: var(--tag-color); background: color-mix(in srgb, var(--tag-color) 12%, white); padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .amount-text { font-family: 'Courier New', monospace; font-weight: 700; }
  .amount-text--profit { color: var(--success); }
  .amount-text--danger { color: var(--danger); }

  .card-list { display: none; flex-direction: column; gap: 10px; }
  .data-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; border-left: 4px solid var(--bar-color); }
  .data-card__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .data-card__name { font-weight: 700; font-size: 15px; }
  .data-card__meta { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 10px; font-size: 12.5px; color: var(--text-secondary); }
  .data-card__meta span { display: flex; align-items: center; gap: 4px; }

  @media (max-width: 860px) {
    .table-wrap { display: none; }
    .card-list { display: flex; }
    .shell { padding: 14px 12px 80px; }
    .page-header__title { font-size: 19px; }
    .search-box { max-width: none; order: 3; flex-basis: 100%; }
  }

  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; color: var(--text-tertiary); gap: 8px; }
  .empty-state__title { font-weight: 700; color: var(--text); font-size: 15px; margin-top: 6px; }
  .empty-state__desc { font-size: 13px; margin-bottom: 10px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
  .modal__header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .modal__header h2 { font-size: 17px; font-weight: 700; margin: 0; }
  .modal__body { padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .modal__footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); }
  .modal__footer-right { display: flex; gap: 8px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12.5px; font-weight: 700; color: var(--text-secondary); }
  .field .req { color: var(--danger); }
  .field input, .field select, .field textarea { font-family: inherit; font-size: 14px; padding: 9px 11px; border: 1px solid var(--border); border-radius: 9px; outline: none; color: var(--text); background: var(--surface); width: 100%; }
  .field textarea { resize: vertical; min-height: 60px; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .field input.is-error { border-color: var(--danger); }
  .field__error { color: var(--danger); font-size: 11.5px; margin: 0; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; min-width: 0; }
  @media (max-width: 480px) { .field-row { flex-direction: column; } }

  .confirm-box { background: var(--surface); border-radius: 14px; padding: 20px; max-width: 360px; width: 100%; box-shadow: var(--shadow-md); }
  .confirm-box__icon { color: var(--danger); margin-bottom: 8px; }
  .confirm-box h3 { margin: 0 0 6px; font-size: 15px; }
  .confirm-box p { margin: 0 0 16px; font-size: 13px; color: var(--text-secondary); }
  .confirm-box__actions { display: flex; justify-content: flex-end; gap: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 200; display: flex; align-items: center; gap: 8px; }

  .loading-wrap { display:flex; align-items:center; justify-content:center; padding: 80px 0; color: var(--text-tertiary); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid var(--primary-soft); border-top-color: var(--primary); animation: spin .7s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------------- サイドバー / ハンバーガー ---------------- */
  .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; flex-shrink: 0; }
  .hamburger-btn:hover { background: #F1EFFB; }
  .shell-wrap { transition: margin-left .2s ease; }
  @media (min-width: 961px) { .shell-wrap.sidebar-open { margin-left: 232px; } }

  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 232px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 18px 12px; display: flex; flex-direction: column;
    gap: 2px; overflow-y: auto; z-index: 150; transform: translateX(-100%); transition: transform .2s ease;
  }
  .sidebar.is-open { transform: translateX(0); box-shadow: var(--shadow-md); }
  .sidebar__brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 15px; color: var(--primary); padding: 6px 10px 16px; text-decoration:none; }
  .sidebar__section { font-size: 11px; font-weight: 700; color: var(--text-tertiary); padding: 14px 12px 4px; }
  .sidebar__link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--text-secondary); text-decoration: none; }
  .sidebar__link:hover { background: #F1EFFB; color: var(--text); }
  .sidebar__link.is-active { background: var(--primary-soft); color: var(--primary); }
  .sidebar__link.is-disabled { color: var(--text-tertiary); cursor: default; pointer-events: none; }
  .sidebar__link .soon { margin-left: auto; font-size: 9.5px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); z-index: 140; display: none; }
  .sidebar-overlay.is-open { display: block; }
</style>

  function storageGet(key) {
    return new Promise(function (resolve) {
      if (window.db) {
        window.db.collection("taiho_app_data").doc(key).get().then(function (doc) {
          resolve(doc.exists ? { value: doc.data().value } : null);
        }).catch(function () {
          try { var raw = window.localStorage.getItem(key); resolve(raw ? { value: raw } : null); }
          catch (e) { resolve(null); }
        });
      } else if (window.storage && typeof window.storage.get === "function") {
        window.storage.get(key, false).then(resolve).catch(function () { resolve(null); });
      } else {
        try { var raw = window.localStorage.getItem(key); resolve(raw ? { value: raw } : null); }
        catch (e) { resolve(null); }
      }

          resolve({ value: value });
        }).catch(function () {
          try { window.localStorage.setItem(key, value); } catch (e) {}
          resolve({ value: value });
        });
      } else if (window.storage && typeof window.storage.set === "function") {
        window.storage.set(key, value, false).then(resolve).catch(function () {
          try { window.localStorage.setItem(key, value); } catch (e) {}

        });

        resolve({ value: value });
      }
    });

  function renderBillingResults(area) {
    var list = filteredBillings();
    document.getElementById("countBadge").textContent = list.length + "件";

    if (list.length === 0) {
      area.innerHTML =
        '<div class="empty-state">' + ICON_USERS40 +
        '<p class="empty-state__title">まだ請求がありません</p><p class="empty-state__desc">「請求を追加」から登録しましょう。</p>' +
        '<button class="btn btn--primary" id="emptyCreateBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> 請求を追加</button></div>';
      var b = document.getElementById("emptyCreateBtn");
      if (b) b.addEventListener("click", function () { openBillingModal(false, null); });
      return;
    }

    var sumBilling = 0, sumOrders = 0;
    var rows = "", cards = "";
    list.forEach(function (bl) {
      var pName = projectName(bl.projectId) || "-";
      var total = Number(bl.totalAmount) || 0;
      var received = Number(bl.receivedAmount) || 0;
      var unpaid = total - received;
      var rate = total > 0 ? Math.round((received / total) * 100) : 0;
      var ordersTotal = projectOrdersTotal(bl.projectId);
      var profit = total - ordersTotal;
      sumBilling += total; sumOrders += ordersTotal;
      var profitClass = profit < 0 ? "amount-text amount-text--danger" : "amount-text amount-text--profit";
      rows += '<tr><td><button class="cell-name" data-bledit="' + bl.id + '">' + esc(pName) + '</button></td>' +
        '<td>' + statusPillGeneric(bl.id, bl.status) + '</td>' +
        '<td>' + fmtDate(bl.completionDate) + '</td><td>' + fmtDate(bl.nextPaymentDate) + '</td>' +
        '<td class="amount-text">' + fmtYen(total) + '</td>' +
        '<td class="amount-text">' + fmtYen(ordersTotal) + '</td>' +
        '<td class="' + profitClass + '">' + fmtYen(profit) + '</td>' +
        '<td class="amount-text">' + fmtYen(unpaid) + '</td>' +
        '<td>' + rate + '%</td>' +
        '<td class="cell-actions"><button class="icon-btn" data-bledit="' + bl.id + '" aria-label="編集">' + ICON_PENCIL + '</button></td></tr>';
      cards += '<div class="data-card" style="--bar-color:' + billingStatusOf(bl.status).color + '">' +
        '<div class="data-card__top"><div class="data-card__name">' + esc(pName) + '</div>' +
        '<button class="icon-btn" data-bledit="' + bl.id + '" aria-label="編集">' + ICON_PENCIL + '</button></div>' +
        '<div class="data-card__meta"><span class="amount-text">請求 ' + fmtYen(total) + '</span><span class="amount-text">発注 ' + fmtYen(ordersTotal) + '</span></div>' +
        '<div class="data-card__meta"><span class="' + profitClass + '">粗利 ' + fmtYen(profit) + '</span><span>回収率 ' + rate + '%</span></div>' +
        '<div class="data-card__footer">' + statusPillGeneric(bl.id, bl.status) + '</div></div>';
    });

    var totalProfit = sumBilling - sumOrders;
    var summaryHtml =
      '<div class="summary-bar" style="margin-bottom:14px;">' +
      '<div class="summary-item">請求合計<b>' + fmtYen(sumBilling) + '</b></div>' +
      '<div class="summary-item">発注合計<b>' + fmtYen(sumOrders) + '</b></div>' +
      '<div class="summary-item">粗利合計<b style="color:' + (totalProfit<0?"var(--danger)":"var(--success)") + '">' + fmtYen(totalProfit) + '</b></div>' +
      '</div>';

    area.innerHTML = summaryHtml +
      '<div class="table-wrap"><table class="data-table"><thead><tr>' +
      '<th>案件名</th><th>ステータス</th><th>完工日</th><th>次回入金予定日</th><th>請求(売上)</th><th>発注合計</th><th>粗利</th><th>未入金</th><th>回収率</th><th></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div><div class="card-list">' + cards + '</div>';

    area.querySelectorAll("[data-bledit]").forEach(function (el) {
      el.addEventListener("click", function () {
        var bl = state.billings.find(function (x) { return x.id === el.getAttribute("data-bledit"); });

        renderResults();
      });
    });

      '</div><div class="modal__footer">' +
      (isEdit ? '<button class="btn btn--danger-ghost" id="modalDeleteBtn">' + ICON_TRASH + ' 削除</button>' : '<span></span>') +
      '<div class="modal__footer-right"><button class="btn btn--ghost" id="modalCancelBtn">キャンセル</button><button class="btn btn--primary" id="modalSaveBtn">' + (isEdit ? "保存" : "追加") + '</button></div>' +
      '</div></div></div>';

    document.getElementById("f_contractorId").addEventListener("change", function (e) {
      document.getElementById("f_orderId").innerHTML = orderOptionsForContractor(e.target.value, "");
    });
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "modalOverlay") closeModal(); });
    document.getElementById("f_contractorId").focus();
    if (isEdit) document.getElementById("modalDeleteBtn").addEventListener("click", function () { confirmDelete = { kind: "payment", id: d.id }; closeModal(); renderConfirm(); });

    document.getElementById("modalSaveBtn").addEventListener("click", function () {
      var contractorId = document.getElementById("f_contractorId").value;
      if (!contractorId) { document.getElementById("err_contractorId").textContent = "事業者を選択してください"; document.getElementById("err_contractorId").style.display = "block"; document.getElementById("f_contractorId").classList.add("is-error"); return; }
      var form = {
        id: d.id, contractorId: contractorId,
        orderId: document.getElementById("f_orderId").value,
        status: document.getElementById("f_status").value,
        bankInfo: document.getElementById("f_bankInfo").value.trim(),
        dueDate: document.getElementById("f_dueDate").value,
        amount: document.getElementById("f_amount").value
      };
      if (isEdit) {
        persistPayments(state.payments.map(function (p) { return p.id === form.id ? Object.assign({}, p, form) : p; }));
        showToast("支払いを更新しました");
      } else {
        form.id = "pay-" + Date.now();
        persistPayments([form].concat(state.payments));
        showToast("支払いを追加しました");
      }
      closeModal();
      renderResults();
    });
  }

  function renderBillingModal() {
    var root = document.getElementById("modalRoot");
    var d = editModal.data, isEdit = editModal.isEdit;
    var statusOptions = BILLING_STATUS.map(function (s) { return '<option value="' + s.id + '"' + (d.status===s.id?" selected":"") + '>' + esc(s.label) + '</option>'; }).join("");

    root.innerHTML =
      '<div class="modal-overlay" id="modalOverlay"><div class="modal" role="dialog" aria-modal="true">' +
      '<div class="modal__header"><h2>' + (isEdit ? "請求を編集" : "請求を追加") + '</h2><button class="icon-btn" id="modalCloseBtn" aria-label="閉じる">' + ICON_X + '</button></div>' +
      '<div class="modal__body">' +
      '<div class="field"><label>案件 <span class="req">*</span></label><select id="f_projectId">' + projectOptions(d.projectId) + '</select><p class="field__error" id="err_projectId" style="display:none"></p></div>' +
      '<div class="field"><label>ステータス</label><select id="f_status">' + statusOptions + '</select></div>' +
      '<div class="field-row">' +
      '<div class="field"><label>完工日</label><input type="date" id="f_completionDate" value="' + esc(d.completionDate) + '" /></div>' +
      '<div class="field"><label>次回入金予定日</label><input type="date" id="f_nextPaymentDate" value="' + esc(d.nextPaymentDate) + '" /></div>' +
      '</div>' +
      '<div class="field-row">' +
      '<div class="field"><label>売上合計</label><input type="number" id="f_totalAmount" placeholder="例: 1250000" value="' + esc(d.totalAmount) + '" /></div>' +
      '<div class="field"><label>入金済み金額</label><input type="number" id="f_receivedAmount" placeholder="例: 500000" value="' + esc(d.receivedAmount) + '" /></div>' +
      '</div>' +
      '<p class="field-note" id="billingPreview"></p>' +
      '</div><div class="modal__footer">' +
      (isEdit ? '<button class="btn btn--danger-ghost" id="modalDeleteBtn">' + ICON_TRASH + ' 削除</button>' : '<span></span>') +
      '<div class="modal__footer-right"><button class="btn btn--ghost" id="modalCancelBtn">キャンセル</button><button class="btn btn--primary" id="modalSaveBtn">' + (isEdit ? "保存" : "追加") + '</button></div>' +
      '</div></div></div>';

    function updatePreview() {
      var total = Number(document.getElementById("f_totalAmount").value) || 0;
      var received = Number(document.getElementById("f_receivedAmount").value) || 0;
      var unpaid = total - received;
      var rate = total > 0 ? Math.round((received / total) * 100) : 0;
      document.getElementById("billingPreview").textContent = "未入金 " + fmtYen(unpaid) + " ・ 回収率 " + rate + "%";
    }
    ["f_totalAmount","f_receivedAmount"].forEach(function (id) {
      document.getElementById(id).addEventListener("input", updatePreview);
    });
    updatePreview();

    document.getElementById("f_projectId").addEventListener("change", function (e) {
      if (isEdit) return;
      var p = state.projects.find(function (x) { return x.id === e.target.value; });
      if (p && p.contractAmount && !document.getElementById("f_totalAmount").value) {
        document.getElementById("f_totalAmount").value = p.contractAmount;
        updatePreview();
      }
    });

    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "modalOverlay") closeModal(); });
    document.getElementById("f_projectId").focus();
    if (isEdit) document.getElementById("modalDeleteBtn").addEventListener("click", function () { confirmDelete = { kind: "billing", id: d.id }; closeModal(); renderConfirm(); });

    document.getElementById("modalSaveBtn").addEventListener("click", function () {
      var projectId = document.getElementById("f_projectId").value;
      if (!projectId) { document.getElementById("err_projectId").textContent = "案件を選択してください"; document.getElementById("err_projectId").style.display = "block"; document.getElementById("f_projectId").classList.add("is-error"); return; }
      var form = {
        id: d.id, projectId: projectId,
        status: document.getElementById("f_status").value,
        completionDate: document.getElementById("f_completionDate").value,
        nextPaymentDate: document.getElementById("f_nextPaymentDate").value,
        totalAmount: document.getElementById("f_totalAmount").value,
        receivedAmount: document.getElementById("f_receivedAmount").value,
        createdAt: d.createdAt || Date.now()
      };
      if (isEdit) {
        persistBillings(state.billings.map(function (bl) { return bl.id === form.id ? Object.assign({}, bl, form) : bl; }));
        showToast("請求を更新しました");
      } else {
        form.id = "bl-" + Date.now();
        persistBillings([form].concat(state.billings));
        showToast("請求を追加しました");
      }
      closeModal();
      renderResults();
    });
  }

  function renderConfirm() {
    var root = document.getElementById("modalRoot");
    if (!confirmDelete) { root.innerHTML = ""; return; }
    var labelMap = { contractor: "協力業者", order: "発注", payment: "支払い", billing: "請求" };
    root.innerHTML =
      '<div class="modal-overlay" id="confirmOverlay"><div class="confirm-box">' + ICON_ALERT +
      '<h3>この' + labelMap[confirmDelete.kind] + 'を削除しますか?</h3><p>削除すると元に戻せません。</p>' +
      '<div class="confirm-box__actions"><button class="btn btn--ghost btn--sm" id="confirmCancelBtn">キャンセル</button>' +
      '<button class="btn btn--danger-ghost btn--sm" id="confirmDeleteBtn">削除する</button></div></div></div>';
    document.getElementById("confirmOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "confirmOverlay") { confirmDelete = null; renderConfirm(); } });
    document.getElementById("confirmCancelBtn").addEventListener("click", function () { confirmDelete = null; renderConfirm(); });
    document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
      if (confirmDelete.kind === "contractor") {
        persistContractors(state.contractors.filter(function (c) { return c.id !== confirmDelete.id; }));
        showToast("協力業者を削除しました");
      } else if (confirmDelete.kind === "order") {
        persistOrders(state.orders.filter(function (o) { return o.id !== confirmDelete.id; }));
        showToast("発注を削除しました");
      } else if (confirmDelete.kind === "payment") {
        persistPayments(state.payments.filter(function (p) { return p.id !== confirmDelete.id; }));
        showToast("支払いを削除しました");
      } else {
        persistBillings(state.billings.filter(function (bl) { return bl.id !== confirmDelete.id; }));
        showToast("請求を削除しました");
      }
      confirmDelete = null;
      renderConfirm();
      renderResults();
    });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (editModal) closeModal();
      if (confirmDelete) { confirmDelete = null; renderConfirm(); }
    }
  });

  document.getElementById("searchInput").addEventListener("input", function (e) { state.search = e.target.value; renderResults(); });
  document.getElementById("btnCreate").addEventListener("click", function () {
    if (state.tab === "contractors") openContractorModal(false, null);
    else if (state.tab === "orders") openOrderModal(false, null);
    else if (state.tab === "payments") openPaymentModal(false, null);
    else openBillingModal(false, null);
  });

  function setSidebar(open) {
    document.getElementById("sidebar").classList.toggle("is-open", open);
    document.getElementById("shellWrap").classList.toggle("sidebar-open", open);
    document.getElementById("sidebarOverlay").classList.toggle("is-open", open && window.innerWidth <= 960);
  }
  document.getElementById("hamburgerBtn").addEventListener("click", function () {
    setSidebar(!document.getElementById("sidebar").classList.contains("is-open"));
  });
  document.getElementById("sidebarOverlay").addEventListener("click", function () { setSidebar(false); });
  setSidebar(window.innerWidth > 960);

  /* ---------------- 表示/非表示設定(各PCでlocalStorage保存) ---------------- */
  (function applyUiPrefs() {
    var prefs = {};
    try { prefs = JSON.parse(window.localStorage.getItem("taiho_ui_prefs_v1") || "{}"); } catch (e) { prefs = {}; }
    document.querySelectorAll("[data-pref-key]").forEach(function (el) {
      var key = el.getAttribute("data-pref-key");
      if (prefs[key] === false) el.style.display = "none";
    });
  })();

  function init() {
    renderOccupationTabs();
    renderResults();
    Promise.all([storageGet(CONTRACTORS_KEY), storageGet(PROJECTS_KEY), storageGet(ORDERS_KEY), storageGet(PAYMENTS_KEY), storageGet(BILLINGS_KEY)]).then(function (res) {
      var cData = null, pData = null, oData = null, payData = null, blData = null;
      try { cData = res[0] && res[0].value ? JSON.parse(res[0].value) : null; } catch (e) {}
      try { pData = res[1] && res[1].value ? JSON.parse(res[1].value) : null; } catch (e) {}
      try { oData = res[2] && res[2].value ? JSON.parse(res[2].value) : null; } catch (e) {}
      try { payData = res[3] && res[3].value ? JSON.parse(res[3].value) : null; } catch (e) {}
      try { blData = res[4] && res[4].value ? JSON.parse(res[4].value) : null; } catch (e) {}
      state.contractors = Array.isArray(cData) ? cData : seedContractors();
      state.projects = Array.isArray(pData) ? pData : [];
      state.orders = Array.isArray(oData) ? oData : seedOrders();
      state.payments = Array.isArray(payData) ? payData : seedPayments();
      state.billings = Array.isArray(blData) ? blData : seedBillings();
      if (!Array.isArray(cData)) storageSet(CONTRACTORS_KEY, JSON.stringify(state.contractors));
      if (!Array.isArray(oData)) storageSet(ORDERS_KEY, JSON.stringify(state.orders));
      if (!Array.isArray(payData)) storageSet(PAYMENTS_KEY, JSON.stringify(state.payments));
      if (!Array.isArray(blData)) storageSet(BILLINGS_KEY, JSON.stringify(state.billings));
      state.loading = false;
      renderResults();
    }).catch(function () {
      state.contractors = seedContractors();
      state.projects = [];
      state.orders = seedOrders();
      state.payments = seedPayments();
      state.billings = seedBillings();
      state.loading = false;
      renderResults();
    });
  }

  init();
})();
</script>
</body>
</html>
