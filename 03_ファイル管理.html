<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ファイル管理 | 太豊建設アプリ</title>
<style>
  :root {
    --bg: #F6F5FB; --surface: #FFFFFF; --primary: #6C47FF; --primary-dark: #5636D9;
    --primary-soft: #EFEAFF; --text: #1E1B2E; --text-secondary: #6B6580; --text-tertiary: #9C97AE;
    --border: #E7E4F0; --danger: #F0525C; --success: #10B981; --radius: 12px;
    --shadow-sm: 0 1px 2px rgba(30,27,46,0.06); --shadow-md: 0 8px 24px rgba(30,27,46,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans','Yu Gothic','Noto Sans JP',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

  .shell { max-width: 1240px; margin: 0 auto; padding: 20px 20px 60px; }

  .page-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .page-header__title { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 22px; letter-spacing: 0.01em; }
  .page-header__title .badge-count { font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600; color: var(--primary); background: var(--primary-soft); padding: 3px 9px; border-radius: 100px; }
  .page-header__actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .search-box { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
  .search-box input { width: 100%; padding: 10px 12px 10px 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
  .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

  .project-select { padding: 10px 34px 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 14px; color: var(--text); min-width: 200px; max-width: 260px; }
  .project-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); outline: none; }

  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; border: 1px solid transparent; cursor: pointer; transition: transform .1s, background .15s, box-shadow .15s; white-space: nowrap; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn--primary { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }
  .btn--primary:hover:not(:disabled) { background: var(--primary-dark); }
  .btn--ghost { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn--ghost:hover { background: #F1EFFB; }
  .btn--danger-ghost { background: transparent; color: var(--danger); border-color: #FBD5D8; }
  .btn--danger-ghost:hover { background: #FEF1F2; }
  .btn--sm { padding: 7px 12px; font-size: 12.5px; }

  .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .icon-btn:hover { background: #F1EFFB; color: var(--text); }

  .type-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
  .type-tabs::-webkit-scrollbar { display: none; }
  .type-tab { display:flex; align-items:center; gap:6px; font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 8px 14px; border-radius: 999px; border: 1px solid transparent; background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .type-tab:hover { background: #EDEAFA; }
  .type-tab.is-active { background: var(--text); color: white; }
  .type-tab .tab-count { font-family: 'Courier New', monospace; font-size: 10.5px; opacity: .75; }

  .storage-meter { display:flex; align-items:center; gap:8px; font-size: 11.5px; color: var(--text-tertiary); margin-bottom: 14px; }
  .storage-meter__bar { flex:1; max-width:220px; height:6px; border-radius:999px; background: var(--border); overflow:hidden; }
  .storage-meter__fill { height:100%; background: var(--primary); border-radius:999px; }

  .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(136px, 1fr)); gap: 12px; }
  .file-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: box-shadow .15s, transform .1s; position: relative; }
  .file-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .file-card__thumb { width: 100%; aspect-ratio: 1; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); overflow: hidden; }
  .file-card__thumb img { width: 100%; height: 100%; object-fit: cover; }
  .file-card__meta { padding: 8px 10px; }
  .file-card__name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-card__sub { font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px; }
  .file-card__del { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 8px; border: none; background: rgba(255,255,255,0.92); color: var(--danger); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity .15s; }
  .file-card:hover .file-card__del { opacity: 1; }

  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; color: var(--text-tertiary); gap: 8px; }
  .empty-state__title { font-weight: 700; color: var(--text); font-size: 15px; margin-top: 6px; }
  .empty-state__desc { font-size: 13px; margin-bottom: 10px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.55); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
  .preview-modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow-md); overflow: hidden; }
  .preview-modal__header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
  .preview-modal__header h2 { font-size: 14px; font-weight: 700; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-modal__body { flex: 1; overflow: auto; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 240px; }
  .preview-modal__body img { max-width: 100%; max-height: 70vh; display: block; }
  .preview-modal__body iframe { width: 100%; height: 70vh; border: none; }
  .preview-modal__footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); gap: 10px; flex-wrap: wrap; }

  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 380px; box-shadow: var(--shadow-md); }
  .confirm-box { background: var(--surface); border-radius: 14px; padding: 20px; max-width: 360px; width: 100%; box-shadow: var(--shadow-md); }
  .confirm-box__icon { color: var(--danger); margin-bottom: 8px; }
  .confirm-box h3 { margin: 0 0 6px; font-size: 15px; }
  .confirm-box p { margin: 0 0 16px; font-size: 13px; color: var(--text-secondary); }
  .confirm-box__actions { display: flex; justify-content: flex-end; gap: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 200; display: flex; align-items: center; gap: 8px; }

  .loading-wrap { display:flex; align-items:center; justify-content:center; padding: 80px 0; color: var(--text-tertiary); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid var(--primary-soft); border-top-color: var(--primary); animation: spin .7s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------------- サイドバー / ハンバーガー ---------------- */
  .hamburger-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; flex-shrink: 0; }
  .hamburger-btn:hover { background: #F1EFFB; }
  .shell-wrap { transition: margin-left .2s ease; }
  @media (min-width: 961px) { .shell-wrap.sidebar-open { margin-left: 232px; } }

  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 232px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 18px 12px; display: flex; flex-direction: column;
    gap: 2px; overflow-y: auto; z-index: 150; transform: translateX(-100%); transition: transform .2s ease;
  }
  .sidebar.is-open { transform: translateX(0); box-shadow: var(--shadow-md); }
  .sidebar__brand { display: flex; align-items: center; gap: 8px; font-weight: 900; font-size: 15px; color: var(--primary); padding: 6px 10px 16px; text-decoration:none; }
  .sidebar__section { font-size: 11px; font-weight: 700; color: var(--text-tertiary); padding: 14px 12px 4px; }
  .sidebar__link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 700; color: var(--text-secondary); text-decoration: none; }
  .sidebar__link:hover { background: #F1EFFB; color: var(--text); }
  .sidebar__link.is-active { background: var(--primary-soft); color: var(--primary); }
  .sidebar__link.is-disabled { color: var(--text-tertiary); cursor: default; pointer-events: none; }
  .sidebar__link .soon { margin-left: auto; font-size: 9.5px; font-weight: 700; background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary); padding: 2px 6px; border-radius: 999px; white-space: nowrap; }
  .sidebar-overlay { position: fixed; inset: 0; background: rgba(20,17,36,0.45); z-index: 140; display: none; }
  .sidebar-overlay.is-open { display: block; }

  @media (max-width: 640px) {
    .shell { padding: 14px 12px 80px; }
    .page-header__title { font-size: 19px; }
    .search-box { max-width: none; }
    .project-select { max-width: none; flex: 1; }
  }
</style>
</head>

<script>
(function () {
  "use strict";

  /* ---------------- 保存機能 ---------------- */
  function storageGet(key) {
    return new Promise(function (resolve) {
      if (window.storage && typeof window.storage.get === "function") {
        window.storage.get(key, false).then(resolve).catch(function () { resolve(null); });
      } else {
        try { var raw = window.localStorage.getItem(key); resolve(raw ? { value: raw } : null); }
        catch (e) { resolve(null); }
      }
    });
  }
  function storageSet(key, value) {
    return new Promise(function (resolve, reject) {
      if (window.storage && typeof window.storage.set === "function") {
        window.storage.set(key, value, false).then(resolve).catch(function () {
          try { window.localStorage.setItem(key, value); resolve({ value: value }); }
          catch (e2) { reject(e2); }
        });
      } else {
        try { window.localStorage.setItem(key, value); resolve({ value: value }); }
        catch (e) { reject(e); }
      }
    });
  }

  /* ---------------- 定数 ---------------- */
  var PROJECTS_KEY = "taiho_projects_v2"; // ①案件管理と共通のキー(読み取り専用で参照)
  var FILES_KEY = "taiho_files_v1";
  var MAX_FILE_SIZE = 1.5 * 1024 * 1024;   // 1ファイルあたり上限 約1.5MB
  var WARN_TOTAL_SIZE = 4 * 1024 * 1024;   // 合計の目安上限(保存領域の制約による)

  var FOLDERS = [
    { id: "shared",    label: "全業者共有", icon: "users" },
    { id: "photos",    label: "写真",       icon: "image" },
    { id: "estimate",  label: "見積書",     icon: "doc" },
    { id: "invoice",   label: "請求書",     icon: "doc" },
    { id: "materials", label: "資料",       icon: "folder" }
  ];

  function folderOf(id) { for (var i=0;i<FOLDERS.length;i++) if (FOLDERS[i].id===id) return FOLDERS[i]; return FOLDERS[0]; }

  function esc(str) {
    return String(str == null ? "" : str).replace(/[&<>"']/g, function (s) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s];
    });
  }

  function fmtSize(bytes) {
    if (!bytes) return "0KB";
    if (bytes < 1024*1024) return Math.round(bytes/1024) + "KB";
    return (bytes/1024/1024).toFixed(1) + "MB";
  }

  function fmtDateTime(v) {
    var d = new Date(v);
    if (isNaN(d.getTime())) return "-";
    return d.getFullYear() + "/" + (d.getMonth()+1) + "/" + d.getDate() + " " + ("0"+d.getHours()).slice(-2) + ":" + ("0"+d.getMinutes()).slice(-2);
  }

  /* ---------------- アイコン ---------------- */
  var ICON_X = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  var ICON_TRASH = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/><path d="M10 11v6M14 11v6"/></svg>';
  var ICON_CHECK = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>';
  var ICON_ALERT = '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="confirm-box__icon"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
  var ICON_FOLDER40 = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>';
  var ICON_PDF32 = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M6 3h8l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M9 15h1.5a1.5 1.5 0 0 0 0-3H9v6M14 12v6M14 15h1.5M18 12v6"/></svg>';
  var ICON_DOWNLOAD = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>';

  /* ---------------- 状態 ---------------- */
  var state = { projects: [], files: [], loading: true, activeProjectId: "", activeFolder: "shared", search: "" };
  var confirmDeleteId = null;
  var previewFileId = null;

  var toastTimer = null;
  function showToast(msg) {
    var root = document.getElementById("toastRoot");
    root.innerHTML = '<div class="toast">' + ICON_CHECK + ' ' + esc(msg) + '</div>';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { root.innerHTML = ""; }, 2400);
  }

  function persistFiles(next) {
    state.files = next;
    return storageSet(FILES_KEY, JSON.stringify(next));
  }

  /* ---------------- 案件セレクター ---------------- */
  function renderProjectSelect() {
    var sel = document.getElementById("projectSelect");
    if (state.projects.length === 0) {
      sel.innerHTML = '<option value="">案件がありません</option>';
      sel.disabled = true;
      document.getElementById("btnUpload").disabled = true;
      return;
    }
    sel.disabled = false;
    var sorted = state.projects.slice().sort(function (a,b) { return (b.no||0)-(a.no||0); });
    sel.innerHTML = sorted.map(function (p) {
      return '<option value="' + p.id + '"' + (p.id===state.activeProjectId?" selected":"") + '>No.' + esc(p.no) + ' ' + esc(p.name) + '</option>';
    }).join("");
    if (!state.activeProjectId) state.activeProjectId = sorted[0].id;
    sel.value = state.activeProjectId;
    document.getElementById("btnUpload").disabled = false;
  }
  document.getElementById("projectSelect").addEventListener("change", function (e) {
    state.activeProjectId = e.target.value;
    renderResults();
  });

  /* ---------------- フォルダタブ ---------------- */
  function renderFolderTabs() {
    var el = document.getElementById("folderTabs");
    el.innerHTML = FOLDERS.map(function (f) {
      var count = filesInFolder(f.id).length;
      return '<button class="type-tab' + (state.activeFolder===f.id?" is-active":"") + '" data-folder="' + f.id + '">' + esc(f.label) + ' <span class="tab-count">' + count + '</span></button>';
    }).join("");
    el.querySelectorAll(".type-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.activeFolder = btn.getAttribute("data-folder");
        renderFolderTabs();
        renderResults();
      });
    });
  }

  function filesInFolder(folderId) {
    return state.files.filter(function (f) { return f.projectId === state.activeProjectId && f.folderId === folderId; });
  }

  /* ---------------- 保存容量メーター ---------------- */
  function renderStorageMeter() {
    var total = state.files.reduce(function (sum, f) { return sum + (f.sizeBytes||0); }, 0);
    var pct = Math.min(100, Math.round((total / WARN_TOTAL_SIZE) * 100));
    document.getElementById("storageMeter").innerHTML =
      '使用容量 ' + fmtSize(total) + ' / 目安 ' + fmtSize(WARN_TOTAL_SIZE) +
      '<span class="storage-meter__bar"><span class="storage-meter__fill" style="width:' + pct + '%; background:' + (pct>85?"var(--danger)":"var(--primary)") + '"></span></span>';
  }

  /* ---------------- 結果表示 ---------------- */
  function renderResults() {
    var area = document.getElementById("resultsArea");
    renderStorageMeter();

    if (state.loading) {
      area.innerHTML = '<div class="loading-wrap"><span class="spinner"></span> 読み込み中...</div>';
      document.getElementById("countBadge").textContent = "0件";
      return;
    }
    if (!state.activeProjectId) {
      area.innerHTML =
        '<div class="empty-state">' + ICON_FOLDER40 +
        '<p class="empty-state__title">先に案件を選択してください</p>' +
        '<p class="empty-state__desc">案件がまだ無い場合は、①案件管理から先に作成してください。</p></div>';
      document.getElementById("countBadge").textContent = "0件";
      return;
    }

    var q = state.search.trim().toLowerCase();
    var list = filesInFolder(state.activeFolder).filter(function (f) {
      return !q || f.name.toLowerCase().indexOf(q) >= 0;
    }).sort(function (a,b) { return b.uploadedAt - a.uploadedAt; });

    document.getElementById("countBadge").textContent = list.length + "件";

    if (list.length === 0) {
      var f = folderOf(state.activeFolder);
      area.innerHTML =
        '<div class="empty-state">' + ICON_FOLDER40 +
        '<p class="empty-state__title">「' + esc(f.label) + '」にはまだファイルがありません</p>' +
        '<p class="empty-state__desc">画像またはPDFをアップロードしましょう(1ファイル上限 約1.5MB)。</p>' +
        '<button class="btn btn--primary" id="emptyUploadBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg> アップロード</button></div>';
      var b = document.getElementById("emptyUploadBtn");
      if (b) b.addEventListener("click", function () { document.getElementById("fileInput").click(); });
      return;
    }

    var html = '<div class="file-grid">';
    list.forEach(function (file) {
      var isImage = file.mime && file.mime.indexOf("image/") === 0;
      html += '<div class="file-card" data-open="' + file.id + '">' +
        '<button class="file-card__del" data-del="' + file.id + '" aria-label="削除">' + ICON_TRASH + '</button>' +
        '<div class="file-card__thumb">' + (isImage ? '<img src="' + file.dataUrl + '" alt="" />' : ICON_PDF32) + '</div>' +
        '<div class="file-card__meta"><div class="file-card__name">' + esc(file.name) + '</div>' +
        '<div class="file-card__sub">' + fmtSize(file.sizeBytes) + ' ・ ' + fmtDateTime(file.uploadedAt) + '</div></div></div>';
    });
    html += '</div>';
    area.innerHTML = html;

    area.querySelectorAll("[data-open]").forEach(function (el) {
      el.addEventListener("click", function (e) {
        if (e.target.closest("[data-del]")) return;
        previewFileId = el.getAttribute("data-open");
        renderPreview();
      });
    });
    area.querySelectorAll("[data-del]").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        confirmDeleteId = el.getAttribute("data-del");
        renderConfirm();
      });
    });
  }

  /* ---------------- プレビュー ---------------- */
  function renderPreview() {
    var root = document.getElementById("modalRoot");
    if (!previewFileId) { return; }
    var file = state.files.find(function (f) { return f.id === previewFileId; });
    if (!file) { previewFileId = null; return; }
    var isImage = file.mime && file.mime.indexOf("image/") === 0;
    root.innerHTML =
      '<div class="modal-overlay" id="previewOverlay">' +
        '<div class="preview-modal">' +
          '<div class="preview-modal__header"><h2>' + esc(file.name) + '</h2>' +
          '<button class="icon-btn" id="previewCloseBtn" aria-label="閉じる">' + ICON_X + '</button></div>' +
          '<div class="preview-modal__body">' +
          (isImage ? '<img src="' + file.dataUrl + '" alt="" />' : '<iframe src="' + file.dataUrl + '"></iframe>') +
          '</div>' +
          '<div class="preview-modal__footer">' +
          '<span>' + fmtSize(file.sizeBytes) + ' ・ ' + fmtDateTime(file.uploadedAt) + '</span>' +
          '<div style="display:flex;gap:8px;">' +
          '<a class="btn btn--ghost btn--sm" href="' + file.dataUrl + '" download="' + esc(file.name) + '">' + ICON_DOWNLOAD + ' 保存</a>' +
          '<button class="btn btn--danger-ghost btn--sm" id="previewDeleteBtn">' + ICON_TRASH + ' 削除</button>' +
          '</div></div>' +
        '</div>' +
      '</div>';
    document.getElementById("previewCloseBtn").addEventListener("click", closePreview);
    document.getElementById("previewOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "previewOverlay") closePreview(); });
    document.getElementById("previewDeleteBtn").addEventListener("click", function () {
      confirmDeleteId = file.id;
      closePreview();
      renderConfirm();
    });
  }
  function closePreview() { previewFileId = null; document.getElementById("modalRoot").innerHTML = ""; }

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      if (previewFileId) closePreview();
      if (confirmDeleteId) { confirmDeleteId = null; renderConfirm(); }
    }
  });

  /* ---------------- 削除確認 ---------------- */
  function renderConfirm() {
    var root = document.getElementById("modalRoot");
    if (!confirmDeleteId) { root.innerHTML = ""; return; }
    root.innerHTML =
      '<div class="modal-overlay" id="confirmOverlay"><div class="confirm-box">' + ICON_ALERT +
      '<h3>このファイルを削除しますか?</h3><p>削除すると元に戻せません。</p>' +
      '<div class="confirm-box__actions"><button class="btn btn--ghost btn--sm" id="confirmCancelBtn">キャンセル</button>' +
      '<button class="btn btn--danger-ghost btn--sm" id="confirmDeleteBtn">削除する</button></div></div></div>';
    document.getElementById("confirmOverlay").addEventListener("mousedown", function (e) { if (e.target.id === "confirmOverlay") { confirmDeleteId = null; renderConfirm(); } });
    document.getElementById("confirmCancelBtn").addEventListener("click", function () { confirmDeleteId = null; renderConfirm(); });
    document.getElementById("confirmDeleteBtn").addEventListener("click", function () {
      var id = confirmDeleteId;
      persistFiles(state.files.filter(function (f) { return f.id !== id; })).then(function () {
        showToast("ファイルを削除しました");
        confirmDeleteId = null;
        renderConfirm();
        renderFolderTabs();
        renderResults();
      }).catch(function () { showToast("削除に失敗しました"); });
    });
  }

  /* ---------------- アップロード ---------------- */
  document.getElementById("btnUpload").addEventListener("click", function () { document.getElementById("fileInput").click(); });
  document.getElementById("fileInput").addEventListener("change", function (e) {
    var files = Array.prototype.slice.call(e.target.files || []);
    e.target.value = "";
    if (files.length === 0) return;
    if (!state.activeProjectId) { showToast("先に案件を選択してください"); return; }

    var accepted = [];
    var rejected = 0;
    files.forEach(function (f) {
      var isImage = f.type && f.type.indexOf("image/") === 0;
      var isPdf = f.type === "application/pdf";
      if (!isImage && !isPdf) { rejected++; return; }
      if (f.size > MAX_FILE_SIZE) { rejected++; return; }
      accepted.push(f);
    });
    if (rejected > 0) showToast(rejected + "件のファイルは形式または容量(1.5MB超)の制限でスキップされました");
    if (accepted.length === 0) return;

    var readers = accepted.map(function (f) {
      return new Promise(function (resolve) {
        var reader = new FileReader();
        reader.onload = function () {
          resolve({
            id: "f-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7),
            projectId: state.activeProjectId,
            folderId: state.activeFolder,
            name: f.name,
            mime: f.type,
            sizeBytes: f.size,
            dataUrl: reader.result,
            uploadedAt: Date.now()
          });
        };
        reader.readAsDataURL(f);
      });
    });

    Promise.all(readers).then(function (newFiles) {
      var next = newFiles.concat(state.files);
      persistFiles(next).then(function () {
        showToast(newFiles.length + "件アップロードしました");
        renderFolderTabs();
        renderResults();
      }).catch(function () {
        showToast("保存容量の上限を超えた可能性があります。ファイルサイズを小さくしてお試しください");
      });
    });
  });

  /* ---------------- 検索・サイドバー ---------------- */
  document.getElementById("searchInput").addEventListener("input", function (e) { state.search = e.target.value; renderResults(); });

  function setSidebar(open) {
    document.getElementById("sidebar").classList.toggle("is-open", open);
    document.getElementById("shellWrap").classList.toggle("sidebar-open", open);
    document.getElementById("sidebarOverlay").classList.toggle("is-open", open && window.innerWidth <= 960);
  }
  document.getElementById("hamburgerBtn").addEventListener("click", function () {
    setSidebar(!document.getElementById("sidebar").classList.contains("is-open"));
  });
  document.getElementById("sidebarOverlay").addEventListener("click", function () { setSidebar(false); });
  setSidebar(window.innerWidth > 960);

  /* ---------------- 初期化 ---------------- */
  function init() {
    renderFolderTabs();
    renderResults();
    Promise.all([storageGet(PROJECTS_KEY), storageGet(FILES_KEY)]).then(function (res) {
      var pRes = res[0], fRes = res[1];
      var pData = null, fData = null;
      try { pData = pRes && pRes.value ? JSON.parse(pRes.value) : null; } catch (e) {}
      try { fData = fRes && fRes.value ? JSON.parse(fRes.value) : null; } catch (e) {}
      state.projects = Array.isArray(pData) ? pData : [];
      state.files = Array.isArray(fData) ? fData : [];
      state.loading = false;
      renderProjectSelect();
      renderFolderTabs();
      renderResults();
    }).catch(function () {
      state.projects = [];
      state.files = [];
      state.loading = false;
      renderProjectSelect();
      renderFolderTabs();
      renderResults();
    });
  }

  init();
})();
</script>
</body>
</html>
